name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true
        type: string

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: windows-latest

    permissions:
      contents: write  # needed for creating GitHub releases

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      NANOS_PERSONAL_ACCESS_TOKEN: ${{ secrets.NANOS_PERSONAL_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0  # needed for changelog history

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Determine version (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          TAG="v${{ github.event.inputs.version }}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          # Create a tag
          git tag $TAG

      - name: Determine version (tag push)
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          echo "## Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          CUR_TAG="${TAG}"

          # Find previous tag (if any)
          PREV_TAG=$(git describe --tags --abbrev=0 --match "v*" --exclude "$CUR_TAG" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            COMMITS=$(git rev-list --reverse HEAD)
          else
            echo "Changes since $PREV_TAG:" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            COMMITS=$(git rev-list $PREV_TAG..HEAD)
          fi

          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --pretty=format:%s $COMMIT)
            echo "- [$MSG](https://github.com/${{ github.repository }}/commit/$COMMIT)" >> CHANGELOG.md
          done

          # Add full changelog link for all non-initial releases
          if [ -n "$PREV_TAG" ]; then
            echo "" >> CHANGELOG.md
            # echo "**Full changelog:** https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CUR_TAG" >> CHANGELOG.md
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate packages with packager
        shell: bash
        run: |
          dotnet restore
          dotnet build -c Release
          dotnet run --project .packager/packager.csproj -c Release --

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: cheatoid-library
          path: publish/cheatoid-library.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "cheatoid-library ${{ env.TAG }}"
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}
          generate_release_notes: true
          files: |
            publish/cheatoid-library.zip
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # This works "fine", except it creates a zip file which is *not* optimized, therefore I'll use my own packager
      #- name: Publish to nanos-world store
      #  uses: olivatooo/nanos-world-store-action@v1
      #  with:
      #    NANOS_PERSONAL_ACCESS_TOKEN: ${{ secrets.NANOS_PERSONAL_ACCESS_TOKEN }}
      #    NANOS_PACKAGE_NAME: "cheatoid-library"
      #    PACKAGE_PATH: "library"
      #    EXTRA_PACKAGE_PATHS: ""
      #    VERBOSE: true

      #- name: Download nanos world server with steamcmd (linux)
      #  run: |
      #    # curl -o steamcmd.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
      #    # tar -xvf steamcmd.tar.gz
      #    # rm steamcmd.tar.gz
      #    curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" | tar zxvf -
      #    # Download nanos world server
      #    ./steamcmd.sh +force_install_dir ./server +login anonymous "+app_update 1936830 -beta bleeding-edge" validate +quit

      - name: Publish packages
        # continue-on-error: true
        shell: pwsh
        run: |
          # Download nanos world server with SteamCMD (windows)
          New-Item -ItemType Directory -Path .server -Force | Out-Null
          & curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" -o .server\steamcmd.zip
          Expand-Archive -Path .server\steamcmd.zip -DestinationPath .server
          # Remove-Item .server\steamcmd.zip
          & ".server\steamcmd.exe" +quit
          # Run twice to handle SteamCMD first-run priming issue (missing steamapps configuration)
          & ".server\steamcmd.exe" +@sSteamCmdForcePlatformType windows +@ShutdownOnFailedCommand 1 +@NoPromptForPassword 1 +force_install_dir server +login anonymous +app_update 1936830 -beta bleeding-edge validate +quit
          & ".server\steamcmd.exe" +@sSteamCmdForcePlatformType windows +@ShutdownOnFailedCommand 1 +@NoPromptForPassword 1 +force_install_dir server +login anonymous +app_update 1936830 -beta bleeding-edge validate +quit
          # Get token from environment variable
          $token = $env:NANOS_PERSONAL_ACCESS_TOKEN
          # Setup nanos world server (generate Config.toml; required because --cli mode does not respect --token)
          Push-Location ".server\server"
          $j = Start-Job { & ".\NanosWorldServer.exe" --token "$using:token" --save }
          Start-Sleep 5; Stop-Job $j; Remove-Job $j
          # Finally upload packages using CLI mode
          # & ".\NanosWorldServer.exe" --cli upload package cheatoid-library
          Pop-Location
          # Actually, use in-house packager
          # dotnet run --project .packager/packager.csproj -c Release -- --cli ..\.server\server -r
          Push-Location "bin"
          & ".\packager.exe" --upload-packages --cli "..\.server\server" --token "$token"
          Pop-Location
