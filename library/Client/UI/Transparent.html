<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta http-equiv="Content-Language" content="en">
	<meta content="origin-when-cross-origin" name="referrer">
	<meta name="robots" content="noindex, nofollow">
	<meta name="viewport"
	      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<style type="text/css">
		* {
			margin: 0 !important;
			padding: 0 !important;
			border: 0 !important;
		}

		html,
		body {
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: transparent !important;
		}

		canvas {
			display: block;
			position: fixed;
			left: 0;
			top: 0;
			min-width: 100vw;
			min-height: 100vh;
			width: 100vw;
			height: 100vh;
			/*image-rendering: optimizeSpeed;*/
			/*-webkit-interpolation-mode: nearest-neighbor;*/
		}

		canvas:-webkit-full-screen {
			display: block;
			position: fixed;
			left: 0;
			top: 0;
			min-width: 100vw;
			min-height: 100vh;
			width: 100vw;
			height: 100vh;
		}

		::-webkit-scrollbar {
			display: none;
		}
	</style>
</head>

<body>
<canvas id="canvas">
	<p>Your browser does not support HTML5 canvas!</p>
</canvas>
<script type="text/javascript">
	const FPS = 60.0;
	const FRAME_TIME = 1000.0 / FPS;
	const FORCE_SOFTWARE_RENDERING = true;

	const createCanvasContext = (canvas) => {
		let context;
		if (FORCE_SOFTWARE_RENDERING) {
			context = canvas.getContext('2d');
		} else {
			context = canvas.getContext('experimental-webgl') || canvas.getContext('webgl');
			if (!context || !(context instanceof WebGLRenderingContext)) {
				console.log('Fallback, using software renderer.');
				context = canvas.getContext('2d');
			} else {
				console.log('Awesome, your browser supports WebGL renderer... (WIP)');
				return false; // TODO
			}
		}
		if (!context) {
			console.log('Something went wrong, failed to initialize canvas context!');
			return false;
		}
		return context;
	};

	const setupResolution = (canvas) => {
		canvas.width = //window.screen.width ||
				window.innerWidth
				|| document.documentElement.clientWidth
				|| document.body.clientWidth; // document.width is obsolete
		canvas.height = //window.screen.height ||
				window.innerHeight
				|| document.documentElement.clientHeight
				|| document.body.clientHeight; // document.height is obsolete
	};

	const onLoad = () => {
		// Grab our canvas.
		const canvas = document.getElementById('canvas') || document.createElement('canvas');
		if (!(canvas && canvas.getContext)) {
			console.log('(ERROR) Your browser does not support HTML5 canvas!');
			return;
		}

		// Initialize our canvas resolution and create the context.
		setupResolution(canvas);
		const context = createCanvasContext(canvas);

		// Polyfill for rAF/cAF functionality.
		window.requestAnimationFrame = window.requestAnimationFrame
				|| window.mozRequestAnimationFrame
				|| window.webkitRequestAnimationFrame
				|| window.msRequestAnimationFrame
				|| function (f) {
					return setTimeout(f, FRAME_TIME);
				};
		window.cancelAnimationFrame = window.cancelAnimationFrame
				|| window.mozCancelAnimationFrame
				|| clearTimeout;

		let paintRAF = false;
		let resizeTimeout;
		const onResize = () => {
			resizeTimeout = clearTimeout(resizeTimeout);
			resizeTimeout = setTimeout(afterResize, 1);
		};

		const afterResize = () => {
			if (paintRAF) {
				window.cancelAnimationFrame(paintRAF);
				paintRAF = false;
			}
			const oldWidth = canvas.width;
			const oldHeight = canvas.height;
			console.log('Old resolution was: ' + oldWidth + 'x' + oldHeight);
			setupResolution(canvas);
			console.log('Client resolution detected: ' + canvas.clientWidth + 'x' + canvas.clientHeight);
			console.log('Offset resolution detected: ' + canvas.offsetWidth + 'x' + canvas.offsetHeight);
			console.log('Canvas resolution detected: ' + canvas.width + 'x' + canvas.height);
			paintCanvas();
		};

		const paintCanvas = () => {
			context.clearRect(0, 0, canvas.width, canvas.height);
			if (paintRAF) {
				context.beginPath();
				context.rect(25, 50, 75, 100);
				context.lineWidth = 8;
				context.strokeStyle = 'black';
				context.stroke();
				context.lineWidth = 4;
				context.strokeStyle = 'yellow';
				context.stroke();
			}
			paintRAF = window.requestAnimationFrame(paintCanvas);
		};

		window.addEventListener('resize', onResize, false); //window.onresize = onResize;
		paintCanvas();
		console.log('Canvas setup completed.');
	};

	window.addEventListener('load', onLoad, false); //window.onload = onLoad;
</script>
</body>

</html>
