	guiControllers.credits = gui.add(settings, "credits").name("Credits").disable();
	guiControllers.fps = gui.add(settings, "fps").name("FPS").disable();
	guiControllers.frameTime = gui.add(settings, "frameTime").name("Frame Time (ms)").disable();

	const keybindFolder = gui.addFolder("Keybinds");
	for (const action in keybinds) {
		guiControllers[action] = keybindFolder.add(keybinds, action).name(action).onChange(() => {
			listenForKey(action);
		});
	}

	// Store references to all settings controllers for GUI updates
	guiControllers.particleCount = gui.add(settings, "particleCount", 20, 400, 1).name("Stars").onFinishChange(initParticles);

	guiControllers.minSpeed = gui.add(settings, "minSpeed", 0.01, 3, 0.01).name("Min Speed").onFinishChange(initParticles);
	guiControllers.maxSpeed = gui.add(settings, "maxSpeed", 0.1, 5, 0.1).name("Max Speed").onFinishChange(initParticles);
	guiControllers.speed = gui.add(settings, "speed", 0.1, 3, 0.1).name("Global Speed");
	guiControllers.globalMinSpeed = gui.add(settings, "globalMinSpeed", 0.0, 2.0, 0.01).name("Min Velocity");
	guiControllers.globalMaxSpeed = gui.add(settings, "globalMaxSpeed", 0.1, 10.0, 0.1).name("Max Velocity");

	guiControllers.minMass = gui.add(settings, "minMass", 0.1, 5, 0.1).name("Min Mass").onFinishChange(initParticles);
	guiControllers.maxMass = gui.add(settings, "maxMass", 0.1, 5, 0.1).name("Max Mass").onFinishChange(initParticles);

	guiControllers.maxAllowedSpeed = gui.add(settings, "maxAllowedSpeed", 0.1, 5, 0.1).name("Max Allowed Speed");
	guiControllers.slowdownRate = gui.add(settings, "slowdownRate", 0.9, 1.0, 0.001).name("Slowdown Rate");

	guiControllers.starSize = gui.add(settings, "starSize", 1, 4, 0.1).name("Star Size");
	guiControllers.maxDistance = gui.add(settings, "maxDistance", 50, 300, 1).name("Link Distance");
	guiControllers.lineOpacity = gui.add(settings, "lineOpacity", 0, 1, 0.05).name("Line Opacity");
	guiControllers.lineColor = gui.addColor(settings, "lineColor").name("Line Color");
	guiControllers.starColor = gui.addColor(settings, "starColor").name("Star Color");
	guiControllers.backgroundColor = gui.addColor(settings, "backgroundColor").name("Background");

	const glowFolder = gui.addFolder("Glow");
	guiControllers.glowEnabled = glowFolder.add(settings, "glowEnabled").name("Enable Glow");
	guiControllers.glowStrength = glowFolder.add(settings, "glowStrength", 0, 60, 1).name("Glow Strength");
	guiControllers.glowHaloMin = glowFolder.add(settings, "glowHaloMin", 0, 20, 1).name("Halo Min");
	guiControllers.glowHaloMax = glowFolder.add(settings, "glowHaloMax", 0, 40, 1).name("Halo Max");
	guiControllers.glowColor = glowFolder.addColor(settings, "glowColor").name("Glow Color");
	const rainbowFolder = gui.addFolder("Rainbow Mode");
	guiControllers.rainbowMode = rainbowFolder.add(settings, "rainbowMode").name("Enable Rainbow");
	guiControllers.rainbowSpeed = rainbowFolder.add(settings, "rainbowSpeed", 0.1, 10, 0.1).name("Color Speed");
	guiControllers.rainbowSpread = rainbowFolder.add(settings, "rainbowSpread", 5, 250, 5).name("Color Spread");

	const gravityFolder = gui.addFolder("Interaction");
	guiControllers.interactionEnabled = gravityFolder.add(settings, "interactionEnabled").name("Enable Interaction");
	guiControllers.gravityRadius = gravityFolder.add(settings, "gravityRadius", 50, 500, 1).name("Radius");
	guiControllers.linkNudgeStrength = gravityFolder.add(settings, "linkNudgeStrength", 0.0, 2.0, 0.01).name("Link Nudge");
	const modeFolder = gravityFolder.addFolder("Modes");
	guiControllers.interactionMode = modeFolder.add(settings, "interactionMode", ["attract", "repel", "pushAway"]).name("Mode");
	guiControllers.attractStrength = modeFolder.add(settings, "attractStrength", 0.01, 5, 0.01).name("Attract Strength");
	guiControllers.repelStrength = modeFolder.add(settings, "repelStrength", 0.01, 5, 0.01).name("Repel Strength");
	guiControllers.pushAwayStrength = modeFolder.add(settings, "pushAwayStrength", 0.01, 5, 0.01).name("Push-Away Strength");

	let guiVisible = true;
	let waitingForKey = null;

	function listenForKey(action) {
		waitingForKey = action;
		keybinds[action] = "Press a key...";
	}

	/**
	 * Updates all GUI controllers to reflect current settings
	 * This eliminates boilerplate code in each keybind handler
	 */
	function updateAllGUIControllers() {
		for (const controller of Object.values(guiControllers)) {
			if (controller && typeof controller.updateDisplay === 'function') {
				controller.updateDisplay();
			}
		}
	}

	// Keybind action handlers - each function handles a specific action
	const keybindHandlers = {
		toggleGUI: () => {
			guiVisible = !guiVisible;
			gui.domElement.style.display = guiVisible ? "block" : "none";
		},

		toggleInteraction: () => {
			settings.interactionEnabled = !settings.interactionEnabled;
		},

		cycleInteractionMode: () => {
			const modes = ["attract", "repel", "pushAway"];
			const currentIndex = modes.indexOf(settings.interactionMode);
			const nextIndex = (currentIndex + 1) % modes.length;
			settings.interactionMode = modes[nextIndex];
		},

		pushAwayMode: () => {
			settings.interactionMode = "pushAway";
		},

		repelMode: () => {
			settings.interactionMode = "repel";
		},

		attractMode: () => {
			settings.interactionMode = "attract";
		},

		increaseStarCount: () => {
			settings.particleCount = Math.min(settings.particleCount + 5, 500);
			initParticles();
		},

		decreaseStarCount: () => {
			settings.particleCount = Math.max(settings.particleCount - 5, 5);
			initParticles();
		}
	};

	/**
	 * Handles keybind actions with improved performance and maintainability
	 * @param {string} key - The key pressed by the user
	 */
	function handleKeybindAction(key) {
		// Normalize single character keys to uppercase for consistency
		const normalizedKey = key.length === 1 ? key.toUpperCase() : key;

		// Early return for invalid keys
		if (!normalizedKey) return;

		// Find the action that matches this key
		let matchedAction = null;
		for (const [action, keybind] of Object.entries(keybinds)) {
			if (keybind === normalizedKey) {
				matchedAction = action;
				break;
			}
		}

		// Execute the matched action if found
		if (matchedAction && keybindHandlers[matchedAction]) {
			try {
				keybindHandlers[matchedAction]();
				// Update all GUI controllers after handling the action
				updateAllGUIControllers();
			} catch (error) {
				console.warn(`Error executing keybind action "${matchedAction}":`, error);
			}
		}
	}

	/**
	 * Adds a new keybind action dynamically
	 * @param {string} actionName - The name of the action
	 * @param {string} key - The key to bind to
	 * @param {Function} handler - The function to execute
	 */
	function addKeybindAction(actionName, key, handler) {
		keybinds[actionName] = key;
		keybindHandlers[actionName] = handler;
	}

	/**
	 * Removes a keybind action
	 * @param {string} actionName - The name of the action to remove
	 */
	function removeKeybindAction(actionName) {
		delete keybinds[actionName];
		delete keybindHandlers[actionName];
	}

	/**
	 * Gets all currently bound keys and their actions
	 * @returns {Object} Object with key-action mappings
	 */
	function getKeybindMap() {
		const map = {};
		for (const [action, key] of Object.entries(keybinds)) {
			map[key] = action;
		}
		return map;
	}

	/**
	 * Checks if a key is already in use by another action
	 * @param {string} key - The key to check
	 * @param {string} excludeAction - Action to exclude from the check (for reassigning same key)
	 * @returns {boolean} True if key is already used
	 */
	function isKeyAlreadyUsed(key, excludeAction = null) {
		const normalizedKey = key.length === 1 ? key.toUpperCase() : key;
		for (const [action, existingKey] of Object.entries(keybinds)) {
			if (action !== excludeAction && existingKey === normalizedKey) {
				return true;
			}
		}
		return false;
	}

	window.addEventListener("keydown", (e) => {
		// Prevent default behavior when waiting for key assignment
		if (waitingForKey) {
			e.preventDefault();
			e.stopPropagation();

			const normalizedKey = e.key.length === 1 ? e.key.toUpperCase() : e.key;

			// Check if key is already used by another action
			if (isKeyAlreadyUsed(normalizedKey, waitingForKey)) {
				// Revert to previous key and show alert
				if (guiControllers[waitingForKey]) {
					guiControllers[waitingForKey].updateDisplay();
				}
				alert(`Key "${normalizedKey}" is already assigned to another action!`);
				waitingForKey = null;
				return;
			}

			keybinds[waitingForKey] = normalizedKey;
			// Update the GUI controller to show the new key
			if (guiControllers[waitingForKey]) {
				guiControllers[waitingForKey].updateDisplay();
			}
			waitingForKey = null;
			return;
		}
		handleKeybindAction(e.key);
	});

	function clampSpeed(p) {
		const speed = Math.hypot(p.vx, p.vy);

		if (speed < settings.globalMinSpeed) {
			if (speed === 0) {
				// Give a tiny random kick to avoid dead stars
				const angle = Math.random() * Math.PI * 2;
				p.vx = Math.cos(angle) * settings.globalMinSpeed;
				p.vy = Math.sin(angle) * settings.globalMinSpeed;
			} else {
				const scale = settings.globalMinSpeed / speed;
				p.vx *= scale;
				p.vy *= scale;
			}
		}

		if (speed > settings.globalMaxSpeed) {
			const scale = settings.globalMaxSpeed / speed;
			p.vx *= scale;
			p.vy *= scale;
		}
	}

	// -----------------------------
	// PARTICLE CLASS
	// -----------------------------
	class Particle {
		constructor() {
			this.reset();
		}

		reset() {
			this.x = Math.random() * canvas.width;
			this.y = Math.random() * canvas.height;

			// Random mass (weight)
			this.mass = settings.minMass + Math.random() * (settings.maxMass - settings.minMass);

			// Random initial speed
			const angle = Math.random() * Math.PI * 2;
			const speed = settings.minSpeed + Math.random() * (settings.maxSpeed - settings.minSpeed);

			this.vx = Math.cos(angle) * speed;
			this.vy = Math.sin(angle) * speed;
		}

		// Effective visual radius (core star + max halo)
		getRadius() {
			return settings.starSize + settings.glowHaloMax + 2;
		}

		applyGravity() {
			if (!settings.interactionEnabled || !mouse.active) return;

			const dx = mouse.x - this.x;
			const dy = mouse.y - this.y;
			const dist = Math.sqrt(dx * dx + dy * dy);

			if (dist >= settings.gravityRadius) return;

			const proximity = 1 - dist / settings.gravityRadius;

			// Normalize direction
			const nx = dx / dist;
			const ny = dy / dist;

			// Apply mass
			const invMass = 1 / this.mass;

			if (settings.interactionMode === "attract") {
				// Particles drift toward the cursor
				// Light stars move a lot
				// Heavy stars barely budge
				// Pairs of stars no longer move in perfect sync
				const force = proximity * settings.attractStrength;
				this.vx += nx * force * invMass;
				this.vy += ny * force * invMass;
			} else if (settings.interactionMode === "repel") {
				// Particles are pushed away gently, like a magnetic field
				const force = proximity * settings.repelStrength;
				this.vx -= nx * force * invMass;
				this.vy -= ny * force * invMass;
			} else if (settings.interactionMode === "pushAway") {
				// Particles are violently expelled when very close — great for "explosion" effects
				// Push away HARDER when very close
				const force = (proximity ** 2) * settings.pushAwayStrength;
				this.vx -= nx * force * invMass;
				this.vy -= ny * force * invMass;
			}
		}

		applySlowdown() {
			const speed = Math.hypot(this.vx, this.vy);
			if (speed > settings.maxAllowedSpeed) {
				// Apply mass to slowdown
				// Heavier stars slow down less — feels more natural.
				const m = this.mass;
				this.vx *= 1 - (1 - settings.slowdownRate) / m;
				this.vy *= 1 - (1 - settings.slowdownRate) / m;
			}
		}

		move() {
			this.applyGravity();
			this.applySlowdown();

			// Apply global speed multiplier
			this.x += this.vx * settings.speed;
			this.y += this.vy * settings.speed;

			const r = this.getRadius();

			if (this.x < r) {
				this.x = r;
				this.vx *= -1 / this.mass; // Apply mass to bounce; this makes heavy stars bounce more sluggishly, light stars bounce sharply.
			}
			if (this.x > canvas.width - r) {
				this.x = canvas.width - r;
				this.vx *= -1 / this.mass;
			}
			if (this.y < r) {
				this.y = r;
				this.vy *= -1 / this.mass;
			}
			if (this.y > canvas.height - r) {
				this.y = canvas.height - r;
				this.vy *= -1 / this.mass;
			}

			clampSpeed(this);
		}

		draw() {
			// Distance to cursor
			let distToCursor = Infinity;
			if (settings.interactionEnabled && mouse.active) {
				const dx = mouse.x - this.x;
				const dy = mouse.y - this.y;
				distToCursor = Math.sqrt(dx * dx + dy * dy);
			}

			// Smooth flicker using a sine wave
			const time = performance.now() * 0.002;
			const flicker = 0.9 + Math.sin(time + this.x * 0.01 + this.y * 0.01) * 0.1;

			// Base halo size (smooth, not random)
			let halo = settings.glowHaloMin +
					(settings.glowHaloMax - settings.glowHaloMin) * flicker;

			// Proximity boost (smooth)
			if (distToCursor < settings.gravityRadius) {
				const proximity = 1 - distToCursor / settings.gravityRadius;
				halo += proximity * 6; // Gentle boost
				// Glow brighter when repelled
				if (settings.interactionMode !== "attract") {
					halo += 4 * (1 - distToCursor / settings.gravityRadius);
				}
			}

			// Rainbow mode colors
			let starColor = settings.starColor;
			let glowColor = settings.glowColor;
			let lineColor = settings.lineColor;

			if (settings.rainbowMode) {
				const hueOffset = (this.x + this.y) / settings.rainbowSpread;
				const timeOffset = performance.now() * 0.01 * settings.rainbowSpeed;
				const hue = (hueOffset + timeOffset) % 360;

				starColor = `hsl(${hue}, 80%, 60%)`;
				glowColor = `hsl(${hue}, 80%, 50%)`;
				lineColor = `hsl(${hue}, 80%, 55%)`;
			}

			if (settings.glowEnabled) {
				ctx.shadowBlur = settings.glowStrength * flicker;
				ctx.shadowColor = glowColor;

				// Halo
				ctx.beginPath();
				ctx.arc(this.x, this.y, settings.starSize + halo, 0, Math.PI * 2);
				ctx.fillStyle = glowColor;
				ctx.fill();
			}

			// Core star
			ctx.shadowBlur = 0;
			ctx.beginPath();
			// Make heavier stars look bigger
			ctx.arc(this.x, this.y, settings.starSize * (0.5 + this.mass * 0.5), 0, Math.PI * 2);
			ctx.fillStyle = starColor;
			ctx.fill();
		}
	}

	// -----------------------------
	// PARTICLE ARRAY
	// -----------------------------
	let particles = [];
	// Track which pairs were linked last frame
	let linkState = new Set();

	function initParticles() {
		particles = [];
		for (let i = 0; i < settings.particleCount; i++) {
			particles.push(new Particle());
		}
	}

	function getLinkedGroups() {
		const visited = new Set();
		const groups = [];

		function dfs(index, group) {
			visited.add(index);
			group.push(particles[index]);
			for (let j = 0; j < particles.length; j++) {
				if (visited.has(j)) continue;
				const dx = particles[index].x - particles[j].x;
				const dy = particles[index].y - particles[j].y;
				const dist = Math.sqrt(dx * dx + dy * dy);
				if (dist < settings.maxDistance) {
					dfs(j, group);
				}
			}
		}

		for (let i = 0; i < particles.length; i++) {
			if (!visited.has(i)) {
				const group = [];
				dfs(i, group);
				groups.push(group);
			}
		}
		return groups;
	}

	function getLinkedStars() {
		const groups = getLinkedGroups();
		return groups.filter(g => g.length > 1);
	}

	// -----------------------------
	// CONNECT PARTICLES
	// -----------------------------
	function connectParticles() {
		const maxDist = settings.maxDistance;
		const newLinkState = new Set();

		ctx.shadowBlur = settings.glowEnabled ? settings.glowStrength : 0;
		ctx.shadowColor = settings.lineColor;

		for (let i = 0; i < particles.length; i++) {
			for (let j = i + 1; j < particles.length; j++) {
				const dx = particles[i].x - particles[j].x;
				const dy = particles[i].y - particles[j].y;
				const dist = Math.sqrt(dx * dx + dy * dy);

				if (dist < maxDist) {
					const key = `${i}-${j}`;
					newLinkState.add(key);

					// Nudge when link is new
					if (dist < LINK_ENTER) {
						// inside link zone
						newLinkState.add(key);

						if (!linkState.has(key) && settings.linkNudgeStrength > 0) {
							// apply nudge ONCE
							const nx = dx / dist;
							const ny = dy / dist;

							// Apply impulse AWAY from each other
							const force = settings.linkNudgeStrength;

							particles[i].vx += nx * force / particles[i].mass;
							particles[i].vy += ny * force / particles[i].mass;

							particles[j].vx -= nx * force / particles[j].mass;
							particles[j].vy -= ny * force / particles[j].mass;
						}
					} else if (dist < LINK_EXIT) {
						// still considered linked, but no new nudge
						newLinkState.add(key);
					}

					// Draw line
					const alpha = settings.lineOpacity * (1 - dist / maxDist);
					ctx.beginPath();
					ctx.moveTo(particles[i].x, particles[i].y);
					ctx.lineTo(particles[j].x, particles[j].y);

					// Rainbow mode line color
					let lineColor = settings.lineColor;
					if (settings.rainbowMode) {
						const avgX = (particles[i].x + particles[j].x) / 2;
						const avgY = (particles[i].y + particles[j].y) / 2;
						const hueOffset = (avgX + avgY) / settings.rainbowSpread;
						const timeOffset = performance.now() * 0.01 * settings.rainbowSpeed;
						const hue = (hueOffset + timeOffset) % 360;
						lineColor = `hsla(${hue}, 80%, 55%, ${alpha})`;
					} else {
						lineColor = hexToRgba(settings.lineColor, alpha);
					}

					ctx.strokeStyle = lineColor;
					ctx.stroke();
				}
			}
		}

		// Update link state for next frame
		linkState = newLinkState;
		ctx.shadowBlur = 0;
		ctx.shadowColor = "transparent";
	}

	function hexToRgba(hex, alpha) {
		let c = hex.replace("#", "");
		if (c.length === 3) c = c.split("").map(ch => ch + ch).join("");
		const num = parseInt(c, 16);
		const r = (num >> 16) & 255;
		const g = (num >> 8) & 255;
		const b = num & 255;
		return `rgba(${r},${g},${b},${alpha})`;
	}

	// -----------------------------
	// MOUSE + TOUCH (dynamic enable/disable)
	// -----------------------------
	const mouse = {x: 0, y: 0, active: false};

	function updateMouse(e) {
		if (!settings.interactionEnabled) return;
		mouse.x = e.clientX;
		mouse.y = e.clientY;
		mouse.active = true;
	}

	canvas.addEventListener("mousemove", updateMouse);
	canvas.addEventListener("mouseenter", () => {
		if (settings.interactionEnabled) mouse.active = true;
	});
	canvas.addEventListener("mouseleave", () => (mouse.active = false));

	canvas.addEventListener("touchstart", e => {
		if (!settings.interactionEnabled) return;
		const t = e.touches[0];
		mouse.x = t.clientX;
		mouse.y = t.clientY;
		mouse.active = true;
	});

	canvas.addEventListener("touchmove", e => {
		if (!settings.interactionEnabled) return;
		const t = e.touches[0];
		mouse.x = t.clientX;
		mouse.y = t.clientY;
	});

	canvas.addEventListener("touchend", () => (mouse.active = false));

	// -----------------------------
	// ANIMATION LOOP
	// -----------------------------
	function animate() {
		const now = performance.now();
		const delta = now - lastFrameTime;
		lastFrameTime = now;
		frameCount++;

		// Update FPS every fpsUpdateInterval ms
		if (now - lastFpsUpdate >= fpsUpdateInterval) {
			const fps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
			const frameTime = parseFloat(delta.toFixed(2));
			settings.fps = fps;
			settings.frameTime = frameTime;

			// Update FPS controller display
			if (guiControllers.fps) {
				guiControllers.fps.updateDisplay();
			}
			if (guiControllers.frameTime) {
				guiControllers.frameTime.updateDisplay();
			}

			frameCount = 0;
			lastFpsUpdate = now;
		}

		// Reset shadow so GUI/DOM doesn't get affected
		ctx.shadowBlur = 0;
		ctx.shadowColor = "transparent";

		// Clear the canvas - if background is transparent, use clearRect instead of fillRect
		if (settings.backgroundColor === "rgba(0, 0, 0, 0)" || settings.backgroundColor === "transparent") {
			ctx.clearRect(0, 0, canvas.width, canvas.height);
		} else {
			ctx.fillStyle = settings.backgroundColor;
			ctx.fillRect(0, 0, canvas.width, canvas.height);
		}

		// Move particles
		particles.forEach(p => p.move());

		// Draw lines BEHIND stars
		connectParticles();

		// Draw stars + glow ON TOP
		particles.forEach(p => p.draw());

		requestAnimationFrame(animate);
	}

	// DOM should be ready because we are in ES module
	resizeCanvas();
	initParticles();
	animate();
</script>
</body>
