					// Always scroll to bottom when enabling auto-scroll
					const output = $("#consoleOutput");
					if (output) {
						// Force scroll to bottom immediately
						output.scrollTop = output.scrollHeight;
						// Double-check scroll position in case of timing issues
						setTimeout(() => {
							output.scrollTop = output.scrollHeight;
						}, 10);
					}
					Toast.show("Auto-scroll enabled", "fa-arrow-down", 1500);
				} else {
					Toast.show("Auto-scroll disabled", "fa-arrow-up", 1500);
				}

				// Save auto-scroll state to local storage
				try {
					localStorage.setItem('console_auto_scroll', ConsoleEngine.autoScroll.toString());
					// Also save to main console settings
					ConsoleStorage.save();
				} catch (e) {
					console.warn("Failed to save auto-scroll state:", e);
				}
			});

			// Initial tooltip
			CustomTooltip.attach(autoScrollBtn, "Toggle auto-scroll");
		}

		// Timestamp toggle
		const timestampBtn = $("#timestampBtn");
		ConsoleEngine.showTimestamps = true; // Default to showing timestamps

		// Restore timestamp state from individual storage (overrides main storage if exists)
		try {
			const savedTimestamps = localStorage.getItem('console_show_timestamps');
			if (savedTimestamps) {
				ConsoleEngine.showTimestamps = savedTimestamps === 'true';
			}
		} catch (e) {
			console.warn("Failed to restore timestamp state:", e);
		}

		if (timestampBtn) {
			// Apply restored state to button
			timestampBtn.classList.toggle("active", ConsoleEngine.showTimestamps);
			timestampBtn.addEventListener("click", () => {
				ConsoleEngine.showTimestamps = !ConsoleEngine.showTimestamps;
				timestampBtn.classList.toggle("active", ConsoleEngine.showTimestamps);

				// Update all existing messages
				const output = $("#consoleOutput");
				if (output) {
					const messages = output.querySelectorAll(".msg-entry");
					messages.forEach(msg => {
						const timestamp = msg.querySelector(".msg-timestamp");
						if (timestamp) {
							timestamp.style.display = ConsoleEngine.showTimestamps ? "inline-block" : "none";
						}
					});
				}

				// Show notification for manual toggle
				if (ConsoleEngine.showTimestamps) {
					Toast.show("Timestamps enabled", "fa-clock", 1500);
				} else {
					Toast.show("Timestamps disabled", "fa-clock", 1500);
				}

				// Save timestamp state to local storage
				try {
					localStorage.setItem('console_show_timestamps', ConsoleEngine.showTimestamps.toString());
					// Also save to main console settings
					ConsoleStorage.save();
				} catch (e) {
					console.warn("Failed to save timestamp state:", e);
				}
			});

			// Initial tooltip
			CustomTooltip.attach(timestampBtn, "Toggle timestamps");
		}

		// Theme dropdown
		const themeToggleBtn = $("#themeToggleBtn");
		if (themeToggleBtn) {
			themeToggleBtn.addEventListener("click", (e) => {
				e.stopPropagation();
				ThemeManager.toggleDropdown();
			});
		}

		// Click-away functionality for theme dropdown - immediate on mousedown
		document.addEventListener("mousedown", (e) => {
			// Only respond to left clicks
			if (e.button !== 0) return;

			const themeDropdown = $("#themeDropdown");
			const themeToggleBtn = $("#themeToggleBtn");

			// Check if dropdown is open and if click is outside dropdown and toggle button
			if (themeDropdown && themeDropdown.classList.contains("open") &&
				!themeDropdown.contains(e.target) &&
				!themeToggleBtn.contains(e.target)) {
				ThemeManager.closeDropdown();
			}
		});

		// Window dragging
		const header = $(".console-header");
		let isDragging = false;
		let dragOffset = {x: 0, y: 0};

		if (header) {
			header.addEventListener("mousedown", (e) => {
				// Don't allow dragging when maximized
				if (container.classList.contains("maximized")) return;

				if (e.button === 0) { // Left mouse button
					isDragging = true;
					// Get current position accounting for transform and zoom
					const rect = container.getBoundingClientRect();
					// Account for zoom scale when calculating positions
					const zoomScale = currentZoom || 1.0;

					// Switch to absolute pixel positions, override CSS centering
					container.style.transition = "none"; // disable animation while dragging
					container.style.left = rect.left + "px";
					container.style.top = rect.top + "px";
					container.style.bottom = "auto"; // unset bottom property so top takes over

					// Account for zoom scale when calculating drag offset
					dragOffset.x = e.clientX - rect.left;
					dragOffset.y = e.clientY - rect.top;
					header.style.cursor = "grabbing";
					e.preventDefault();
				}
			});

			document.addEventListener("mousemove", (e) => {
				if (isDragging) {
					// Calculate new position based on mouse movement
					const newX = e.clientX - dragOffset.x;
					const newY = e.clientY - dragOffset.y;

					// Create temporary rect for clamping, accounting for zoom scale
					const zoomScale = currentZoom || 1.0;
					const tempRect = {
						left: newX,
						top: newY,
						width: container.offsetWidth / zoomScale,
						height: container.offsetHeight / zoomScale,
						right: newX + (container.offsetWidth / zoomScale),
						bottom: newY + (container.offsetHeight / zoomScale)
					};

					// Clamp to viewport
					const clampedRect = ConsoleStorage.clampToViewport(container, tempRect);
					if (clampedRect) {
						container.style.left = clampedRect.left + "px";
						container.style.top = clampedRect.top + "px";
					}
				}
			});

			document.addEventListener("mouseup", () => {
				if (isDragging) {
					isDragging = false;
					// Restore transition so open/close animations work later
					container.style.transition = "";
					header.style.cursor = "default";
					// Save settings when dragging ends
					ConsoleStorage.save();
				}
			});
		}

		// Window resizing

		const resizeHandles = $$(".resize-handle");
		resizeHandles.forEach(handle => {
			handle.addEventListener("mousedown", (e) => {
				// Don't allow resizing when maximized
				if (container.classList.contains("maximized")) return;

				if (e.button === 0) { // Left mouse button
					isResizing = true;
					resizeDirection = handle.dataset.direction;

					const rect = container.getBoundingClientRect();
					const zoomScale = currentZoom || 1.0;
					startRect = {
						width: rect.width / zoomScale,
						height: rect.height / zoomScale,
						left: rect.left,
						top: rect.top
					};
					startMouse = {x: e.clientX, y: e.clientY};

					// Switch to absolute positioning if not already
					if (container.style.bottom !== "auto") {
						container.style.transition = "none";
						container.style.left = rect.left + "px";
						container.style.top = rect.top + "px";
						container.style.bottom = "auto";
					}

					e.preventDefault();
					e.stopPropagation();
				}
			});
		});

		document.addEventListener("mousemove", (e) => {
			if (isResizing) {
				const deltaX = e.clientX - startMouse.x;
				const deltaY = e.clientY - startMouse.y;

				let newWidth = startRect.width;
				let newHeight = startRect.height;
				let newLeft = startRect.left;
				let newTop = startRect.top;

				// Handle different resize directions
				if (resizeDirection.includes('e')) {
					newWidth = startRect.width + deltaX;
				}
				if (resizeDirection.includes('w')) {
					newWidth = startRect.width - deltaX;
					newLeft = startRect.left + deltaX;
				}
				if (resizeDirection.includes('s')) {
					newHeight = startRect.height + deltaY;
				}
				if (resizeDirection.includes('n')) {
					newHeight = startRect.height - deltaY;
					newTop = startRect.top + deltaY;
				}

				// Create temporary rect for clamping, accounting for zoom scale
				const zoomScale = currentZoom || 1.0;
				const tempRect = {
					left: newLeft,
					top: newTop,
					width: newWidth / zoomScale,
					height: newHeight / zoomScale,
					right: newLeft + (newWidth / zoomScale),
					bottom: newTop + (newHeight / zoomScale)
				};

				// Clamp to viewport
				const clampedRect = ConsoleStorage.clampToViewport(container, tempRect);
				if (clampedRect) {
					// Apply the clamped dimensions and position
					container.style.width = clampedRect.width + "px";
					container.style.height = clampedRect.height + "px";
					container.style.left = clampedRect.left + "px";
					container.style.top = clampedRect.top + "px";
				}
			}
		});

		document.addEventListener("mouseup", () => {
			if (isResizing) {
				isResizing = false;
				resizeDirection = "";
				// Restore transition so open/close animations work later
				container.style.transition = "";
				// Save settings when resizing ends
				ConsoleStorage.save();
			}
		});

		$$(".theme-option").forEach((opt) => {
			opt.addEventListener("click", () => {
				ThemeManager.set(opt.dataset.theme);
				ThemeManager.closeDropdown();
				Toast.show(`Theme: ${opt.textContent.trim()}`, "fa-palette");
			});
		});
		document.addEventListener("click", () => ThemeManager.closeDropdown());

		// Command input
		if (input) {
			// Add click-to-focus as fallback
			input.addEventListener("click", () => {
				if (!input.matches(":focus")) {
					input.focus();
				}
			});

			// Insert/Overwrite mode functionality
			ConsoleEngine.insertMode = true; // Default to insert mode

			// Function to update cursor style based on mode
			const updateCursorStyle = () => {
				if (ConsoleEngine.insertMode) {
					input.classList.remove('overwrite-mode');
					input.classList.add('insert-mode');
					input.style.caretShape = 'bar'; // Insert mode cursor (I-beam)
				} else {
					input.classList.remove('insert-mode');
					input.classList.add('overwrite-mode');
					input.style.caretShape = 'block'; // Overwrite mode cursor (block)
				}
			};

			// Function to toggle insert/overwrite mode
			const toggleInsertMode = () => {
				ConsoleEngine.insertMode = !ConsoleEngine.insertMode;
				updateCursorStyle();

				// Save mode to local storage
				try {
					localStorage.setItem('console_insert_mode', ConsoleEngine.insertMode.toString());
				} catch (e) {
					console.warn("Failed to save insert mode state:", e);
				}

				// Show toast notification
				Toast.show(ConsoleEngine.insertMode ? "Insert mode" : "Overwrite mode",
					ConsoleEngine.insertMode ? "fa-i-cursor" : "fa-i-cursor");
			};

			// Keydown handler for insert/overwrite mode and other keys
			input.addEventListener("keydown", (e) => {
				// Handle tilde key in input field
				if (e.key === "`" || e.key === "~") {
					e.preventDefault();
					e.stopPropagation();
					// Only allow tilde to close console if it's open
					if (ConsoleEngine.isOpen) {
						// Let Lua handle closing via key binding
						ConsoleEngine.toggle(false);
					}
					return;
				}

				// Handle Insert key
				if (e.key === "Insert") {
					e.preventDefault();
					toggleInsertMode();
					return;
				}

				// Handle Enter key
				if (e.key === "Enter") {
					const val = input.value;
					input.value = "";
					// Trigger input event to ensure state update
					input.dispatchEvent(new Event('input', {bubbles: true}));
					Autocomplete.hide();
					ConsoleEngine.execute(val);
					// Double-check state update after command execution
					if (enterBtn) setTimeout(updateEnterButtonState, 0);
					return;
				}

				// Handle Tab key
				if (e.key === "Tab") {
					e.preventDefault();
					if (Autocomplete.items.length > 0) {
						// Complete the selected suggestion
						Autocomplete.confirmSelection();
					} else {
						// Request suggestions if none are shown
						Autocomplete.requestSuggestions(input);
					}
					return;
				}

				// Handle Arrow keys
				if (e.key === "ArrowUp") {
					e.preventDefault();
					if (Autocomplete.items.length > 0) {
						Autocomplete.navigate(-1);
					} else {
						const prev = HistoryManager.up();
						if (prev !== null) {
							input.value = prev;
							// Update Enter button state after history navigation
							if (enterBtn) updateEnterButtonState();
						}
					}
					return;
				}

				if (e.key === "ArrowDown") {
					e.preventDefault();
					if (Autocomplete.items.length > 0) {
						Autocomplete.navigate(1);
					} else {
						const next = HistoryManager.down();
						if (next !== null) {
							input.value = next;
							// Update Enter button state after history navigation
							if (enterBtn) updateEnterButtonState();
						}
					}
					return;
				}

				// Handle Escape key
				if (e.key === "Escape") {
					e.preventDefault();
					e.stopPropagation();
					Autocomplete.hide();
					return;
				}

				// Handle Backspace key
				if (e.key === "Backspace") {
					// Hide autocomplete when deleting
					Autocomplete.hide();
					return;
				}

				// Handle zoom shortcuts with CTRL
				if (e.ctrlKey || e.metaKey) {
					if (e.key === "=" || e.key === "+") {
						e.preventDefault();
						// Zoom in
						if (currentZoom < 2.0) {
							currentZoom = Math.min(2.0, currentZoom + 0.1);
							updateZoom();
						}
						return;
					}
					if (e.key === "-") {
						e.preventDefault();
						// Zoom out
						if (currentZoom > 0.5) {
							currentZoom = Math.max(0.5, currentZoom - 0.1);
							updateZoom();
						}
						return;
					}
					if (e.key === "0") {
						e.preventDefault();
						// Reset zoom
						currentZoom = 1.0;
						updateZoom();
						return;
					}
				}

				// Handle overwrite mode character input
				if (!ConsoleEngine.insertMode && !e.ctrlKey && !e.metaKey && !e.altKey) {
					// Only handle character input keys in overwrite mode
					if (e.key.length === 1) {
						const start = input.selectionStart;
						const end = input.selectionEnd;
						const value = input.value;

						// If we have a selection, delete it first
						if (start !== end) {
							const newValue = value.substring(0, start) + value.substring(end);
							input.value = newValue;
							input.setSelectionRange(start, start);
						}

						// Overwrite the character at cursor position
						if (start < value.length) {
							const newValue = value.substring(0, start) + e.key + value.substring(start + 1);
							input.value = newValue;
							input.setSelectionRange(start + 1, start + 1);
						} else {
							// At end of input, just append
							const newValue = value + e.key;
							input.value = newValue;
							input.setSelectionRange(start + 1, start + 1);
						}
						e.preventDefault();

						// Trigger autocompletion update in overwrite mode
						if (window.Autocomplete) {
							setTimeout(() => {
								window.Autocomplete.requestSuggestions(input);
							}, 10);
						}
					}
				}
			});

			// Restore insert mode from local storage
			try {
				const savedInsertMode = localStorage.getItem('console_insert_mode');
				if (savedInsertMode) {
					ConsoleEngine.insertMode = savedInsertMode === 'true';
					updateCursorStyle();
				}
			} catch (e) {
				console.warn("Failed to restore insert mode state:", e);
			}

			// Enter button functionality
			const enterBtn = $("#enterBtn");

			// Function to update Enter button state
			const updateEnterButtonState = () => {
				if (enterBtn) {
					const trimmedValue = input.value.trim();
					const hasContent = trimmedValue.length > 0;
					enterBtn.disabled = !hasContent;
					enterBtn.classList.toggle("disabled", !hasContent);
				}
			};

			if (enterBtn) {
				// Initial state
				updateEnterButtonState();

				// Update state on input
				input.addEventListener("input", updateEnterButtonState);

				enterBtn.addEventListener("click", () => {
					const val = input.value.trim();
					if (val.length > 0) {
						input.value = "";
						// Trigger input event to ensure state update
						input.dispatchEvent(new Event('input', {bubbles: true}));
						Autocomplete.hide();
						ConsoleEngine.execute(val);
						// Double-check state update after command execution
						setTimeout(updateEnterButtonState, 0);
					}
				});
			}

			// Track caret position on click and keyup
			input.addEventListener("click", () => {
				Autocomplete.updateCaretPosition(input);
			});

			input.addEventListener("keyup", () => {
				Autocomplete.updateCaretPosition(input);
			});

			input.addEventListener("select", () => {
				Autocomplete.updateCaretPosition(input);
			});

			// Track whether we just handled a delete operation to prevent immediate resuggestion
			let justDeleted = false;

			input.addEventListener("keydown", (e) => {
				if (e.key === "Backspace" || e.key === "Delete") {
					justDeleted = true;
				} else {
					justDeleted = false;
				}
			});

			input.addEventListener("input", () => {
				Autocomplete.updateCaretPosition(input);
				const val = input.value;

				// If we just deleted, hide autocomplete and don't immediately request new suggestions
				if (justDeleted) {
					Autocomplete.hide();
					justDeleted = false;
					// Wait a bit before allowing normal suggestions to resume
					setTimeout(() => {
						if (input.value.length >= 1) {
							Autocomplete.requestSuggestions(input);
						}
					}, 50);
					return;
				}

				if (val.length >= 1) {
					// Request suggestions from Lua intellisense
					Autocomplete.requestSuggestions(input);
				} else {
					Autocomplete.hide();
				}
			});

			// Hide autocomplete when input loses focus
			input.addEventListener("blur", () => {
				Autocomplete.hide();
			});
		}

		// Manual scroll detection
		if (consoleOutput) {
			// Scrollbar fade animation
			let scrollbarFadeTimeout;
			let isScrollbarVisible = true;
			let isWheelScrolling = false; // Track if scroll was caused by wheel

			// Function to check if scrollbar should be visible
			function updateScrollbarVisibility() {
				const hasScrollableContent = consoleOutput.scrollHeight > consoleOutput.clientHeight;
				if (!hasScrollableContent) {
					hideScrollbar();
				} else {
					showScrollbar();
				}
			}

			function showScrollbar() {
				consoleOutput.classList.remove("fade-scrollbar");
				isScrollbarVisible = true;
				clearTimeout(scrollbarFadeTimeout);
			}

			function hideScrollbar() {
				consoleOutput.classList.add("fade-scrollbar");
				isScrollbarVisible = false;
			}

			// Show scrollbar when hovering over console output
			consoleOutput.addEventListener("mouseenter", showScrollbar);
			consoleOutput.addEventListener("mouseleave", () => {
				// Hide scrollbar after 2 seconds of inactivity
				scrollbarFadeTimeout = setTimeout(hideScrollbar, 2000);
			});

			// Update scrollbar visibility on content changes
			const observer = new MutationObserver(() => {
				updateScrollbarVisibility();
			});
			observer.observe(consoleOutput, {
				childList: true,
				subtree: true,
				attributes: false
			});

			// Initial scrollbar visibility check
			updateScrollbarVisibility();

			// Handle wheel events to detect scroll direction and disable auto-scroll when scrolling up
			consoleOutput.addEventListener("wheel", (e) => {
				// Detect scroll direction
				const scrollDirection = e.deltaY;

				// Check if there's actually scrollable content (not at the top)
				const hasScrollableContent = consoleOutput.scrollTop > 0;

				// Check if this is an actual scroll event (not just wheel press)
				const isActualScroll = Math.abs(e.deltaY) > 0;

				// Only disable auto-scroll if:
				// 1. Auto-scroll is enabled
				// 2. User is actually scrolling (not just pressing wheel)
				// 3. There's scrollable content to scroll through
				// 4. User is scrolling up
				if (ConsoleEngine.autoScroll && isActualScroll && hasScrollableContent && scrollDirection < 0) {
					ConsoleEngine.autoScroll = false;
					if (autoScrollBtn) autoScrollBtn.classList.remove("active");

					// Show feedback that auto-scroll was disabled
					Toast.show("Auto-scroll disabled", "fa-arrow-up", 1500);

					// Save auto-scroll state
					try {
						localStorage.setItem('console_auto_scroll', ConsoleEngine.autoScroll.toString());
						ConsoleStorage.save();
					} catch (e) {
						console.warn("Failed to save auto-scroll state:", e);
					}
				}

				// Set wheel scrolling flag to prevent scroll event handler from triggering
				isWheelScrolling = true;
				isUserScrolling = true;
				showScrollbar();
				clearTimeout(scrollTimeout);
				scrollTimeout = setTimeout(() => {
					isUserScrolling = false;
					isWheelScrolling = false; // Reset flag after delay
				}, 150);

				// Hide scrollbar after scrolling stops
				clearTimeout(scrollbarFadeTimeout);
				scrollbarFadeTimeout = setTimeout(hideScrollbar, 2000);
			});

			consoleOutput.addEventListener("touchstart", () => {
				isUserScrolling = true;
				showScrollbar();
				clearTimeout(scrollTimeout);
				scrollTimeout = setTimeout(() => {
					isUserScrolling = false;
				}, 150);

				// Hide scrollbar after touch scrolling stops
				clearTimeout(scrollbarFadeTimeout);
				scrollbarFadeTimeout = setTimeout(hideScrollbar, 2000);
			});

			// Show scrollbar when mouse moves over console output
			consoleOutput.addEventListener("mousemove", () => {
				if (!isScrollbarVisible) {
					showScrollbar();
				}
				clearTimeout(scrollbarFadeTimeout);
				scrollbarFadeTimeout = setTimeout(hideScrollbar, 2000);
			});

			consoleOutput.addEventListener("scroll", () => {
				// Ignore scroll events caused by wheel scrolling to prevent spam
				if (isWheelScrolling) return;

				const atBottom =
					consoleOutput.scrollHeight - consoleOutput.scrollTop - consoleOutput.clientHeight < 50;

				// Only disable auto-scroll if user is actually scrolling and not at bottom
				if (isUserScrolling && ConsoleEngine.autoScroll && !atBottom) {
					ConsoleEngine.autoScroll = false;
					if (autoScrollBtn) autoScrollBtn.classList.remove("active");

					// Show subtle feedback that auto-scroll was disabled
					Toast.show("Auto-scroll disabled", "fa-arrow-up", 1500);

					// Save auto-scroll state
					try {
						localStorage.setItem('console_auto_scroll', ConsoleEngine.autoScroll.toString());
						ConsoleStorage.save();
					} catch (e) {
						console.warn("Failed to save auto-scroll state:", e);
					}
				}

				// Automatically re-enable auto-scroll when user scrolls to bottom
				if (isUserScrolling && !ConsoleEngine.autoScroll && atBottom) {
					ConsoleEngine.autoScroll = true;
					if (autoScrollBtn) autoScrollBtn.classList.add("active");

					// Show subtle feedback that auto-scroll was re-enabled
					Toast.show("Auto-scroll enabled", "fa-arrow-down", 1500);

					// Save auto-scroll state
					try {
						localStorage.setItem('console_auto_scroll', ConsoleEngine.autoScroll.toString());
						ConsoleStorage.save();
					} catch (e) {
						console.warn("Failed to save auto-scroll state:", e);
					}
				}
			});
		}
	});

	// ConsoleReady event - signal Lua that JS is ready
	const onReady = () => {
		Events.Call("ConsoleReady");
	};
	window.onload = onReady;
</script>
</body>
