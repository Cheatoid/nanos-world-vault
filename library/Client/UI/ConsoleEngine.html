<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<link
		href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap"
		rel="stylesheet"/>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
	<style>
		/* ========== CSS Variables / Theme System ========== */
		:root {
			--console-font: "JetBrains Mono", monospace;
			--title-font: "Orbitron", sans-serif;
			--transition-speed: 0.35s;
			--console-radius: 8px;
			--scrollbar-width: 6px;
		}

		/* Theme: Amber (default) */
		[data-theme="amber"] {

			--bg-secondary: #141410;

			--accent-bright: #f0c040;
			--log-color: #c8bca8;
			--info-color: #7eb8da;
			--warn-color: #d4a017;

		/* Theme: Arctic */
		[data-theme="arctic"] {
			--bg-primary: #f0f4f8;
			--bg-secondary: #e4eaf0;
			--bg-tertiary: #d8e0e8;
			--bg-input: #ffffff;
			--border-color: #b0c0d0;
			--border-glow: #0891b240;
			--text-primary: #1a2a3a;

			--accent-dim: #0891b218;

		/* Theme: Aurora */
		[data-theme="aurora"] {
			--bg-primary: #0f1419;
			--bg-secondary: #131c24;
			--bg-tertiary: #1a2630;
			--bg-input: #111820;
			--border-color: #1e2d3a;

		/* Theme: Blood Moon */

			--bg-secondary: #140808;
			--bg-tertiary: #1e0c0c;
			--bg-input: #100606;

			--cmd-color: #ff2020;
			--scrollbar-thumb: #3d1515;
			--scrollbar-track: #0a0404;
			--scrollbar-thumb-hover: #5d2020;
			--scrollbar-thumb-active: #7d3030;

		}

		/* Fix bloodmoon theme hover brightness */
		[data-theme="bloodmoon"] .msg-entry:hover {
			background: rgba(255, 32, 32, 0.1);
		}

		/* Theme: Cyberpunk */
		[data-theme="cyberpunk"] {
			--bg-primary: #08080f;
			--bg-secondary: #0e0e1a;
			--bg-tertiary: #161628;
			--bg-input: #0a0a14;
			--border-color: #2a1a3d;
			--border-glow: #e040fb40;
			--text-primary: #e0e0f0;
			--text-secondary: #8888aa;
			--text-muted: #4a4a6a;
			--accent: #e040fb;
			--accent-dim: #e040fb25;
			--accent-bright: #ff70ff;
			--log-color: #b0b0cc;
			--info-color: #40c4ff;
			--warn-color: #ffab40;
			--error-color: #ff5252;
			--debug-color: #7a7a9a;
			--success-color: #69f0ae;
			--cmd-color: #e040fb;
			--scrollbar-thumb: #2a1a3d;
			--scrollbar-track: #08080f;
			--scrollbar-thumb-hover: #3a2a4d;
			--scrollbar-thumb-active: #4a3a5d;
			--glow-color: #e040fb10;
			--badge-bg: #e040fb20;
			--overlay-bg: #08080fe0;
			--header-bg: linear-gradient(180deg, #14142a 0%, #08080f 100%);
			--particle-color: #e040fb;
			--selection-color: #e040fb40;
		}

		/* Theme: Matrix */
		[data-theme="matrix"] {
			--bg-primary: #000a00;
			--bg-secondary: #001200;
			--bg-tertiary: #001a00;
			--bg-input: #000e00;
			--border-color: #003a00;
			--border-glow: #00ff4140;
			--text-primary: #c0f0c0;
			--text-secondary: #5a9a5a;
			--text-muted: #2a5a2a;
			--accent: #00ff41;
			--accent-dim: #00ff4120;
			--accent-bright: #40ff70;
			--log-color: #80c080;
			--info-color: #40c0ff;
			--warn-color: #c0c040;
			--error-color: #ff4040;
			--debug-color: #407040;
			--success-color: #00ff41;
			--cmd-color: #00ff41;
			--scrollbar-thumb: #003a00;
			--scrollbar-track: #000a00;
			--scrollbar-thumb-hover: #004a00;
			--scrollbar-thumb-active: #005a00;
			--glow-color: #00ff4108;
			--badge-bg: #00ff4118;
			--overlay-bg: #000a00e0;
			--header-bg: linear-gradient(180deg, #001a00 0%, #000a00 100%);
			--particle-color: #00ff41;
			--selection-color: #00ff4140;
		}

		/* Theme: Midnight */
		[data-theme="midnight"] {
			--bg-primary: #121315;
			--bg-secondary: #16181a;
			--bg-tertiary: #1a1c1f;
			--bg-input: #1e2023;
			--border-color: #252629;
			--border-glow: #007acc40;
			--text-primary: #d4d4d4;
			--text-secondary: #a0a0a0;
			--text-muted: #808080;
			--accent: #007acc;
			--accent-dim: #007acc30;
			--accent-bright: #4fc1ff;
			--log-color: #cccccc;
			--info-color: #4fc1ff;
			--warn-color: #dcdcaa;
			--error-color: #f44747;
			--debug-color: #646464;
			--success-color: #89d185;
			--cmd-color: #007acc;
			--scrollbar-thumb: #2a2c2f;
			--scrollbar-track: #121315;
			--scrollbar-thumb-hover: #3a3c3f;
			--scrollbar-thumb-active: #4a4c4f;
			--glow-color: #4fc1ff12;
			--badge-bg: #007acc25;
			--overlay-bg: #121315e0;
			--header-bg: linear-gradient(180deg, #1a1c20 0%, #121315 100%);
			--particle-color: #4fc1ff;
			--selection-color: #007acc40;
		}

		/* Theme: Glass */
		[data-theme="glass"] {
			--bg-primary: #0a0e18;
			--bg-secondary: rgba(20, 30, 50, 0.6);
			--bg-tertiary: rgba(30, 45, 70, 0.6);
			--bg-input: rgba(15, 25, 40, 0.6);
			--border-color: rgba(100, 180, 255, 0.6);
			--border-glow: rgba(0, 212, 255, 0.6);
			--text-primary: #e8f4ff;
			--text-secondary: #7a9cc8;
			--text-muted: #5a7aa8;
			--accent: #00d4ff;
			--accent-dim: rgba(0, 212, 255, 0.6);
			--accent-bright: #40e0ff;
			--log-color: #c8d8e8;
			--info-color: #64d2ff;
			--warn-color: #ffb74d;
			--error-color: #ff6b6b;
			--debug-color: #607080;
			--success-color: #69f0ae;
			--cmd-color: #00d4ff;
			--scrollbar-thumb: rgba(100, 180, 255, 0.6);
			--scrollbar-track: #0a0e18;
			--scrollbar-thumb-hover: rgba(120, 200, 255, 0.8);
			--scrollbar-thumb-active: rgba(140, 220, 255, 0.9);
			--glow-color: rgba(0, 212, 255, 0.15);
			--badge-bg: rgba(0, 212, 255, 0.6);
			--overlay-bg: rgba(10, 14, 24, 0.6);
			--header-bg: rgba(15, 25, 40, 0.6);
			--particle-color: #00d4ff;
			--selection-color: rgba(0, 212, 255, 0.4);
		}

		/* ========== Reset & Base ========== */
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		/* Disable user selection on non-input controls */
		button, .header-btn, .filter-chip, .theme-toggle-btn,
		.auto-scroll-toggle, .regex-toggle, .console-toggle,
		.msg-action-btn, .welcome-close, .theme-option,
		.welcome-banner, .welcome-banner h2, .welcome-banner p,
		.welcome-banner kbd, .console-header, .header-stats,
		.console-toolbar, .search-box, .input-wrapper,
		.input-prompt, .enter-button, .empty-state {
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
		}

		/* Allow selection only on actual message text and input content */
		.msg-text, .console-input:focus, .console-input:not(:placeholder-shown) {
			-webkit-user-select: text;
			-moz-user-select: text;
			-ms-user-select: text;
			user-select: text;
		}

		/* Prevent selection of placeholder text */
		.console-input::placeholder, .search-input::placeholder {
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
		}

		/* ========== Text Selection ========== */
		::selection {
			background: var(--selection-color);
			color: var(--text-primary);
		}

		html,
		body {
			margin: 0;
			padding: 0;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: transparent !important;
			font-family: var(--console-font);
			color: var(--text-primary);
			transition: background var(--transition-speed),
			color var(--transition-speed);
		}

		/* ========== Scrollbar ========== */
		::-webkit-scrollbar {
			width: var(--scrollbar-width);
		}

		::-webkit-scrollbar-track {
			background: var(--scrollbar-track);
		}

		::-webkit-scrollbar-thumb {
			background: var(--scrollbar-thumb);
			border-radius: 3px;
		}

		/* Autocomplete scrollbar */
		.autocomplete::-webkit-scrollbar {
			width: var(--scrollbar-width);
		}

		.autocomplete::-webkit-scrollbar-track {
			background: var(--scrollbar-track);
		}

		.autocomplete::-webkit-scrollbar-thumb {
			background: var(--scrollbar-thumb);
			border-radius: 0;
		}

		::-webkit-scrollbar-thumb:hover {
			background: var(--accent);
		}

		/* ========== Background Canvas ========== */
		#bgCanvas {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
			pointer-events: none;
			opacity: 0.4;
			background: transparent !important;
		}

		/* ========== Toggle Button ========== */
		.console-toggle {
			position: fixed;
			bottom: 24px;
			right: 24px;
			z-index: 1001;
			width: 52px;
			height: 52px;
			border: 1px solid var(--border-color);
			border-radius: 50%;
			background: var(--bg-secondary);
			color: var(--accent);
			font-size: 20px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all var(--transition-speed);
			box-shadow: 0 0 20px var(--glow-color),
			0 4px 12px rgba(0, 0, 0, 0.4);
		}

		.console-toggle:hover {
			background: var(--accent-dim);
			border-color: var(--accent);
			transform: scale(1.08);
			box-shadow: 0 0 30px var(--border-glow),
			0 4px 16px rgba(0, 0, 0, 0.5);
		}

		.console-toggle .badge {
			position: absolute;
			top: -4px;
			right: -4px;
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: var(--error-color);
			color: #fff;
			font-size: 10px;
			font-weight: 700;
			display: flex;
			align-items: center;
			justify-content: center;
			opacity: 0;
			transform: scale(0);
			transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
		}

		.console-toggle .badge.visible {
			opacity: 1;
			transform: scale(1);
		}

		/* Hide toggle button when console is open */
		.console-container.open {
			/* Console is open - hide toggle button */
		}

		.console-container.open ~ .console-toggle,
		body > .console-toggle {
			opacity: 0;
			transform: scale(0.8);
			pointer-events: none;
		}

		/* Show toggle button when console is closed */
		.console-container:not(.open) ~ .console-toggle,
		.console-container:not(.open) + .console-toggle {
			opacity: 1;
			transform: scale(1);
			pointer-events: all;
		}

		/* ========== Console Container ========== */
		.console-container {
			position: fixed;
			bottom: -70vh;
			left: calc(50% - min(48vw, 550px));
			width: min(96vw, 1100px);
			min-width: 640px;
			height: 70vh;
			min-height: 400px;
			max-height: 85vh;
			z-index: 999;
			pointer-events: auto;
			display: flex;
			flex-direction: column;
			border: 1px solid var(--border-color);
			border-bottom: none;
			border-radius: var(--console-radius) var(--console-radius) 0 0;
			background: var(--bg-primary);
			box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6),
			0 0 60px var(--glow-color),
			inset 0 1px 0 var(--border-glow);
			transition: opacity 0.4s ease;
			opacity: 0;
			overflow: hidden;
		}

		[data-theme="glass"] .console-container {
			background: var(--bg-secondary);
			position: relative;
		}

		[data-theme="glass"] .console-container::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: var(--bg-secondary);
			backdrop-filter: blur(12px);
			z-index: -1;
		}

		.console-container.open {
			bottom: 0;
			opacity: 1;
		}

		/* Resize handles */
		.resize-handle {
			position: absolute;
			background: transparent;
			z-index: 1001;
		}

		.resize-handle.resize-n {
			top: 0;
			left: 8px;
			right: 8px;
			height: 4px;
			cursor: ns-resize;
		}

		.resize-handle.resize-ne {
			top: 0;
			right: 0;
			width: 8px;
			height: 8px;
			cursor: nesw-resize;
		}

		.resize-handle.resize-e {
			top: 8px;
			right: 0;
			bottom: 8px;
			width: 4px;
			cursor: ew-resize;
		}

		.resize-handle.resize-se {
			bottom: 0;
			right: 0;
			width: 8px;
			height: 8px;
			cursor: nwse-resize;
		}

		.resize-handle.resize-s {
			bottom: 0;
			left: 8px;
			right: 8px;
			height: 4px;
			cursor: ns-resize;
		}

		.resize-handle.resize-sw {
			bottom: 0;
			left: 0;
			width: 8px;
			height: 8px;
			cursor: nesw-resize;
		}

		.resize-handle.resize-w {
			top: 8px;
			left: 0;
			bottom: 8px;
			width: 4px;
			cursor: ew-resize;
		}

		.resize-handle.resize-nw {
			top: 0;
			left: 0;
			width: 8px;
			height: 8px;
			cursor: nwse-resize;
		}

		/* Hide resize handles when maximized */
		.console-container.maximized .resize-handle {
			display: none;
		}

		/* Add visual feedback on hover */
		.resize-handle:hover {
			background: var(--accent-dim);
		}

		.resize-handle.resize-n:hover,
		.resize-handle.resize-s:hover {
			background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
		}

		.resize-handle.resize-e:hover,
		.resize-handle.resize-w:hover {
			background: linear-gradient(180deg, transparent, var(--accent-dim), transparent);
		}

		.console-container.maximized {
			width: 100vw !important;
			height: 100vh !important;
			max-height: 100vh !important;
			border-radius: 0 !important;
			left: 0 !important;
			top: 0 !important;
			bottom: auto !important;
		}

		/* ========== Header ========== */
		.console-header {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 10px 16px;
			background: var(--header-bg);
			border-bottom: 1px solid var(--border-color);
			flex-shrink: 0;
			user-select: none;
		}

		.console-title {
			font-family: var(--title-font);
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 2px;
			color: var(--accent);
			text-transform: uppercase;
			white-space: nowrap;
		}

		.console-title .dot {
			display: inline-block;
			width: 7px;
			height: 7px;
			border-radius: 50%;
			background: var(--accent);
			margin-right: 8px;
			box-shadow: 0 0 8px var(--accent);
			animation: pulse-dot 2s ease-in-out infinite;
		}

		@keyframes pulse-dot {

			0%,
			100% {
				opacity: 1;
				box-shadow: 0 0 8px var(--accent);
			}

			50% {
				opacity: 0.5;
				box-shadow: 0 0 3px var(--accent);
			}
		}

		.header-stats {
			display: flex;
			gap: 10px;
			margin-left: auto;
			font-size: 11px;
			color: var(--text-muted);
		}

		.stat-item {
			display: flex;
			align-items: center;
			gap: 4px;
			padding: 2px 8px;
			border-radius: 4px;
			background: var(--bg-tertiary);
			border: 1px solid transparent;
			cursor: default;
			transition: all 0.2s;
		}

		.stat-item:hover {
			border-color: var(--border-color);
		}

		.stat-item .count {
			font-weight: 600;
			color: var(--text-secondary);
		}

		.stat-item.error-stat .count {
			color: var(--error-color);
		}

		.stat-item.warn-stat .count {
			color: var(--warn-color);
		}

		.header-actions {
			display: flex;
			gap: 4px;
			flex-shrink: 0;
		}

		.header-btn {
			width: 30px;
			height: 30px;
			border: 1px solid transparent;
			border-radius: 4px;
			background: transparent;
			color: var(--text-muted);
			font-size: 13px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.2s;
		}

		.header-btn:hover {
			color: var(--text-primary);
			background: var(--bg-tertiary);
			border-color: var(--border-color);
		}

		.header-btn.close-btn:hover {
			color: var(--error-color);
			background: #ff202015;
			border-color: #ff202030;
		}

		.header-btn#clearBtn:hover {
			color: #ff8c00;
			background: #ff8c0015;
			border-color: #ff8c0030;
		}

		/* ========== Client/Server Toggle ========== */
		.realm-toggle {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 4px 8px;
			border-radius: 4px;
			background: var(--bg-tertiary);
			border: 1px solid var(--border-color);
			margin-left: 12px;
		}

		.realm-toggle-label {
			font-size: 10px;
			font-weight: 600;
			color: var(--text-muted);
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}

		.realm-toggle-checkbox {
			position: relative;
			width: 60px;
			height: 24px;
			background: var(--bg-secondary);
			border: 1px solid var(--border-color);
			border-radius: 12px;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.realm-toggle-checkbox:hover {
			border-color: var(--accent);
		}

		.realm-toggle-slider {
			position: absolute;
			top: 1px;
			left: 2px;
			width: 20px;
			height: 20px;
			background: var(--text-muted);
			border-radius: 50%;
			transition: all 0.3s ease;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 10px;
			font-weight: 700;
			color: var(--bg-primary);
		}

		.realm-toggle-checkbox.server .realm-toggle-slider {
			left: 38px;
			background: var(--accent);
		}

		.realm-toggle-checkbox.client .realm-toggle-slider {
			left: 2px;
			background: var(--info-color);
		}

		/* ========== Enhanced Scrollbar ========== */
		.console-output {
			scrollbar-width: thick;
			scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
		}

		.console-output::-webkit-scrollbar {
			width: 12px;
		}

		.console-output::-webkit-scrollbar-track {
			background: var(--scrollbar-track);
			border-radius: 6px;
		}

		.console-output::-webkit-scrollbar-thumb {
			background: var(--scrollbar-thumb);
			border-radius: 6px;
			border: 2px solid var(--scrollbar-track);
			transition: all 0.3s ease;
			opacity: 0.7;
		}

		.console-output::-webkit-scrollbar-thumb:hover {
			background: var(--scrollbar-thumb-hover);
			opacity: 1;
		}

		.console-output::-webkit-scrollbar-thumb:active {
			background: var(--scrollbar-thumb-active);
		}

		/* Scrollbar fade animation */
		.console-output.fade-scrollbar::-webkit-scrollbar-thumb {
			opacity: 0.3;
			transition: opacity 0.5s ease;
		}

		.console-output.fade-scrollbar:hover::-webkit-scrollbar-thumb {
			opacity: 0.7;
		}

		.console-output.fade-scrollbar::-webkit-scrollbar-thumb:hover {
			opacity: 1;
		}

		/* ========== Custom Tooltip ========== */
		.custom-tooltip {
			position: absolute;
			background: var(--bg-secondary);
			border: 1px solid var(--border-color);
			border-radius: var(--console-radius);
			padding: 6px 10px;
			font-size: 11px;
			font-family: var(--console-font);
			font-weight: 500;
			color: var(--text-secondary);
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4),
			0 0 0 1px var(--border-glow),
			inset 0 1px 0 rgba(255, 255, 255, 0.1);
			z-index: 10000;
			opacity: 0;
			transform: translateY(-8px) scale(0.95);
			transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1),
			transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
			pointer-events: none;
			white-space: nowrap;
			max-width: 300px;
			backdrop-filter: blur(8px);
		}

		.custom-tooltip.visible {
			opacity: 1;
			transform: translateY(0) scale(1);
		}


		/* Theme-specific tooltip enhancements */
		[data-theme="glass"] .custom-tooltip {
			background: rgba(20, 20, 30, 0.9);
			backdrop-filter: blur(12px);
			border: 1px solid rgba(255, 255, 255, 0.1);
		}


		[data-theme="matrix"] .custom-tooltip {
			background: #0a0a0a;
			border-color: #00ff41;
			color: #00ff41;
			box-shadow: 0 0 20px rgba(0, 255, 65, 0.3),
			0 0 0 1px #00ff41;
		}


		/* ========== Toolbar ========== */
		.console-toolbar {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 8px 16px;
			border-bottom: 1px solid var(--border-color);
			background: var(--bg-secondary);
			flex-shrink: 0;
			flex-wrap: wrap;
		}

		.filter-chip {
			display: inline-flex;
			align-items: center;
			gap: 5px;
			padding: 3px 10px;
			border-radius: 12px;
			font-size: 11px;
			font-weight: 500;
			cursor: pointer;
			border: 1px solid var(--border-color);
			background: var(--bg-primary);
			color: var(--text-secondary);
			transition: all 0.2s;
			user-select: none;
			white-space: nowrap;
		}

		.filter-chip:hover {
			border-color: var(--text-muted);
		}

		.filter-chip.active {
			border-color: var(--accent);
			color: var(--accent);
			background: var(--accent-dim);
		}

		.filter-chip .chip-dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		.search-box {
			flex: 1;
			min-width: 220px;
			position: relative;
		}

		.search-icon-btn {
			position: absolute;
			left: 3px;
			top: 50%;
			transform: translateY(-50%);
			background: var(--accent-dim);
			border: none;
			color: var(--accent);
			font-size: 12px;
			cursor: pointer;
			padding: 4px;
			border-radius: 4px;
			transition: all 0.2s;
			opacity: 1;
			font-weight: bold;
		}

		.search-icon-btn:hover {
			color: var(--accent);
			background: var(--accent-dim);
			opacity: 1;
		}

		.search-icon-btn.regex-active {
			color: var(--accent);
			background: var(--accent-dim);
			opacity: 1;
			font-weight: bold;
		}

		.search-box input {
			width: 100%;
			padding: 5px 15px 5px 40px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			background: var(--bg-input);
			color: var(--text-primary);
			font-family: var(--console-font);
			font-size: 12px;
			outline: none;
			transition: all 0.2s;
		}

		.search-box input::placeholder {
			color: var(--text-muted);
		}

		.search-box input:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent-dim);
		}

		.search-box input:focus + i,
		.search-box input:focus ~ i {
			color: var(--accent);
		}

		.toolbar-sep {
			width: 1px;
			height: 20px;
			background: var(--border-color);
			flex-shrink: 0;
		}

		.theme-selector {
			position: relative;
		}

		.theme-btn {
			display: flex;
			align-items: center;
			gap: 6px;
			padding: 4px 10px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			background: var(--bg-primary);
			color: var(--text-secondary);
			font-family: var(--console-font);
			font-size: 11px;
			cursor: pointer;
			transition: all 0.2s;
			white-space: nowrap;
		}

		.theme-btn:hover {
			border-color: var(--accent);
			color: var(--accent);
		}

		.theme-swatch {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			border: 1px solid var(--border-color);
		}

		.theme-dropdown {
			position: fixed;
			min-width: 170px;
			border: 1px solid var(--border-color);
			border-radius: 6px;
			background: var(--bg-secondary);
			box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
			z-index: 99999;
			opacity: 0;
			transform: translateY(-6px);
			pointer-events: none;
			transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
			overflow: hidden;
		}

		.theme-dropdown.position-left {
			right: auto;
		}

		.theme-dropdown.open {
			opacity: 1;
			transform: translateY(0);
			pointer-events: all;
		}

		.theme-option {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 8px 14px;
			font-size: 12px;
			color: var(--text-secondary);
			cursor: pointer;
			transition: all 0.15s;
		}

		.theme-option:hover {
			background: var(--accent-dim);
			color: var(--text-primary);
		}

		.theme-option.active {
			color: var(--accent);
		}

		.theme-option .swatch {
			width: 14px;
			height: 14px;
			border-radius: 50%;
			border: 2px solid var(--border-color);
			flex-shrink: 0;
		}

		.auto-scroll-toggle {
			display: flex;
			align-items: center;
			gap: 5px;
			padding: 4px 10px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			background: var(--bg-primary);
			color: var(--text-muted);
			font-size: 11px;
			cursor: pointer;
			transition: all 0.2s;
			white-space: nowrap;
			user-select: none;
		}

		.auto-scroll-toggle.active {
			color: var(--accent);
			border-color: var(--accent);
			background: var(--accent-dim);
		}

		.timestamp-toggle {
			display: flex;
			align-items: center;
			gap: 5px;
			padding: 4px 10px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			background: var(--bg-primary);
			color: var(--text-muted);
			font-size: 11px;
			cursor: pointer;
			transition: all 0.2s;
			white-space: nowrap;
			user-select: none;
		}


		.timestamp-toggle.active {
			color: var(--accent);
			border-color: var(--accent);
			background: var(--accent-dim);
		}

		/* ========== Output Area ========== */
		.console-output {
			flex: 1;
			overflow-y: scroll;
			overflow-x: hidden;
			padding: 8px 0;
			scroll-behavior: smooth;
			position: relative;
			z-index: 1;
			/* Force scrolling to be visible */
			min-height: 200px;
		}

		/* ========== Message Entry ========== */
		.msg-entry {
			display: flex;
			align-items: flex-start;
			padding: 3px 16px;
			font-size: 12px;
			line-height: 1.6;
			gap: 8px;
			transition: background 0.15s;
			animation: msg-slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
			position: relative;
		}

		.msg-entry:hover {
			background: var(--glow-color);
		}

		.msg-entry.hidden {
			display: none;
		}

		@keyframes msg-slide-in {
			from {
				opacity: 0;
				transform: translateX(-8px);
			}

			to {
				opacity: 1;
				transform: translateX(0);
			}
		}

		.msg-timestamp {
			color: var(--text-muted);
			font-size: 11px;
			flex-shrink: 0;
			min-width: 72px;
			padding-top: 1px;
			font-variant-numeric: tabular-nums;
			user-select: none;
		}

		.msg-badge {
			display: inline-flex;
			align-items: center;
			padding: 0 6px;
			border-radius: 3px;
			font-size: 10px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.5px;
			flex-shrink: 0;
			min-width: 46px;
			justify-content: center;
			line-height: 1.7;
			user-select: none;
		}

		.msg-badge.log {
			background: var(--bg-tertiary);
			color: var(--log-color);
		}

		.msg-badge.info {
			background: #40c4ff15;
			color: var(--info-color);
		}

		.msg-badge.warn {
			background: #d4a01715;
			color: var(--warn-color);
		}

		.msg-badge.error {
			background: #e0525215;
			color: var(--error-color);
		}

		.msg-badge.debug {
			background: var(--bg-tertiary);
			color: var(--debug-color);
		}

		.msg-badge.success {
			background: #5cb85c15;
			color: var(--success-color);
		}

		.msg-badge.cmd {
			background: var(--accent-dim);
			color: var(--cmd-color);
		}

		.msg-text {
			flex: 1;
			word-break: break-word;
			color: var(--log-color);
		}

		.msg-text.warn-text {
			color: var(--warn-color);
		}

		.msg-text.error-text {
			color: var(--error-color);
		}

		.msg-text.info-text {
			color: var(--info-color);
		}

		.msg-text.debug-text {
			color: var(--debug-color);
		}

		.msg-text.success-text {
			color: var(--success-color);
		}

		.msg-text.cmd-text {
			color: var(--cmd-color);
		}

		.msg-text .highlight {
			background: var(--accent-dim);
			color: var(--accent-bright);
			border-radius: 2px;
			padding: 0 2px;
		}

		.msg-actions {
			display: flex;
			gap: 2px;
			opacity: 0;
			transition: opacity 0.15s;
			flex-shrink: 0;
		}

		.msg-entry:hover .msg-actions {
			opacity: 1;
		}

		.msg-action-btn {
			width: 22px;
			height: 22px;
			border: none;
			border-radius: 3px;
			background: transparent;
			color: var(--text-muted);
			font-size: 10px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.15s;
		}

		.msg-action-btn:hover {
			background: var(--bg-tertiary);
			color: var(--text-primary);
		}

		/* ========== Input Area ========== */
		.console-input-area {
			display: flex;
			align-items: center;
			gap: 0;
			padding: 8px 16px 12px;
			border-top: 1px solid var(--border-color);
			background: var(--bg-secondary);
			flex-shrink: 0;
			position: relative;
			z-index: 2;
		}

		.input-prompt {
			color: var(--accent);
			font-weight: 600;
			font-size: 13px;
			margin-right: 8px;
			flex-shrink: 0;
			text-shadow: 0 0 8px var(--border-glow);
		}

		.input-wrapper {
			flex: 1;
			position: relative;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.console-input {
			flex: 1;
			padding: 6px 12px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			background: var(--bg-input);
			color: var(--text-primary);
			font-family: var(--console-font);
			font-size: 13px;
			outline: none;
			transition: all 0.2s;
		}

		.console-input::placeholder {
			color: var(--text-muted);
			font-size: 12px;
		}

		.console-input:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent-dim),
			0 0 16px var(--glow-color);
		}

		.console-input.insert-mode {
			caret-shape: bar;
		}

		.console-input.overwrite-mode {
			caret-shape: block;
		}

		.enter-button {
			padding: 6px 12px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			background: var(--bg-secondary);
			color: var(--text-secondary);
			font-family: var(--console-font);
			font-size: 12px;
			font-weight: 500;
			cursor: pointer;
			transition: all 0.2s;
			display: flex;
			align-items: center;
			gap: 6px;
			white-space: nowrap;
			user-select: none;
			min-width: 70px;
			justify-content: center;
		}

		.enter-button:hover {
			border-color: var(--accent);
			background: var(--accent-dim);
			color: var(--accent);
			transform: translateY(-1px);
			box-shadow: 0 2px 8px var(--glow-color);
		}

		.enter-button:active {
			transform: translateY(0);
			box-shadow: 0 1px 4px var(--glow-color);
		}

		.enter-button i {
			font-size: 11px;
		}

		.enter-button:disabled,
		.enter-button.disabled {
			opacity: 0.5;
			cursor: not-allowed;
			pointer-events: none;
		}

		.enter-button:disabled:hover,
		.enter-button.disabled:hover {
			border-color: var(--border-color);
			background: var(--bg-secondary);
			color: var(--text-secondary);
			transform: none;
			box-shadow: none;
		}

		/* Responsive adjustments for mobile */
		@media (max-width: 640px) {
			.enter-button {
				padding: 5px 8px;
				font-size: 11px;
				min-width: 60px;
			}

			.enter-button span {
				display: none;
			}

			.console-input-area {
				padding: 6px 10px;
				gap: 6px;
			}
		}

		/* Autocomplete */
		.autocomplete {
			position: absolute;
			bottom: calc(100% + 4px);
			left: 0;
			min-width: 300px;
			max-width: 500px;
			max-height: 172px;
			overflow-y: auto;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			background: var(--bg-secondary);
			box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.4);
			z-index: 10;
			opacity: 0;
			transform: translateY(4px);
			pointer-events: none;
			transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
		}

		.autocomplete.visible {
			opacity: 1;
			transform: translateY(0);
			pointer-events: all;
		}

		.autocomplete-item {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 6px 12px;
			font-size: 12px;
			cursor: pointer;
			transition: background 0.1s;
			gap: 12px;
		}

		.autocomplete-item:hover,
		.autocomplete-item.selected {
			background: var(--accent-dim);
		}

		.autocomplete-item .cmd-name {
			color: var(--accent);
			font-weight: 500;
		}

		.autocomplete-item .cmd-hint {
			color: var(--text-muted);
			font-size: 11px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* ========== Toast ========== */
		.toast-container {
			position: fixed;
			bottom: 20px;
			right: 20px;
			z-index: 2000;
			display: flex;
			flex-direction: column;
			gap: 8px;
			user-select: none;
		}

		.toast {
			padding: 10px 16px;
			border-radius: 6px;
			background: var(--bg-secondary);
			border: 1px solid var(--border-color);
			color: var(--text-primary);
			font-family: var(--console-font);
			font-size: 12px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
			animation: toast-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
			display: flex;
			align-items: center;
			gap: 8px;
			user-select: none;
		}

		.toast.removing {
			animation: toast-out 0.25s ease-in both;
		}

		@keyframes toast-in {
			from {
				opacity: 0;
				transform: translateX(30px);
			}

			to {
				opacity: 1;
				transform: translateX(0);
			}
		}

		@keyframes toast-out {
			to {
				opacity: 0;
				transform: translateX(30px);
			}
		}

		/* ========== Welcome Banner ========== */
		.welcome-banner {
			padding: 16px;
			margin: 4px 16px 8px;
			border: 1px solid var(--border-color);
			border-radius: 6px;
			background: var(--bg-secondary);
			animation: msg-slide-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
			max-width: calc(100% - 32px); /* Prevent overflow beyond container */
			box-sizing: border-box;
		}

		.welcome-banner h2 {
			font-family: var(--title-font);
			font-size: 14px;
			font-weight: 700;
			color: var(--accent);
			letter-spacing: 2px;
			margin-bottom: 8px;
		}

		.welcome-banner p {
			font-size: 11px;
			color: var(--text-secondary);
			line-height: 1.7;
		}

		.welcome-banner kbd {
			display: inline-block;
			padding: 1px 6px;
			border: 1px solid var(--border-color);
			border-radius: 3px;
			background: var(--bg-tertiary);
			font-family: var(--console-font);
			font-size: 10px;
			color: var(--text-primary);
		}

		.welcome-close {
			position: absolute;
			top: 8px;
			right: 8px;
			width: 24px;
			height: 24px;
			border: none;
			background: transparent;
			color: var(--text-secondary);
			font-size: 18px;
			line-height: 1;
			cursor: pointer;
			border-radius: 4px;
			transition: all 0.2s;
		}

		.welcome-close:hover {
			background: var(--bg-tertiary);
			color: var(--text-primary);
		}

		/* ========== Empty State ========== */
		.empty-state {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 40px 20px;
			color: var(--text-muted);
			font-size: 13px;
			gap: 8px;
		}

		.empty-state i {
			font-size: 28px;
			opacity: 0.4;
		}

		/* ========== Theme Dropdown Chevron Animation ========== */
		.theme-btn .fa-chevron-up {
			transition: transform 0.3s ease;
		}

		.theme-btn[aria-expanded="true"] .fa-chevron-up {
			animation: chevronRotate 0.3s ease forwards;
		}

		@keyframes chevronRotate {
			0% {
				transform: rotate(0deg);
			}
			100% {
				transform: rotate(180deg);
			}
		}

		/* ========== Reduced Motion ========== */
		@media (prefers-reduced-motion: reduce) {

			*,
			*::before,
			*::after {
				animation-duration: 0.01ms !important;
				transition-duration: 0.01ms !important;
			}
		}

		/* ========== Responsive ========== */
		@media (max-width: 640px) {
			.console-container {
				width: 100vw;
				height: 80vh;
				border-radius: 0;
			}

			.header-stats {
				display: none;

			.console-toolbar {

				min-width: 38px;
				font-size: 9px;
				padding: 0 4px;
			}
		}
	</style>
</head>

<script>
	// NOTE: Must use 'var' because nanos world engine defines window.Events before this script runs.
	// Using 'const' or 'let' would cause a redeclaration error.
	// noinspection ES6ConvertVarToLetConst
	/** @type {{Call: function(string, ...any): void, Subscribe: function(string, function(...any)): void}} */
	var Events = window.Events || {
		// NOTE: These are placeholders for the actual events.
		// They will be replaced by the actual events when the window.Events object is available.
		// This is a fallback for when the window.Events object is not available (when using OS web browser).
		Call: function (event, ...args) {
			// console.log(`Calling Lua event: ${event}`, ...args);

			// Simulate autocomplete response for browser testing
			if (event === "GetAutocomplete") {
				setTimeout(() => {
					const [line, caret] = args;
					// console.log(`Simulating autocomplete response for: "${line}"`);

					// Simple mock suggestions
					const suggestions = ["help", "clear", "cls", "echo", "time", "date", "version", "theme", "reset"]
						.filter(cmd => cmd.startsWith(line.toLowerCase()))
						.map(cmd => ({name: cmd, desc: `Mock ${cmd} command`}));

					// Trigger the AutocompleteSuggestions handler
					const handlers = this._subscriptions?.["AutocompleteSuggestions"] || [];
					handlers.forEach(handler => {
						try {
							handler(suggestions);
						} catch (e) {
							console.error("Error in AutocompleteSuggestions handler:", e);
						}
					});
				}, 100); // Simulate network delay
			}
		},
		Subscribe: function (event, callback) {
			// console.log(`Subscribed to event: ${event}`, callback);
			if (!this._subscriptions) this._subscriptions = {};
			if (!this._subscriptions[event]) this._subscriptions[event] = [];
			this._subscriptions[event].push(callback);
		}
	};
	window.Events = window.Events || Events;

	//const clipboard_writeText = navigator.clipboard.writeText;
	navigator.clipboard.writeText = (text) => {
		Events.Call("CopyToClipboard", text);
		//return Promise.resolve(text);
	};

	// Utility
	const $ = (sel, ctx = document) => ctx.querySelector(sel);
	const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];
	const escHtml = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
	const now = () => {
		const d = new Date();
		return [d.getHours(), d.getMinutes(), d.getSeconds()].map((v) => String(v).padStart(2, "0")).join(":");
	};
	const getCS = (prop) => getComputedStyle(document.documentElement).getPropertyValue(prop).trim();

	// Toast System
	const Toast = {
		container: null,
		show(msg, icon = "fa-check", duration = 2500) {
			if (!this.container) this.container = $("#toastContainer");
			const el = document.createElement("div");
			el.className = "toast";
			el.innerHTML = `<i class="fas ${icon}" style="color:var(--accent)"></i>${escHtml(msg)}`;
			// Prepend to container so newest toast appears at top
			this.container.prepend(el);
			setTimeout(() => {
				el.classList.add("removing");
				el.addEventListener("animationend", () => el.remove());
			}, duration);
		},
	};
	window.Toast = Toast;

	// Custom Tooltip System
	const CustomTooltip = {
		tooltip: null,
		target: null,
		showTimeout: null,
		hideTimeout: null,

		init() {
			this.tooltip = document.createElement('div');
			this.tooltip.className = 'custom-tooltip';
			document.body.appendChild(this.tooltip);
		},

		getZoomLevel() {
			// Get browser zoom level using multiple methods for better compatibility
			const zoomLevel =
				window.devicePixelRatio &&
				window.devicePixelRatio !== 1 ? window.devicePixelRatio :
					window.outerWidth / window.innerWidth;

			// Fallback to 1 if detection fails
			return zoomLevel || 1;
		},

		show(element, text, position = 'top') {
			if (!this.tooltip) this.init();

			// Don't show tooltips when console is hidden
			const container = $("#consoleContainer");
			if (!container) {
				return;
			}

			// Check console visibility using multiple methods for reliability
			const isConsoleOpen = container.classList.contains("open") &&
				container.style.opacity !== "0" &&
				container.style.display !== "none";

			if (!isConsoleOpen) {
				return;
			}

			this.hide(); // Clear any existing tooltip

			this.tooltip.textContent = text;
			document.body.appendChild(this.tooltip);

			const tooltipRect = this.tooltip.getBoundingClientRect();

			// Store current mouse position and element reference
			this.target = element;
			this.currentPosition = position;

			// Position tooltip relative to cursor
			this.updateCursorPosition();

			// Show with slight delay for better UX
			this.showTimeout = setTimeout(() => {
				// Double-check console visibility before showing
				const container = $("#consoleContainer");
				const isConsoleOpen = container && container.classList.contains("open") &&
					container.style.opacity !== "0" &&
					container.style.display !== "none";
				if (isConsoleOpen && this.tooltip) {
					this.tooltip.classList.add('visible');
				}
			}, 300);
		},

		updateCursorPosition() {
			if (!this.tooltip || !this.target) return;

			const tooltipRect = this.tooltip.getBoundingClientRect();
			const mouseX = this.lastMouseX || 0;
			const mouseY = this.lastMouseY || 0;

			// Always position below cursor with small offset
			const offsetY = 25;

			// Calculate initial position - centered below cursor
			let left = mouseX - (tooltipRect.width / 2) + window.scrollX;
			let top = mouseY + offsetY + window.scrollY;

			// Ensure tooltip stays within viewport
			const viewportWidth = window.innerWidth;
			const viewportHeight = window.innerHeight;

			if (left < 10) left = 10;
			if (left + tooltipRect.width > viewportWidth - 10) {
				left = viewportWidth - tooltipRect.width - 10;
			}
			if (top < 10) top = 10;
			if (top + tooltipRect.height > viewportHeight - 10) {
				top = mouseY - tooltipRect.height - 10 + window.scrollY;
			}

			this.tooltip.style.left = left + 'px';
			this.tooltip.style.top = top + 'px';
		},

		hide() {
			if (this.showTimeout) {
				clearTimeout(this.showTimeout);
				this.showTimeout = null;
			}

			if (this.hideTimeout) {
				clearTimeout(this.hideTimeout);
				this.hideTimeout = null;
			}

			if (this.tooltip && this.tooltip.classList.contains('visible')) {
				this.tooltip.classList.remove('visible');
				this.hideTimeout = setTimeout(() => {
					if (this.tooltip && this.tooltip.parentNode) {
						this.tooltip.parentNode.removeChild(this.tooltip);
					}
				}, 200);
			}
		},

		attach(element, text, position = 'top') {
			const tooltip = this;

			const handleMouseEnter = (e) => {
				tooltip.lastMouseX = e.clientX;
				tooltip.lastMouseY = e.clientY;
				tooltip.show(element, text, position);
			};

			const handleMouseMove = (e) => {
				if (tooltip.target === element) {
					tooltip.lastMouseX = e.clientX;
					tooltip.lastMouseY = e.clientY;
					tooltip.updateCursorPosition();
				}
			};

			const handleMouseLeave = () => {
				tooltip.hide();
			};

			element.addEventListener('mouseenter', handleMouseEnter);
			element.addEventListener('mousemove', handleMouseMove);
			element.addEventListener('mouseleave', handleMouseLeave);
			element.addEventListener('focus', () => {
				tooltip.show(element, text, position);
			});
			element.addEventListener('blur', () => {
				this.hide();
			});
		}
	};
	window.CustomTooltip = CustomTooltip;

	// Console Storage Manager
	const ConsoleStorage = {
		STORAGE_KEY: "console_settings",

		// Clamp console to viewport boundaries
		clampToViewport(container, rect = null) {
			if (!container) return null;

			const currentRect = rect || container.getBoundingClientRect();
			const screenWidth = window.innerWidth;
			const screenHeight = window.innerHeight;
			const minWidth = 640;
			const minHeight = 400; // Matches CSS min-height: 400px

			// Calculate clamped dimensions
			let width = Math.max(minWidth, Math.min(currentRect.width, screenWidth));
			let height = Math.max(minHeight, Math.min(currentRect.height, screenHeight));

			// Calculate clamped position
			let left = Math.max(0, Math.min(currentRect.left, screenWidth - width));
			let top = Math.max(0, Math.min(currentRect.top, screenHeight - height));

			return {
				left: left,
				top: top,
				width: width,
				height: height,
				right: left + width,
				bottom: top + height
			};
		},

		// Apply clamped dimensions to container
		applyClampedDimensions(container, clampedRect) {
			if (!container || !clampedRect) return;

			container.style.transition = "none";
			container.style.left = clampedRect.left + "px";
			container.style.top = clampedRect.top + "px";
			container.style.width = clampedRect.width + "px";
			container.style.height = clampedRect.height + "px";
			container.style.bottom = "auto";

			// Restore transition after a short delay
			setTimeout(() => {
				container.style.transition = "";
			}, 100);
		},

		// Get current console state
		getCurrentState() {
			const container = $("#consoleContainer");
			if (!container) return null;

			const rect = container.getBoundingClientRect();
			const isMaximized = container.classList.contains("maximized");

			return {
				position: {
					left: rect.left,
					top: rect.top,
					right: rect.right,
					bottom: rect.bottom
				},
				size: {
					width: rect.width,
					height: rect.height
				},
				maximized: isMaximized,
				theme: ThemeManager.current,
				autoScroll: ConsoleEngine.autoScroll,
				realm: ConsoleEngine.currentRealm
			};
		},

		// Save current state to localStorage
		save() {
			try {
				const state = this.getCurrentState();
				if (state) {
					localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));
				}
			} catch (e) {
				console.warn("Failed to save console settings:", e);
			}
		},

		// Load state from localStorage
		load() {
			try {
				const saved = localStorage.getItem(this.STORAGE_KEY);
				return saved ? JSON.parse(saved) : null;
			} catch (e) {
				console.warn("Failed to load console settings:", e);
				return null;
			}
		},

		// Apply saved state to console
		restore() {
			const state = this.load();
			if (!state) return;

			const container = $("#consoleContainer");
			if (!container) return;

			// Restore theme first
			if (state.theme && ThemeManager.swatches[state.theme]) {
				ThemeManager.set(state.theme);
			}

			// Restore auto-scroll state
			if (typeof state.autoScroll === "boolean") {
				ConsoleEngine.autoScroll = state.autoScroll;
				const autoScrollBtn = $("#autoScrollBtn");
				if (autoScrollBtn) {
					autoScrollBtn.classList.toggle("active", state.autoScroll);
				}
			}

			// Restore realm state
			if (state.realm && (state.realm === "client" || state.realm === "server")) {
				ConsoleEngine.currentRealm = state.realm;
				// Update realm toggle UI if it exists
				const realmToggle = $("#realmToggle");
				if (realmToggle) {
					const slider = realmToggle.querySelector(".realm-toggle-slider");
					if (state.realm === "server") {
						realmToggle.classList.remove("client");
						realmToggle.classList.add("server");
						slider.textContent = "S";
						realmToggle.title = "Switch to CLIENT output realm";
					} else {
						realmToggle.classList.remove("server");
						realmToggle.classList.add("client");
						slider.textContent = "C";
						realmToggle.title = "Switch to SERVER output realm";
					}
				}
			}

			// Restore maximize state
			if (state.maximized) {
				container.classList.add("maximized");
				const maximizeBtn = $("#maximizeBtn");
				if (maximizeBtn) {
					maximizeBtn.innerHTML = '<i class="fas fa-compress"></i>';
				}
			} else {
				container.classList.remove("maximized");
				const maximizeBtn = $("#maximizeBtn");
				if (maximizeBtn) {
					maximizeBtn.innerHTML = '<i class="fas fa-expand"></i>';
				}

				// Restore position and size only if not maximized
				if (state.position && state.size) {
					// Create a temporary rect from saved state
					const savedRect = {
						left: state.position.left,
						top: state.position.top,
						width: state.size.width,
						height: state.size.height,
						right: state.position.left + state.size.width,
						bottom: state.position.top + state.size.height
					};

					// Clamp to current viewport
					const clampedRect = this.clampToViewport(container, savedRect);

					// Apply clamped dimensions
					this.applyClampedDimensions(container, clampedRect);
				}
			}
		},

		// Clear saved settings
		clear() {
			try {
				localStorage.removeItem(this.STORAGE_KEY);

		toggleDropdown() {
			const dd = $("#themeDropdown");
			if (!dd) return;
			const isOpen = dd.classList.contains("open");

			if (!isOpen) {
				// Calculate dropdown position with simple clamping to viewport bounds
				const btn = $("#themeToggleBtn");
				if (btn) {
					const btnRect = btn.getBoundingClientRect();
					const viewportWidth = window.innerWidth;
					const viewportHeight = window.innerHeight;
					const dropdownWidth = 170; // Approximate dropdown width
					const dropdownHeight = 280; // Approximate dropdown height (8 options * ~35px each)
					const margin = 10; // Safety margin from viewport edges

					// Reset any custom styles
					dd.classList.remove("position-left");
					dd.style.width = '';
					dd.style.maxHeight = '';
					dd.style.overflowY = '';

					// Simple positioning: position directly under button
					let leftPos = btnRect.left;
					let topPos = btnRect.bottom + 2;

					// Ensure dropdown stays within viewport bounds
					if (leftPos + dropdownWidth > viewportWidth) {
						leftPos = viewportWidth - dropdownWidth - margin;
					}
					if (leftPos < margin) {
						leftPos = margin;
					}

					// Apply position
					dd.style.left = leftPos + 'px';
					dd.style.top = topPos + 'px';
					dd.style.right = 'auto';
				}
			}

			dd.classList.toggle("open");

			const btn = $("#themeToggleBtn");
			if (btn) {
				btn.setAttribute("aria-expanded", !isOpen);
				// Trigger animation by removing and re-adding the class

	// History Manager
	const HistoryManager = {
		entries: [],
		index: -1,
		push(cmd) {
			if (cmd && cmd !== this.entries[this.entries.length - 1]) {
				this.entries.push(cmd);
				if (this.entries.length > 200) this.entries.shift();
			}
			this.index = this.entries.length;
		},
		up() {
			if (this.index > 0) {
				this.index--;
				return this.entries[this.index];
			}
			return null;
		},
		down() {
			if (this.index < this.entries.length - 1) {
				this.index++;
				return this.entries[this.index];
			}
			this.index = this.entries.length;
			return "";
		},
	};

	const CommandRegistry = {

		register(name, desc, fn, opts = {}) {

				opts.alias.forEach((a) => {
					this.commands[a] = this.commands[name];
				});
		},
		get(name) {

		match(prefix) {

	// Search / Filter
	const FilterManager = {
		activeFilters: new Set(["all"]), // Default to all filters active
		searchQuery: "",
		regexMode: false,

		setFilter(type) {
			if (type === "all") {
				// If "all" is clicked, activate only "all"
				this.activeFilters.clear();
				this.activeFilters.add("all");
			} else {
				// If specific filter is clicked, toggle it and remove "all"
				this.activeFilters.delete("all");
				if (this.activeFilters.has(type)) {
					this.activeFilters.delete(type);
				} else {
					this.activeFilters.add(type);
				}

				// If no specific filters are active, activate "all"
				if (this.activeFilters.size === 0) {
					this.activeFilters.add("all");
				}
			}

			// Update UI
			$$(".filter-chip").forEach((c) => {
				c.classList.toggle("active", this.activeFilters.has(c.dataset.filter));
			});

			this.apply();
			this.saveState();
		},

		setSearch(q) {
			this.searchQuery = q.trim();

		setRegexMode(enabled) {
			this.regexMode = enabled;
			this.apply();
			this.saveState();
		},
		apply() {
			const entries = $$(".msg-entry");
			let visible = 0;
			entries.forEach((el) => {
				const type = el.dataset.type;
				const text = el.dataset.text || "";
				// Inclusive filtering: show entry if any active filter matches
				const matchFilter = this.activeFilters.has("all") || this.activeFilters.has(type);

				let matchSearch = !this.searchQuery;
				if (this.searchQuery) {
					if (this.regexMode) {
						try {
							const regex = new RegExp(this.searchQuery, 'i');
							matchSearch = regex.test(text);
						} catch (e) {
							// Invalid regex, fallback to literal search
							matchSearch = text.toLowerCase().includes(this.searchQuery.toLowerCase());
						}
					} else {
						matchSearch = text.toLowerCase().includes(this.searchQuery.toLowerCase());
					}
				}

				const show = matchFilter && matchSearch;
				el.classList.toggle("hidden", !show);
				if (show) {
					visible++;
					if (this.searchQuery) {
						const textEl = el.querySelector(".msg-text");
						if (textEl) {
							const raw = textEl.textContent;
							let regex;
							if (this.regexMode) {
								try {
									regex = new RegExp(`(${this.searchQuery})`, 'gi');
								} catch (e) {
									// Invalid regex, fallback to literal search
									regex = new RegExp(
										`(${this.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
										"gi",
									);
								}
							} else {
								regex = new RegExp(
									`(${this.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
									"gi",
								);
							}
							textEl.innerHTML = escHtml(raw).replace(regex, '<span class="highlight">$1</span>');
						}
					} else {
						const textEl = el.querySelector(".msg-text");
						if (textEl && textEl.querySelector(".highlight")) {
							textEl.innerHTML = escHtml(textEl.textContent);
						}
					}
				}
			});
			const empty = $(".empty-state");

				if (!empty) {
					const e = document.createElement("div");
					e.className = "empty-state";
					e.innerHTML = '<i class="fas fa-filter"></i><span>No matching messages</span>';

			}

		saveState() {

					regexMode: this.regexMode,

		restoreState() {
			try {

				if (saved) {
					const state = JSON.parse(saved);

					// Restore active filters
					if (state.activeFilters && Array.isArray(state.activeFilters)) {
						this.activeFilters = new Set(state.activeFilters);
					} else {
						this.activeFilters = new Set(["all"]);
					}

					// Restore regex mode
					this.regexMode = state.regexMode || false;

					// Restore search query
					this.searchQuery = state.searchQuery || "";

					// Update UI
					$$(".filter-chip").forEach((c) => {
						c.classList.toggle("active", this.activeFilters.has(c.dataset.filter));
					});

					// Update search icon state
					const searchIcon = $("#searchIcon");
					if (searchIcon) {
						const iconElement = searchIcon.querySelector("i");
						if (iconElement) {
							if (this.regexMode) {
								iconElement.classList.remove("fa-search");
								iconElement.classList.add("fa-asterisk");
								searchIcon.classList.add("regex-active");
							} else {
								iconElement.classList.remove("fa-asterisk");
								iconElement.classList.remove("regex-active");
								iconElement.classList.add("fa-search");
							}
						}
					}

					// Update search input and placeholder
					const searchInput = $("#searchInput");
					if (searchInput) {
						searchInput.value = this.searchQuery;
						searchInput.placeholder = this.regexMode ? "Search logs (regex)..." : "Search logs...";
					}

					// Update search icon tooltip to match restored state
					if (searchIcon) {
						CustomTooltip.attach(searchIcon, this.regexMode ? "Regex search enabled (click to disable)" : "Enable regex search");
					}
				}
			} catch (e) {
				console.warn("Failed to restore filter state:", e);
				// Fallback to default state
				this.activeFilters = new Set(["all"]);
				this.regexMode = false;
				this.searchQuery = "";
			}
		},
	};

	// Console Engine
	const ConsoleEngine = {
		clientMessages: [],

			return this.currentRealm === "client" ? this.clientStats : this.serverStats;

		setRealm(realm) {

			const stats = isClient ? this.clientStats : this.serverStats;

			const entry = {type, text: String(text), time: now(), realm: targetRealm};
			messages.push(entry);
			if (messages.length > this.maxMessages) messages.shift();

			div.className = "msg-entry";

			div.dataset.text = entry.text.toLowerCase();

			const textClass = ["warn", "error", "debug", "success", "cmd", "info"].includes(entry.type)

<span class="msg-timestamp" style="display: ${this.showTimestamps ? 'inline-block' : 'none'}">${entry.time}</span>

<i class="fas fa-copy"></i>
</button>
</span>
`;

<button class="welcome-close" title="Dismiss">&times;</button>
<h2>Console Engine v0.2 - ${this.currentRealm.toUpperCase()} Realm</h2>
<p>
Type <kbd>help</kbd> for commands &middot; <kbd>Tab</kbd> to autocomplete &middot; <kbd>&uarr;</kbd><kbd>&darr;</kbd> for history<br>
Use the filter chips above to narrow by type, or search to find specific messages.<br>

	const Autocomplete = {

					const desc = typeof m === "string" ? "" : m.desc || "";
					return `
<div class="autocomplete-item${i === this.selected ? " selected" : ""}" data-index="${i}" role="option">

			if (this.items.length === 0) return;

			// Initialize selection if needed
			if (this.selected < 0) {
				this.selected = dir > 0 ? 0 : this.items.length - 1;
			} else {
				this.selected += dir;
			}

			// Wrap around
			if (this.selected < 0) this.selected = this.items.length - 1;
			if (this.selected >= this.items.length) this.selected = 0;

		select(index) {

					while (wordEnd < value.length && /\w/.test(value[wordEnd])) {
						wordEnd++;
					}

					// Replace the word at caret
					const before = value.substring(0, wordStart);
					const after = value.substring(wordEnd);
					input.value = before + text + after;

					// Move caret to after the inserted text
					input.selectionStart = input.selectionEnd = wordStart + text.length;
				}

				this.hide();
				input.focus();
			}
		},

		// Get all autocomplete suggestions (commands + custom items)
		getSuggestions(prefix) {
			// Use only Lua autocomplete - remove JavaScript logic
			return [];
		},

		// Update caret position from input
		updateCaretPosition(input) {
			this.caretPosition = input.selectionStart;
		},

		// Get current caret position
		getCaretPosition() {
			return this.caretPosition;
		},

		// Get the word before the caret
		getWordBeforeCaret(input) {
			const text = input.value.substring(0, this.caretPosition);
			const match = text.match(/(\w+)$/);
			return match ? match[1] : "";
		},

		// Request suggestions from Lua IntelliSense
		requestSuggestions(input) {
			// console.log("DEBUG: requestSuggestions called, loading:", this.loading, "value:", input.value);
			if (this.loading) {
				// console.log("DEBUG: Skipping request because already loading");
				return;
			}

			const line = input.value;
			const caret = input.selectionStart + 1; // Lua uses 1-based indexing

			// Request suggestions from Lua IntelliSense
			this.loading = true;
			Events.Call("GetAutocomplete", line, caret);

			// Add timeout to reset loading state if Lua doesn't respond
			setTimeout(() => {
				if (this.loading) {
					// console.log("DEBUG: Autocomplete request timed out, resetting loading state");
					this.loading = false;
				}
			}, 1000); // 1 second timeout
		},
	};

	// Particle Background
	const Particles = {
		canvas: null,
		ctx: null,
		particles: [],
		color: "#d4a017",
		running: true,

		init() {
			this.canvas = $("#bgCanvas");
			if (!this.canvas) return;
			this.ctx = this.canvas.getContext("2d", {alpha: true});
			this.resize();
			window.addEventListener("resize", () => this.resize());
			this.createParticles();
			this.animate();
		},

		resize() {
			if (!this.canvas) return;
			this.canvas.width = window.innerWidth;
			this.canvas.height = window.innerHeight;
		},

		updateColor() {
			this.color = getCS("--particle-color") || "#d4a017";
		},

		createParticles() {
			this.particles = [];
			const count = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 12000), 120);
			for (let i = 0; i < count; i++) {
				this.particles.push({
					x: Math.random() * this.canvas.width,
					y: Math.random() * this.canvas.height,
					vx: (Math.random() - 0.5) * 0.3,
					vy: -Math.random() * 0.4 - 0.1,
					size: Math.random() * 2 + 0.5,
					opacity: Math.random() * 0.5 + 0.1,
					life: Math.random(),
				});
			}
		},

		animate() {
			if (!this.running || !this.ctx) return;
			this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
			this.color = getCS("--particle-color") || "#d4a017";

			for (const p of this.particles) {
				p.x += p.vx;
				p.y += p.vy;
				p.life += 0.002;

				if (p.y < -10 || p.life > 1) {
					p.x = Math.random() * this.canvas.width;
					p.y = this.canvas.height + 10;
					p.life = 0;
					p.opacity = Math.random() * 0.5 + 0.1;
				}

				const alpha = p.opacity * Math.sin(p.life * Math.PI);
				this.ctx.beginPath();
				this.ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2);
				this.ctx.fillStyle = this.color;
				this.ctx.globalAlpha = Math.max(0, alpha);
				this.ctx.fill();
			}
			this.ctx.globalAlpha = 1;
			requestAnimationFrame(() => this.animate());
		},
	};

			const formattedSuggestions = suggestions.map((s) => {
				if (typeof s === "string") {
					return {name: s, desc: ""};

				if (typeof s === "object" && s.name) {
					return {name: s.name, desc: s.desc || ""};
