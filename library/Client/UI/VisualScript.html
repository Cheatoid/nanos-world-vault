<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>VisualScript Editor</title>
	<link
		href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
	<style>
		:root {
			--bg-deep: #08080d;
			--bg-main: #0d0d14;
			--bg-surface: #14141e;
			--bg-elevated: #1c1c2a;
			--border: #2a2a3d;
			--border-hover: #3d3d55;
			--text: #e8e8f0;
			--text-sec: #a0a0b8;
			--text-muted: #666680;
			--accent: #ff6b35;
			--accent-hover: #ff8555;
			--accent-dim: rgba(255, 107, 53, .12);
			--success: #00e5a0;
			--danger: #ff3366;
			--warning: #ffbb33;
			--info: #44aaff;
			--cat-value: #ff6b35;
			--cat-math: #00e5a0;
			--cat-logic: #ff3366;
			--cat-output: #44aaff;
			--cat-color: #ffbb33;
			--port-number: #00e5a0;
			--port-string: #ff6b35;
			--port-boolean: #ff3366;
			--port-any: #8888aa;
			--port-color: #ffbb33;
			--font-mono: 'JetBrains Mono', monospace;
			--font-ui: 'Space Grotesk', sans-serif;
			--node-w: 210px;
			--radius: 6px;
			--radius-lg: 10px;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: var(--font-ui);
			background: var(--bg-deep);
			color: var(--text);
			overflow: hidden;
			height: 100vh;
			width: 100vw;
			display: flex;
			flex-direction: column;
		}

		::selection {
			background: var(--accent);
			color: #fff;
		}

		::-webkit-scrollbar {
			width: 5px;
		}

		::-webkit-scrollbar-track {
			background: transparent;
		}

		::-webkit-scrollbar-thumb {
			background: var(--border);
			border-radius: 3px;
		}

		#toolbar {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 0 16px;
			height: 46px;
			background: var(--bg-surface);
			border-bottom: 1px solid var(--border);
			z-index: 100;
			flex-shrink: 0;
		}

		.logo {
			font-weight: 700;
			font-size: 16px;
			letter-spacing: -.5px;
			color: var(--accent);
			margin-right: 6px;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.logo i {
			font-size: 14px;
		}

		.tb-sep {
			width: 1px;
			height: 22px;
			background: var(--border);
		}

		.tb-btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 5px 12px;
			border: 1px solid var(--border);
			border-radius: var(--radius);
			background: var(--bg-elevated);
			color: var(--text-sec);
			font-family: var(--font-ui);
			font-size: 12px;
			cursor: pointer;
			transition: all .15s;
			white-space: nowrap;
		}

		.tb-btn:hover {
			border-color: var(--border-hover);
			color: var(--text);
			background: #22222f;
		}

		.tb-btn.primary {
			border-color: var(--accent);
			color: var(--accent);
			background: var(--accent-dim);
		}

		.tb-btn.primary:hover {
			background: rgba(255, 107, 53, .22);
		}

		.tb-btn.active {
			border-color: var(--accent);
			color: var(--accent);
			background: var(--accent-dim);
		}

		.tb-btn.danger:hover {
			border-color: var(--danger);
			color: var(--danger);
		}

		#zoom-display {
			font-size: 11px;
			color: var(--text-muted);
			font-family: var(--font-mono);
			min-width: 48px;
			text-align: center;
		}

		.spacer {
			flex: 1;
		}

		.status {
			font-size: 11px;
			color: var(--text-muted);
			font-family: var(--font-mono);
		}

		#main {
			display: flex;
			flex: 1;
			overflow: hidden;
			position: relative;
		}

		#sidebar {
			width: 220px;
			background: var(--bg-surface);
			border-right: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			flex-shrink: 0;
			z-index: 50;
		}

		#sidebar-header {
			padding: 12px 14px 8px;
			font-weight: 600;
			font-size: 13px;
			color: var(--text-sec);
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		#node-search {
			margin: 0 10px 8px;
			padding: 6px 10px;
			border: 1px solid var(--border);
			border-radius: var(--radius);
			background: var(--bg-main);
			color: var(--text);
			font-family: var(--font-ui);
			font-size: 12px;
			outline: none;
			width: calc(100% - 20px);
		}

		#node-search:focus {
			border-color: var(--accent);
		}

		#node-search::placeholder {
			color: var(--text-muted);
		}

		#palette {
			flex: 1;
			overflow-y: auto;
			padding: 4px 10px 12px;
		}

		.cat-group {
			margin-bottom: 6px;
		}

		.cat-label {
			font-size: 10px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: .8px;
			padding: 6px 4px 4px;
			color: var(--text-muted);
			cursor: pointer;
			display: flex;
			align-items: center;
			gap: 6px;
			user-select: none;
		}

		.cat-label i {
			font-size: 8px;
			transition: transform .2s;
		}

		.cat-label.collapsed i {
			transform: rotate(-90deg);
		}

		.cat-items {
			overflow: hidden;
			transition: max-height .25s ease;
		}

		.cat-items.collapsed {
			max-height: 0 !important;
		}

		.palette-item {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 5px 8px;
			border-radius: var(--radius);
			cursor: pointer;
			font-size: 12px;
			color: var(--text-sec);
			transition: all .12s;
			user-select: none;
		}

		.palette-item:hover {
			background: var(--bg-elevated);
			color: var(--text);
		}

		.palette-item .dot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		#canvas-container {
			flex: 1;
			position: relative;
			overflow: hidden;
			background-color: var(--bg-deep);
			background-image: radial-gradient(circle, rgba(255, 255, 255, .04) 1px, transparent 1px);
			background-size: 30px 30px;
		}

		#console-panel {
			height: 200px;
			min-height: 80px;
			background: var(--bg-surface);
			border-top: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			z-index: 5;
		}

		#viewport {
			display: flex;
			flex-direction: column;
			flex: 1;
		}

		#transform {
			position: absolute;
			top: 0;
			left: 0;
			transform-origin: 0 0;
			width: 0;
			height: 0;
		}

		#conn-svg {
			position: absolute;
			top: 0;
			left: 0;
			width: 1px;
			height: 1px;
			overflow: visible;
			pointer-events: none;
			z-index: 1;
		}

		#conn-svg g {
			transition: z-index 0.15s;
		}

		#conn-svg g:hover {
			z-index: 20;
		}

		#conn-svg path {
			fill: none;
			stroke-width: 2.2;
			stroke-linecap: round;
		}

		#conn-svg path.edge-hit {
			stroke-width: 20;
			stroke: transparent;
			pointer-events: stroke;
			cursor: pointer;
			z-index: 2;
		}

		#conn-svg path.edge-line {
			pointer-events: none;
			z-index: 3;
		}

		#conn-svg-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 1px;
			height: 1px;
			overflow: visible;
			pointer-events: none;
			z-index: 50; /* Above nodes layer (40) when connections are selected */
			background: transparent;
		}

		#conn-svg-overlay g {
			pointer-events: auto;
		}

		#conn-svg-overlay path {
			fill: none;
			stroke-width: 2.2;
			stroke-linecap: round;
		}

		#conn-svg g.selected path.edge-line,
		#conn-svg-overlay g.selected path.edge-line {
			stroke-width: 4;
			filter: drop-shadow(0 0 6px currentColor);
		}

		#conn-svg-overlay g.selected {
			z-index: 10; /* Ensure selected connections are on top within overlay */
		}

		#conn-svg g.selected path.edge-hit,
		#conn-svg-overlay g.selected path.edge-hit {
			stroke-width: 20;
		}

		#conn-svg g.connected-to-selected {
			z-index: 25; /* between regular connections and overlay (45) */
		}

		.selection-rectangle {
			position: absolute;
			border: 1px solid var(--accent);
			background: rgba(255, 107, 53, 0.1);
			pointer-events: none;
			z-index: 1000;
		}

		#conn-svg path.temp-conn {
			stroke-dasharray: 6 4;
			opacity: .7;
			pointer-events: none;
			z-index: 4;
		}

		#nodes-layer {
			position: absolute;
			top: 0;
			left: 0;
			z-index: 40; /* Below selected connections but above regular connections */
		}

		.node {
			position: absolute;
			z-index: 1; /* base z-index */
			width: var(--node-w);
			border-radius: var(--radius-lg);
			background: var(--bg-surface);
			border: 1.5px solid var(--border);
			box-shadow: 0 4px 20px rgba(0, 0, 0, .4);
			user-select: none;
		}

		.node.selected {
			z-index: 50; /* selected nodes appear above overlay SVG (35) */
		}

		.node.dragging {
			transition: none !important;
			z-index: 100;
			box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
		}

		.node.dragging .node-header {
			cursor: grabbing;
		}

		@keyframes nodeIn {
			from {
				opacity: 0;
				transform: scale(.92);
			}
			to {
				opacity: 1;
				transform: scale(1);
			}
		}

		.node:hover {
			border-color: var(--border-hover);
		}

		.node.selected {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent-dim), 0 4px 24px rgba(0, 0, 0, .5);
			transition: none;
		}

		.node.executing {
			animation: nodePulse .4s ease;
		}

		.node.step-executing {
			border-color: var(--warning);
			box-shadow: 0 0 0 3px rgba(255, 187, 51, 0.3), 0 4px 24px rgba(0, 0, 0, .5);
			animation: stepPulse 1s ease-in-out infinite;
		}

		@keyframes nodePulse {
			0%, 100% {
				box-shadow: 0 4px 20px rgba(0, 0, 0, .4);
			}
			50% {
				box-shadow: 0 0 24px rgba(0, 229, 160, .3);
			}
		}

		@keyframes stepPulse {
			0%, 100% {
				box-shadow: 0 0 0 3px rgba(255, 187, 51, 0.3), 0 4px 24px rgba(0, 0, 0, .5);
			}
			50% {
				box-shadow: 0 0 0 6px rgba(255, 187, 51, 0.6), 0 4px 24px rgba(0, 0, 0, .5);
			}
		}

		.tb-btn.step-active {
			border-color: var(--warning);
			color: var(--warning);
			background: rgba(255, 187, 51, 0.12);
		}

		.tb-btn.step-active:hover {
			background: rgba(255, 187, 51, 0.22);
		}

		.node-header {
			display: flex;
			align-items: center;
			gap: 6px;
			padding: 8px 10px;
			border-radius: var(--radius-lg) var(--radius-lg) 0 0;
			cursor: grab;
			position: relative;
			overflow: hidden;
			background: var(--bg-elevated);
		}

		.node.collapsed .node-header {
			border-radius: var(--radius-lg);
		}

		.node-header:active {
			cursor: grabbing;
		}

		.node-header .color-strip {
			position: absolute;
			left: 0;
			top: 0;
			bottom: 0;
			width: 3px;
		}

		.node-header .title {
			font-size: 12px;
			font-weight: 600;
			color: var(--text);
			flex: 1;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			padding-left: 4px;
		}

		.node-header .delete-btn {
			background: none;
			border: none;
			color: var(--text-muted);
			cursor: pointer;
			font-size: 11px;
			opacity: 0;
			transition: opacity .15s, color .15s;
			padding: 2px;
		}

		.node:hover .delete-btn {
			opacity: 1;
		}

		.node:hover .collapse-btn {
			opacity: 1;
		}

		.node-header .delete-btn:hover {
			color: var(--danger);
		}

		.collapse-btn {
			background: none;
			border: none;
			color: var(--text-sec);
			cursor: pointer;
			font-size: 11px;
			padding: 2px;
			opacity: 0;
			transition: opacity .15s, color .15s, transform .2s;
		}

		.collapse-btn:hover {
			color: var(--text);
		}

		.node.collapsed .node-body {
			display: none;
		}

		.node.collapsed .collapse-btn i {
			transform: rotate(180deg);
		}

		.node-body {
			padding: 6px 0 8px;
		}

		.node-row {
			display: flex;
			align-items: center;
			min-height: 26px;
			padding: 2px 0;
		}

		.node-row.input-row {
			justify-content: flex-start;
		}

		.node-row.output-row {
			justify-content: flex-end;
		}

		.port-dot {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			border: 2px solid var(--bg-surface);
			cursor: crosshair;
			position: relative;
			z-index: 5;
			transition: transform .12s, box-shadow .12s;
			flex-shrink: 0;
		}

		.port-dot:hover {
			transform: scale(1.4);
			box-shadow: 0 0 8px currentColor;
		}

		.port-dot.highlight {
			transform: scale(1.5);
			box-shadow: 0 0 12px currentColor;
			animation: portPulse .6s infinite alternate;
		}

		@keyframes portPulse {
			from {
				box-shadow: 0 0 6px currentColor;
			}
			to {
				box-shadow: 0 0 14px currentColor;
			}
		}

		.input-row .port-dot {
			margin-left: -5px;
			margin-right: 6px;
		}

		.output-row .port-dot {
			margin-right: -5px;
			margin-left: 6px;
		}

		.port-label {
			font-size: 11px;
			color: var(--text-sec);
		}

		.port-input {
			flex: 1;
			min-width: 0;
			margin: 0 6px;
			padding: 3px 6px;
			border: 1px solid var(--border);
			border-radius: 4px;
			background: var(--bg-main);
			color: var(--text);
			font-family: var(--font-mono);
			font-size: 11px;
			outline: none;
		}

		.port-input:focus {
			border-color: var(--accent);
		}

		.port-input[readonly] {
			background: var(--bg-elevated);
			color: var(--text-sec);
			cursor: not-allowed;
			border-color: var(--border);
		}

		.port-input[readonly]:hover {
			border-color: var(--border);
		}

		.node-display {
			margin: 2px 10px;
			padding: 4px 8px;
			background: var(--bg-main);
			border-radius: 4px;
			font-family: var(--font-mono);
			font-size: 11px;
			color: var(--success);
			min-height: 22px;
			word-break: break-all;
			border: 1px solid var(--border);
			width: calc(100% - 20px);
			box-sizing: border-box;
			resize: none;
			outline: none;
		}

		.node-display:focus {
			border-color: var(--border);
		}

		.node-display[readonly] {
			background: var(--bg-elevated);
			color: var(--text-sec);
			cursor: text;
		}

		.node-toggle {
			width: 32px;
			height: 16px;
			border-radius: 8px;
			background: var(--border);
			cursor: pointer;
			position: relative;
			margin: 0 6px;
			transition: background .2s;
			border: none;
			flex-shrink: 0;
		}

		.node-toggle.active {
			background: var(--success);
		}

		.node-toggle::after {
			content: '';
			position: absolute;
			top: 2px;
			left: 2px;
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: #fff;
			transition: left .2s;
		}

		.node-toggle.active::after {
			left: 18px;
		}

		.node-toggle:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.node-toggle:disabled:hover {
			transform: none;
		}

		.node-group {
			margin: 2px 10px;
			padding: 6px 10px;
			background: var(--bg-elevated);
			border-radius: 4px;
			font-family: var(--font-ui);
			font-size: 12px;
			color: var(--text-sec);
			cursor: pointer;
			border: 1px solid var(--border);
			transition: all .2s;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.node-group:hover {
			background: var(--bg-main);
			border-color: var(--border-hover);
			color: var(--text);
		}

		.node-group.collapsed {
			background: var(--bg-surface);
		}

		.node-group .group-icon {
			font-size: 10px;
			transition: transform .2s;
		}

		.node-group.collapsed .group-icon {
			transform: rotate(-90deg);
		}

		.node-group-container {
			position: absolute;
			border: 2px dashed var(--border);
			border-radius: var(--radius-lg);
			background: rgba(255, 107, 53, 0.05);
			pointer-events: auto;
			z-index: 0;
			transition: all .3s ease;
		}

		.node-group-container:hover {
			border-color: var(--border-hover);
			background: rgba(255, 107, 53, 0.08);
		}

		.node-group-container.collapsed {
			border-color: var(--accent);
			background: rgba(255, 107, 53, 0.1);
		}

		.node-group-container .resize-handle {
			position: absolute;
			width: 12px;
			height: 12px;
			background: var(--accent);
			border: 2px solid var(--bg-surface);
			border-radius: 50%;
			opacity: 0;
			transition: opacity .2s;
			cursor: nwse-resize;
		}

		.node-group-container:hover .resize-handle {
			opacity: 0.7;
		}

		.node-group-container .resize-handle:hover {
			opacity: 1;
		}

		.node-group-container .resize-handle.se {
			bottom: -6px;
			right: -6px;
		}

		.node-grouped-collapsed {
			opacity: 0.3 !important;
			pointer-events: none !important;
			filter: grayscale(0.5);
		}

		#inspector {
			width: 240px;
			background: var(--bg-surface);
			border-left: 1px solid var(--border);
			flex-shrink: 0;
			display: flex;
			flex-direction: column;
			overflow-y: auto;
			z-index: 50;
		}

		#inspector-header {
			padding: 12px 14px 8px;
			font-weight: 600;
			font-size: 13px;
			color: var(--text-sec);
			border-bottom: 1px solid var(--border);
		}

		#inspector-body {
			padding: 12px 14px;
		}

		.insp-empty {
			color: var(--text-muted);
			font-size: 12px;
			text-align: center;
			padding: 30px 0;
		}

		.insp-field {
			margin-bottom: 12px;
		}

		.insp-label {
			font-size: 10px;
			text-transform: uppercase;
			letter-spacing: .6px;
			color: var(--text-muted);
			margin-bottom: 4px;
			font-weight: 600;
		}

		.insp-value {
			font-size: 13px;
			color: var(--text);
			font-family: var(--font-mono);
		}

		.insp-input {
			width: 100%;
			padding: 5px 8px;
			background: var(--bg-main);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			color: var(--text);
			font-family: var(--font-mono);
			font-size: 12px;
			outline: none;
		}

		.insp-input:focus {
			border-color: var(--accent);
		}

		.insp-input[readonly] {
			background: var(--bg-elevated);
			color: var(--text-sec);
			cursor: not-allowed;
			border-color: var(--border);
		}

		.insp-input[readonly]:hover {
			border-color: var(--border);
		}

		#context-menu {
			position: fixed;
			background: var(--bg-elevated);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			box-shadow: 0 8px 30px rgba(0, 0, 0, .5);
			z-index: 1000;
			min-width: 160px;
			padding: 4px;
			display: none;
		}

		.ctx-item {
			padding: 6px 12px;
			font-size: 12px;
			color: var(--text-sec);
			cursor: pointer;
			border-radius: 4px;
			display: flex;
			align-items: center;
			gap: 8px;
			user-select: none;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
		}

		.ctx-item:hover {
			background: var(--accent-dim);
			color: var(--accent);
		}

		.ctx-item.danger:hover {
			background: rgba(255, 51, 102, .12);
			color: var(--danger);
		}

		.ctx-sep {
			height: 1px;
			background: var(--border);
			margin: 4px 0;
		}

		#toast-container {
			position: fixed;
			bottom: 20px;
			right: 20px;
			z-index: 2000;
			display: flex;
			flex-direction: column;
			gap: 12px;
			pointer-events: none;
		}

		.toast {
			padding: 12px 18px;
			background: linear-gradient(135deg, var(--bg-elevated), var(--bg-surface));
			border: 1px solid var(--border);
			border-radius: var(--radius-lg);
			font-size: 12px;
			color: var(--text);
			font-weight: 500;
			box-shadow: 0 8px 32px rgba(0, 0, 0, .3),
			0 2px 8px rgba(0, 0, 0, .2),
			inset 0 1px 0 rgba(255, 255, 255, .05);
			backdrop-filter: blur(8px);
			display: flex;
			align-items: center;
			gap: 10px;
			min-width: 280px;
			max-width: 400px;
			pointer-events: auto;
			cursor: pointer;
			position: relative;
			overflow: hidden;
			transform-origin: right center;
			opacity: 0;
			will-change: transform, opacity;
		}

		.toast::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 2px;
			background: linear-gradient(90deg, transparent, currentColor, transparent);
			opacity: 0;
			transform: scaleX(0);
			transform-origin: left;
			transition: transform 0.3s ease, opacity 0.3s ease;
		}

		.toast:hover::before {
			opacity: 0.6;
			transform: scaleX(1);
		}

		.toast::after {
			content: '';
			position: absolute;
			top: 0;
			left: -100%;
			width: 100%;
			height: 100%;
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .03), transparent);
			transition: left 0.6s ease;
		}

		.toast:hover::after {
			left: 100%;
		}

		.toast.success {
			border-color: var(--success);
			color: var(--success);
			background: linear-gradient(135deg, var(--bg-elevated), rgba(0, 229, 160, .08));
		}

		.toast.error {
			border-color: var(--danger);
			color: var(--danger);
			background: linear-gradient(135deg, var(--bg-elevated), rgba(255, 51, 102, .08));
		}

		.toast.info {
			border-color: var(--info);
			color: var(--info);
			background: linear-gradient(135deg, var(--bg-elevated), rgba(68, 170, 255, .08));
		}

		.toast.warning {
			border-color: var(--warning);
			color: var(--warning);
			background: linear-gradient(135deg, var(--bg-elevated), rgba(255, 187, 51, .08));
		}

		.toast-icon {
			font-size: 14px;
			animation: iconPulse 2s ease-in-out infinite;
		}

		@keyframes iconPulse {
			0%, 100% {
				transform: scale(1);
			}
			50% {
				transform: scale(1.1);
			}
		}

		.toast-progress {
			position: absolute;
			bottom: 0;
			left: 0;
			height: 2px;
			background: currentColor;
			opacity: 0.3;
			transform-origin: left;
			transform: scaleX(1);
			transition: transform linear;
		}

		.toast.removing {
			animation: toastOut 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
		}

		@keyframes toastIn {
			0% {
				opacity: 0;
				transform: translateX(100px) scale(0.8) rotate(-4deg);
			}
			50% {
				opacity: 0.8;
				transform: translateX(-10px) scale(0.95) rotate(2deg);
			}
			100% {
				opacity: 1;
				transform: translateX(0) scale(1) rotate(0deg);
			}
		}

		@keyframes toastOut {
			0% {
				opacity: 1;
				transform: translateX(0) scale(1) rotate(0deg);
			}
			50% {
				transform: translateX(-10px) scale(0.95) rotate(-2deg);
			}
			100% {
				opacity: 0;
				transform: translateX(100px) scale(0.8) rotate(4deg);
			}
		}

		.console-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 6px 12px;
			background: var(--bg-elevated);
			border-bottom: 1px solid var(--border);
			font-size: 12px;
			font-weight: 600;
			color: var(--text-sec);
		}

		.console-header span {
			flex: 1;
		}

		.console-actions {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.console-clear-btn {
			background: none;
			border: 1px solid var(--border);
			border-radius: 4px;
			padding: 2px 8px;
			color: var(--text-muted);
			cursor: pointer;
			font-family: var(--font-ui);
			font-size: 11px;
			transition: all .15s;
		}

		.console-clear-btn:hover {
			color: var(--danger);
			border-color: var(--danger);
		}

		#console-output {
			flex: 1;
			overflow-y: auto;
			padding: 8px 12px;
			font-family: var(--font-mono);
			font-size: 12px;
			color: var(--text);
			background: var(--bg-main);
			white-space: pre-wrap;
		}

		.hidden {
			display: none !important;
		}
	</style>
</head>
<body>

	<div class="tb-sep"></div>
	<button class="tb-btn primary" id="btn-run" title="Execute Graph (Ctrl+Enter)"><i class="fa-solid fa-play"></i> Run
	</button>

<!-- Main Layout -->
<div id="main">
	<!-- Sidebar Palette -->
	<div id="sidebar">

	<!-- Viewport -->
	<div id="viewport">

	<!-- Inspector -->

<!-- Toasts -->

<!-- Hidden file input -->

<script>
	/**
	 * VisualScript Editor
	 * Architecture: Graph Model, Renderer, Engine (Worker), Serializer, Plugin API
	 */

		// Utilities
	const uid = () => Math.random().toString(36).substr(2, 9);
	const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

	// Toast System
	class ToastManager {
		constructor() {
			this.container = document.getElementById('toast-container');
			this.toasts = new Map();
			this.queue = [];
			this.maxToasts = 5;
			this.defaultDuration = 4000;
		}

		show(message, type = 'info', options = {}) {
			const toast = {
				id: uid(),
				message,
				type,
				duration: options.duration || this.defaultDuration,
				persistent: options.persistent || false,
				icon: options.icon || this._getIcon(type)
			};

			// Add to queue
			this.queue.push(toast);
			this._processQueue();
			return toast.id;
		}

		_getIcon(type) {
			const icons = {
				success: 'check-circle',
				error: 'exclamation-triangle',
				warning: 'exclamation-circle',
				info: 'info-circle'
			};
			return icons[type] || 'info-circle';
		}

		_processQueue() {
			if (this.queue.length === 0) return;

			// Remove oldest toasts if we hit the limit
			if (this.toasts.size >= this.maxToasts) {
				const oldestId = this.toasts.keys().next().value;
				this._removeToast(oldestId, true);
			}

			const toast = this.queue.shift();
			this._createToast(toast);
		}

		_createToast(toast) {
			const el = document.createElement('div');
			el.className = `toast ${toast.type || 'info'}`;
			el.dataset.toastId = toast.id;
			el.innerHTML = `
				<i class="fa-solid fa-${toast.icon || 'info-circle'} toast-icon"></i>
				<span class="toast-message">${toast.message || ''}</span>
				${!toast.persistent ? '<div class="toast-progress"></div>' : ''}
			`;

			// Add click to dismiss
			el.addEventListener('click', () => this._removeToast(toast.id));

			// Add element to toast object before animation
			toast.element = el;

			// Add to container
			this.container.appendChild(el);
			this.toasts.set(toast.id, {element: el, ...toast});

			// Use CSS animation for entry
			el.style.animation = 'toastIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';

			// Auto-remove if not persistent
			if (!toast.persistent) {
				// Use CSS transition for progress bar instead of rAF
				const progressBar = el.querySelector('.toast-progress');
				if (progressBar) {
					progressBar.style.transition = `transform ${toast.duration}ms linear`;
					// Force reflow
					progressBar.offsetHeight;
					progressBar.style.transform = 'scaleX(0)';
				}

				toast.timeoutId = setTimeout(() => {
					this._removeToast(toast.id);
				}, toast.duration);
			}
		}

		_removeToast(toastId, immediate = false) {
			const toast = this.toasts.get(toastId);
			if (!toast || toast.removing) return;

			toast.removing = true;

			// Clear timeout if exists
			if (toast.timeoutId) {
				clearTimeout(toast.timeoutId);
			}

			if (immediate) {
				this._completeRemoval(toastId);
			} else {
				this._animateOut(toast);
			}
		}

		_animateOut(toast) {
			const el = toast.element;
			el.classList.add('removing');
			el.style.animation = 'toastOut 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';

			// Remove after animation completes
			setTimeout(() => {
				this._completeRemoval(toast.id);
			}, 400);
		}

		_completeRemoval(toastId) {
			const toast = this.toasts.get(toastId);
			if (!toast) return;

			// Remove from DOM
			if (toast.element && toast.element.parentNode) {
				toast.element.remove();
			}

			// Remove from tracking
			this.toasts.delete(toastId);

			// Process queue
			this._processQueue();
		}

		clear() {
			// Remove all toasts
			this.toasts.forEach((toast, id) => {
				this._removeToast(id, true);
			});
			this.queue = [];
		}
	}

	// Global toast manager instance
	const toastManager = new ToastManager();

	// Simplified toast function for backward compatibility
	function toast(msg, type = 'info', options = {}) {
		return toastManager.show(msg, type, options);
	}

	// Plugin API
	const NodeTypes = {};

	function registerNodeType(type, def) {
		NodeTypes[type] = {
			title: def.title || type,
			category: def.category || 'default',
			inputs: def.inputs || [],
			outputs: def.outputs || [],
			calculate: def.calculate || (() => ({})),
			defaults: def.defaults || {},
			widget: def.widget || null // 'display' | 'toggle' | null
		};
	}

	// Built-in Node Plugins
	registerNodeType('value/number', {
		title: 'Number', category: 'Value',
		inputs: [{id: 'value', type: 'number', label: 'Value', default: 0}],
		outputs: [{id: 'out', type: 'number', label: 'Out'}],
		calculate: (inputs) => ({out: Number(inputs.value) || 0})
	});

	registerNodeType('value/string', {
		title: 'Text', category: 'Value',
		inputs: [{id: 'value', type: 'string', label: 'Text', default: 'hello'}],
		outputs: [{id: 'out', type: 'string', label: 'Out'}],
		calculate: (inputs) => ({out: String(inputs.value)})
	});

	registerNodeType('value/boolean', {
		title: 'Boolean', category: 'Value',
		inputs: [{id: 'value', type: 'boolean', label: 'Value', default: false}],
		outputs: [{id: 'out', type: 'boolean', label: 'Out'}],
		widget: 'toggle',
		calculate: (inputs) => ({out: !!inputs.value})
	});

	registerNodeType('math/add', {
		title: 'Add', category: 'Math',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 0}],
		outputs: [{id: 'sum', type: 'number', label: 'Sum'}],
		calculate: (inputs) => ({sum: (Number(inputs.a) || 0) + (Number(inputs.b) || 0)})
	});

	registerNodeType('math/subtract', {
		title: 'Subtract', category: 'Math',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 0}],
		outputs: [{id: 'diff', type: 'number', label: 'Diff'}],
		calculate: (inputs) => ({diff: (Number(inputs.a) || 0) - (Number(inputs.b) || 0)})
	});

	registerNodeType('math/multiply', {
		title: 'Multiply', category: 'Math',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 0}],
		outputs: [{id: 'product', type: 'number', label: 'Result'}],
		calculate: (inputs) => ({product: (Number(inputs.a) || 0) * (Number(inputs.b) || 0)})
	});

	registerNodeType('math/divide', {
		title: 'Divide', category: 'Math',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 1}, {id: 'b', type: 'number', label: 'B', default: 1}],
		outputs: [{id: 'quotient', type: 'number', label: 'Result'}],
		calculate: (inputs) => {
			const b = Number(inputs.b) || 1;
			return {quotient: b !== 0 ? (Number(inputs.a) || 0) / b : 0};
		}
	});

	registerNodeType('math/modulo', {
		title: 'Modulo', category: 'Math',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 1}],
		outputs: [{id: 'remainder', type: 'number', label: 'A % B'}],
		calculate: (inputs) => {
			const b = Number(inputs.b) || 1;
			return {remainder: b !== 0 ? (Number(inputs.a) || 0) % b : 0};
		}
	});

	registerNodeType('math/power', {
		title: 'Power', category: 'Math',
		inputs: [{id: 'base', type: 'number', label: 'Base', default: 2}, {
			id: 'exp',
			type: 'number',
			label: 'Exponent',
			default: 1
		}],
		outputs: [{id: 'result', type: 'number', label: 'Base^Exp'}],
		calculate: (inputs) => ({result: Math.pow(Number(inputs.base) || 0, Number(inputs.exp) || 0)})
	});

	registerNodeType('math/sqrt', {
		title: 'Square Root', category: 'Math',
		inputs: [{id: 'value', type: 'number', label: 'Value', default: 0}],
		outputs: [{id: 'result', type: 'number', label: '√Value'}],
		calculate: (inputs) => ({result: Math.sqrt(Math.max(0, Number(inputs.value) || 0))})
	});

	registerNodeType('math/min', {
		title: 'Min', category: 'Math',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 0}],
		outputs: [{id: 'result', type: 'number', label: 'Min(A,B)'}],
		calculate: (inputs) => ({result: Math.min(Number(inputs.a) || 0, Number(inputs.b) || 0)})
	});

	registerNodeType('math/max', {
		title: 'Max', category: 'Math',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 0}],
		outputs: [{id: 'result', type: 'number', label: 'Max(A,B)'}],
		calculate: (inputs) => ({result: Math.max(Number(inputs.a) || 0, Number(inputs.b) || 0)})
	});

	registerNodeType('logic/and', {
		title: 'AND Gate', category: 'Logic',
		inputs: [{id: 'a', type: 'boolean', label: 'A', default: false}, {
			id: 'b',
			type: 'boolean',
			label: 'B',
			default: false
		}],
		outputs: [{id: 'out', type: 'boolean', label: 'Out'}],
		widget: 'toggle',
		calculate: (inputs) => ({out: !!inputs.a && !!inputs.b})
	});

	registerNodeType('logic/or', {
		title: 'OR Gate', category: 'Logic',
		inputs: [{id: 'a', type: 'boolean', label: 'A', default: false}, {
			id: 'b',
			type: 'boolean',
			label: 'B',
			default: false
		}],
		outputs: [{id: 'out', type: 'boolean', label: 'Out'}],
		widget: 'toggle',
		calculate: (inputs) => ({out: !!inputs.a || !!inputs.b})
	});

	registerNodeType('logic/not', {
		title: 'NOT Gate', category: 'Logic',
		inputs: [{id: 'input', type: 'boolean', label: 'Input', default: false}],
		outputs: [{id: 'out', type: 'boolean', label: 'Out'}],
		widget: 'toggle',
		calculate: (inputs) => ({out: !inputs.input})
	});

	registerNodeType('logic/xor', {
		title: 'XOR Gate', category: 'Logic',
		inputs: [{id: 'a', type: 'boolean', label: 'A', default: false}, {
			id: 'b',
			type: 'boolean',
			label: 'B',
			default: false
		}],
		outputs: [{id: 'out', type: 'boolean', label: 'Out'}],
		widget: 'toggle',
		calculate: (inputs) => ({out: (!!inputs.a !== !!inputs.b)})
	});

	registerNodeType('logic/equals', {
		title: 'Equals (A==B)', category: 'Logic',
		inputs: [{id: 'a', type: 'any', label: 'A', default: 0}, {id: 'b', type: 'any', label: 'B', default: 0}],
		outputs: [{id: 'result', type: 'boolean', label: 'A == B'}],
		calculate: (inputs) => ({result: inputs.a == inputs.b})
	});

	registerNodeType('logic/not-equals', {
		title: 'Not Equals (A!=B)', category: 'Logic',
		inputs: [{id: 'a', type: 'any', label: 'A', default: 0}, {id: 'b', type: 'any', label: 'B', default: 0}],
		outputs: [{id: 'result', type: 'boolean', label: 'A != B'}],
		calculate: (inputs) => ({result: inputs.a != inputs.b})
	});

	registerNodeType('logic/less', {
		title: 'Less Than (A&lt;B)', category: 'Logic',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 0}],
		outputs: [{id: 'result', type: 'boolean', label: 'A &lt; B'}],
		calculate: (inputs) => ({result: (Number(inputs.a) || 0) < (Number(inputs.b) || 0)})
	});

	registerNodeType('logic/less-equals', {
		title: 'Less Equals (A≤B)', category: 'Logic',
		inputs: [{id: 'a', type: 'number', label: 'A', default: 0}, {id: 'b', type: 'number', label: 'B', default: 0}],

	registerNodeType('color/mix', {
		title: 'Mix Color', category: 'Color',
		inputs: [
			{id: 'c1', type: 'string', label: 'Color 1', default: '#ff6b35'},
			{id: 'c2', type: 'string', label: 'Color 2', default: '#00e5a0'},
			{id: 't', type: 'number', label: 'Mix (0-1)', default: 0.5}
		],
		outputs: [{id: 'out', type: 'string', label: 'Result'}],
		calculate: (inputs) => {
			try {
				const hex = (s) => parseInt(s.replace('#', ''), 16);
				const r1 = (hex(inputs.c1) >> 16) & 255, g1 = (hex(inputs.c1) >> 8) & 255, b1 = hex(inputs.c1) & 255;
				const r2 = (hex(inputs.c2) >> 16) & 255, g2 = (hex(inputs.c2) >> 8) & 255, b2 = hex(inputs.c2) & 255;
				const t = clamp(Number(inputs.t) || 0, 0, 1);
				const mix = (a, b) => Math.round(a + (b - a) * t);
				const rh = mix(r1, r2).toString(16).padStart(2, '0');
				const gh = mix(g1, g2).toString(16).padStart(2, '0');
				const bh = mix(b1, b2).toString(16).padStart(2, '0');
				return {out: `#${rh}${gh}${bh}`};
			} catch (e) {
				return {out: '#888888'};

	const typeColorMap = {
		number: 'var(--port-number)',
		string: 'var(--port-string)',
		boolean: 'var(--port-boolean)',
		any: 'var(--port-any)',
		color: 'var(--port-color)'
	};

		Control: 'var(--accent)',
		Output: 'var(--cat-output)',
