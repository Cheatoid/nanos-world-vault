<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Mod Menu</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&family=Chakra+Petch:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Oxanium:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<style>
		:root {
			--bg: #0a0c10;
			--panel: rgba(12, 16, 24, .72);
			--panel-solid: #0e1219;
			--card: rgba(18, 24, 36, .65);
			--card-hover: rgba(24, 34, 52, .85);
			--border: rgba(0, 229, 160, .12);
			--border-hover: rgba(0, 229, 160, .35);
			--accent: #00e5a0;
			--accent-dim: rgba(0, 229, 160, .15);
			--accent-glow: rgba(0, 229, 160, .4);
			--accent2: #00e5a0;
			--fg: #e0e8f0;
			--fg-muted: #6b7a8d;
			--sidebar-bg: rgba(6, 8, 14, .6);
			--topbar-bg: rgba(6, 8, 14, .35);
			--grid-color: rgba(0, 229, 160, .03);
			--danger: #ff4466;
			--danger-dim: rgba(255, 68, 102, .12);
			--danger-glow: rgba(255, 68, 102, .3);
			--warn: #ffaa22;
			--warn-dim: rgba(255, 170, 34, .12);
			--success: #4ade80;
			--sidebar-w: 72px;
			--topbar-h: 56px;
			--radius: 10px;
			--radius-sm: 6px;
			--blur-heavy: 40px;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box
		}

		html {
			background: transparent !important
		}

		body {
			font-family: 'Rajdhani', sans-serif;
			background: transparent !important;
			color: var(--fg);
			overflow: hidden;
			height: 100vh;
			width: 100vw;
			user-select: none
		}

		.bg-scene {
			position: fixed;
			inset: 0;
			z-index: 0;
			overflow: hidden;
			transition: opacity .6s;
			opacity: 0;
			pointer-events: none
		}

		.bg-scene canvas {
			width: 100%;
			height: 100%
		}

		.bg-gradient {
			position: absolute;
			inset: 0;
			background: radial-gradient(ellipse 80% 60% at 20% 80%, rgba(0, 229, 160, .06) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0, 140, 200, .05) 0%, transparent 60%), radial-gradient(ellipse 100% 100% at 50% 50%, rgba(6, 8, 14, .9) 0%, transparent 100%);
			pointer-events: none;
			transition: opacity .6s;
			opacity: 0
		}

		.bg-grid {
			position: absolute;
			inset: 0;
			background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
			background-size: 60px 60px;
			animation: gridDrift 20s linear infinite;
			pointer-events: none;
			transition: opacity .6s;
			opacity: 0
		}

		@keyframes gridDrift {
			0% {
				transform: translate(0, 0)
			}
			100% {
				transform: translate(60px, 60px)
			}
		}

		.bg-vignette {
			position: absolute;
			inset: 0;
			background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, .7) 100%);
			pointer-events: none;
			transition: opacity .6s;
			opacity: 0
		}

		.scanlines {
			position: fixed;
			inset: 0;
			z-index: 2;
			pointer-events: none;
			background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .03) 2px, rgba(0, 0, 0, .03) 4px);
			transition: opacity .6s;
			opacity: 0
		}

		[data-active-theme="light"] .bg-scene {
			opacity: .15
		}

		[data-active-theme="light"] .bg-grid {
			opacity: .12
		}

		[data-active-theme="light"] .scanlines {
			opacity: 0
		}

		[data-active-theme="light"] .float-particle {
			display: none !important
		}

		[data-active-theme="light"] .bg-vignette {
			opacity: .1
		}

		[data-active-theme="light"] .bg-gradient {
			opacity: .25
		}

		[data-active-theme="muted"] .bg-gradient {
			background: radial-gradient(ellipse 80% 60% at 30% 70%, rgba(230, 160, 50, .04) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 70% 30%, rgba(200, 200, 220, .03) 0%, transparent 60%), radial-gradient(ellipse 100% 100% at 50% 50%, rgba(8, 10, 16, .92) 0%, transparent 100%)
		}

		[data-active-theme="muted"] .bg-grid {
			background-image: linear-gradient(rgba(230, 160, 50, .02) 1px, transparent 1px), linear-gradient(90deg, rgba(230, 160, 50, .02) 1px, transparent 1px)
		}

		[data-active-theme="glass"] .sidebar-logo {
			background: rgba(0, 212, 255, .3);
			border: 1px solid rgba(0, 212, 255, .4);
			color: rgba(0, 212, 255, .9);
			box-shadow: 0 0 16px rgba(0, 212, 255, .2)
		}

		.float-particle {
			position: fixed;
			width: 2px;
			height: 2px;
			background: var(--accent);
			border-radius: 50%;
			pointer-events: none;
			z-index: 1;
			opacity: 0;
			animation: floatUp linear infinite;
			transition: background .5s
		}

		@keyframes floatUp {
			0% {
				opacity: 0;
				transform: translateY(0) scale(1)
			}
			10% {
				opacity: .6
			}
			90% {
				opacity: .1
			}
			100% {
				opacity: 0;
				transform: translateY(-100vh) scale(.3)
			}
		}

		.spawn-hint {
			position: fixed;
			bottom: 32px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 5;
			font-family: 'Share Tech Mono', monospace;
			font-size: 13px;
			color: var(--fg-muted);
			letter-spacing: 2px;
			text-transform: uppercase;
			opacity: 0;
			animation: hintFade 1s 1.5s forwards;
			transition: color .4s
		}

		.spawn-hint kbd {
			display: inline-block;
			background: var(--accent-dim);
			border: 1px solid var(--border-hover);
			border-radius: 4px;
			padding: 2px 8px;
			font-size: 12px;
			color: var(--accent);
			margin: 0 2px;
			transition: all .4s
		}

		@keyframes hintFade {
			to {
				opacity: 1
			}
		}

		/* MENU */
		.admin-menu {
			position: fixed;
			top: 20px;
			left: 20px;
			width: 960px;
			height: calc(100vh - 40px);
			min-width: 600px;
			min-height: 400px;
			z-index: 10;
			display: flex;
			border-radius: 14px;
			overflow: hidden;
			border: 1px solid var(--border);
			background: var(--panel);
			backdrop-filter: blur(var(--blur-heavy));
			-webkit-backdrop-filter: blur(var(--blur-heavy));
			box-shadow: 0 0 80px rgba(0, 229, 160, .04), 0 32px 64px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(255, 255, 255, .04);
			transform: translateX(-110%) scale(.95);
			opacity: 0;
			transition: transform .55s cubic-bezier(.16, 1, .3, 1), opacity .4s ease, border-color .4s, box-shadow .4s;
			pointer-events: none
		}

		.admin-menu.open {
			transform: translateX(0) scale(1);
			opacity: 1;
			pointer-events: all
		}

		.admin-menu.closing {
			transform: translateX(-110%) scale(.95);
			opacity: 0;
			pointer-events: none
		}

		.resize-handle {
			position: absolute;
			bottom: 0;
			right: 0;
			width: 20px;
			height: 20px;
			cursor: nwse-resize;
			z-index: 20;
			background: linear-gradient(135deg, transparent 50%, rgba(128, 128, 128, .3) 50%)
		}

		.resize-handle:hover {
			background: linear-gradient(135deg, transparent 50%, var(--accent) 50%)
		}

		/* SIDEBAR */
		.sidebar {
			width: var(--sidebar-w);
			min-width: var(--sidebar-w);
			background: var(--sidebar-bg);
			backdrop-filter: blur(20px);
			border-right: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 12px 0;
			gap: 4px;
			position: relative;
			z-index: 2;
			transition: background .4s, border-color .4s
		}

		.sidebar-logo {
			width: 40px;
			height: 40px;
			border-radius: 8px;
			background: linear-gradient(135deg, var(--accent), var(--accent2));
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 700;
			font-size: 16px;
			color: #0a0c10;
			margin-bottom: 12px;
			box-shadow: 0 0 20px var(--accent-glow);
			transition: all .4s
		}

		[data-active-theme="light"] .sidebar-logo, [data-active-theme="muted"] .sidebar-logo {
			color: #fff
		}

		.sidebar-divider {
			width: 36px;
			height: 1px;
			background: var(--border);
			margin: 6px 0;
			transition: background .4s
		}

		.sidebar-btn {
			width: 48px;
			height: 48px;
			border: none;
			background: transparent;
			color: var(--fg-muted);
			font-size: 18px;
			border-radius: var(--radius-sm);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all .25s;
			position: relative
		}

		.sidebar-btn:hover {
			color: var(--fg);
			background: rgba(128, 128, 128, .08)
		}

		.sidebar-btn.active {
			color: var(--accent);
			background: var(--accent-dim)
		}

		.sidebar-btn.active::before {
			content: '';
			position: absolute;
			left: -12px;
			top: 50%;
			transform: translateY(-50%);
			width: 3px;
			height: 24px;
			background: var(--accent);
			border-radius: 0 3px 3px 0;
			box-shadow: 0 0 10px var(--accent-glow);
			transition: all .4s
		}

		.sidebar-btn .tooltip {
			position: absolute;
			left: calc(100% + 10px);
			top: 50%;
			transform: translateY(-50%) translateX(-4px);
			background: var(--panel-solid);
			border: 1px solid var(--border);
			color: var(--fg);
			font-size: 12px;
			font-weight: 500;
			padding: 4px 10px;
			border-radius: var(--radius-sm);
			white-space: nowrap;
			opacity: 0;
			pointer-events: none;
			transition: all .2s;
			z-index: 100
		}

		.sidebar-btn:hover .tooltip {
			opacity: 1;
			transform: translateY(-50%) translateX(0)
		}

		.sidebar-spacer {
			flex: 1
		}

		/* CONTENT */
		.content {
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			position: relative
		}

		.topbar {
			height: var(--topbar-h);
			min-height: var(--topbar-h);
			display: flex;
			align-items: center;
			padding: 0 20px;
			gap: 10px;
			border-bottom: 1px solid var(--border);
			background: var(--topbar-bg);
			transition: all .4s;
			flex-shrink: 0
		}

		.topbar-title {
			font-size: 15px;
			font-weight: 600;
			letter-spacing: 1.5px;
			text-transform: uppercase;
			color: var(--fg);
			white-space: nowrap;
			transition: color .4s
		}

		.topbar-title span {
			color: var(--accent);
			transition: color .4s
		}

		.search-box {
			flex: 1;
			max-width: 280px;
			position: relative
		}

		.search-box i {
			position: absolute;
			left: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--fg-muted);
			font-size: 13px;
			transition: color .2s
		}

		.search-box input {
			width: 100%;
			background: rgba(128, 128, 128, .06);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 8px 14px 8px 36px;
			font-family: 'Share Tech Mono', monospace;
			font-size: 13px;
			color: var(--fg);
			outline: none;
			transition: all .25s
		}

		.search-box input::placeholder {
			color: var(--fg-muted);
			font-family: 'Rajdhani', sans-serif;
			letter-spacing: .5px
		}

		.search-box input:focus {
			border-color: var(--border-hover);
			background: var(--accent-dim);
			box-shadow: 0 0 16px var(--accent-dim)
		}

		.col-btn {
			padding: 7px 12px;
			background: rgba(128, 128, 128, .05);
			border: 1px solid var(--border);
			border-radius: var(--radius-sm);
			color: var(--fg-muted);
			font-family: 'Rajdhani', sans-serif;
			font-size: 12px;
			font-weight: 600;
			letter-spacing: .5px;
			cursor: pointer;
			transition: all .2s;
			white-space: nowrap;
			display: flex;
			align-items: center;
			gap: 6px;
			position: relative
		}

		.col-btn:hover {
			border-color: var(--border-hover);
			color: var(--fg)
		}

		.col-btn i {
			font-size: 10px;
			transition: transform .2s
		}

		.col-btn.open i {
			transform: rotate(180deg)
		}

		.item-count {
			font-family: 'Share Tech Mono', monospace;
			font-size: 12px;
			color: var(--fg-muted);
			white-space: nowrap;
			padding: 4px 10px;
			background: rgba(128, 128, 128, .05);
			border-radius: var(--radius-sm);
			border: 1px solid var(--border);
			transition: all .4s
		}

		.item-count b {
			color: var(--accent);
			font-weight: 400;
			transition: color .4s
		}

		/* COLUMN PICKER */
		.col-picker {
			position: absolute;
			z-index: 30;
			background: var(--panel-solid);
			border: 1px solid var(--border);
			border-radius: 0 0 var(--radius) var(--radius);
			width: 280px;
			transform: translateY(-4px);
			opacity: 0;
			pointer-events: none;
			transition: all .25s cubic-bezier(.16, 1, .3, 1);
			box-shadow: 0 12px 32px rgba(0, 0, 0, .4)
		}

		.col-picker.open {
			transform: translateY(0);
			opacity: 1;
			pointer-events: all
		}

		.col-picker-head {
			padding: 12px 16px 8px;
			font-size: 10px;
			font-weight: 700;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: var(--fg-muted);
			border-bottom: 1px solid var(--border)
		}

		.col-picker-body {
			padding: 6px 0
		}

		.col-pick-item {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 6px 16px;
			transition: background .15s
		}

		.col-pick-item:hover {
			background: rgba(128, 128, 128, .04)
		}

		.col-pick-toggle {
			position: relative;
			width: 32px;
			height: 18px;
			background: rgba(128, 128, 128, .1);
			border-radius: 9px;
			cursor: pointer;
			transition: background .25s;
			flex-shrink: 0;
			border: 1px solid var(--border)
		}

		.col-pick-toggle.on {
			background: var(--accent-dim);
			border-color: var(--accent)
		}

		.col-pick-toggle::after {
			content: '';
			position: absolute;
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: var(--fg-muted);
			top: 2px;
			left: 2px;
			transition: all .25s cubic-bezier(.25, .46, .45, .94)
		}

		.col-pick-toggle.on::after {
			left: 16px;
			background: var(--accent);
			box-shadow: 0 0 6px var(--accent-glow)
		}

		.col-pick-name {
			flex: 1;
			font-size: 12px;
			font-weight: 500;
			color: var(--fg);
			transition: color .4s
		}

		.col-pick-order {
			display: flex;
			flex-direction: column;
			gap: 1px
		}

		.col-pick-order button {
			width: 18px;
			height: 14px;
			border: none;
			background: transparent;
			color: var(--fg-muted);
			font-size: 8px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 2px;
			transition: all .15s
		}

		.col-pick-order button:hover {
			background: rgba(128, 128, 128, .1);
			color: var(--fg)
		}

		.col-pick-order button:disabled {
			opacity: .2;
			cursor: default
		}

		.col-pick-item.drag-over {
			background: rgba(0, 229, 160, .1);
			border-color: var(--accent)
		}

		/* TAB CONTENT */
		.tab-content {
			display: none;
			flex: 1;
			overflow: hidden;
			flex-direction: column
		}

		.tab-content.active {
			display: flex
		}

		/* SUBTAB BAR */
		.subtab-bar {
			display: flex;
			gap: 2px;
			padding: 8px 20px;
			border-bottom: 1px solid var(--border);
			flex-shrink: 0;
			transition: border-color .4s
		}

		.subtab-btn {
			padding: 6px 14px;
			font-size: 12px;
			font-weight: 600;
			letter-spacing: 1px;
			text-transform: uppercase;
			color: var(--fg-muted);
			background: transparent;
			border: none;
			border-radius: var(--radius-sm);
			cursor: pointer;
			white-space: nowrap;
			transition: all .2s
		}

		.subtab-btn:hover {
			color: var(--fg);
			background: rgba(128, 128, 128, .06)
		}

		.subtab-btn.active {
			color: var(--accent);
			background: var(--accent-dim)
		}

		/* TABLE */
		.table-wrap {
			flex: 1;
			overflow-y: auto;
			overflow-x: auto;
			scrollbar-width: thin;
			scrollbar-color: var(--accent-dim) transparent
		}

		.table-wrap::-webkit-scrollbar {
			width: 6px;
			height: 6px
		}

		.table-wrap::-webkit-scrollbar-thumb {
			background: var(--accent-dim);
			border-radius: 3px
		}

		.table-wrap::-webkit-scrollbar-track {
			background: transparent
		}

		.table-header {
			display: grid;
			align-items: center;
			border-bottom: 1px solid var(--border);
			position: sticky;
			top: 0;
			z-index: 5;
			background: var(--panel-solid);
			backdrop-filter: blur(12px);
			transition: background .4s
		}

		.hcell {
			padding: 8px 10px;
			font-size: 10px;
			font-weight: 700;
			letter-spacing: 1.2px;
			text-transform: uppercase;
			color: var(--fg-muted);
			transition: color .4s;
			border-right: 1px solid rgba(128, 128, 128, .04)
		}

		.hcell.flex {
			grid-column: span 1
		}

		.hcell:last-child {
			border-right: none
		}

		.hcell.sortable {
			cursor: pointer;
			user-select: none
		}

		.hcell.sortable:hover {
			color: var(--accent)
		}

		.hcell .sort-icon {
			margin-left: 4px;
			font-size: 9px;
			opacity: .5
		}

		.hcell.sort-asc .sort-icon,
		.hcell.sort-desc .sort-icon {
			opacity: 1;
			color: var(--accent)
		}

		.prow {
			display: grid;
			align-items: center;
			border-bottom: 1px solid rgba(128, 128, 128, .05);
			transition: background .2s;
			position: relative
		}

		.prow:hover {
			background: rgba(128, 128, 128, .04)
		}

		.prow.expanded {
			background: rgba(128, 128, 128, .03)
		}

		.pcell {
			padding: 10px;
			font-size: 13px;
			color: var(--fg);
			display: flex;
			align-items: center;
			gap: 6px;
			transition: color .4s;
			border-right: 1px solid rgba(128, 128, 128, .03);
			overflow: hidden
		}

		.pcell:last-of-type {
			border-right: none
		}

		.pcell-avatar img {
			width: 32px;
			height: 32px;
			border-radius: 6px;
			object-fit: cover;
			border: 1px solid var(--border);
			flex-shrink: 0
		}

		.pcell-flag {
			font-size: 20px;
			padding: 10px 8px;
			justify-content: center
		}

		.pcell-steam {
			font-family: 'Share Tech Mono', monospace;
			font-size: 11px;
			color: var(--fg-muted);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis
		}

		.pcell-name {
			font-weight: 600;

		}

			color: #fff;
			box-shadow: 0 0 16px var(--danger-glow)

		/* Ban detail modal with proof sidebar */

			display: flex;
			gap: 0;
			min-height: 300px
		}

		.ban-detail-main {
			flex: 1;
			padding: 20px;
			min-width: 0

		.ban-detail-proof {

			height: 100%;
			object-fit: cover

			bottom: 4px;
			right: 4px;
			background: rgba(0, 0, 0, .7);
			color: #fff;
			font-size: 8px;
			padding: 2px 5px;
			border-radius: 3px;
			font-weight: 600;
			letter-spacing: .5px
		}

		.ban-stat-row {
			display: flex;
			padding: 8px 0;
			border-bottom: 1px solid rgba(128, 128, 128, .06);
			font-size: 13px

			width: 100px;
			flex-shrink: 0;
			font-weight: 500;

		.ban-stat-row .bsv {
			color: var(--fg);
			flex: 1;
			font-family: 'Share Tech Mono', monospace;
			font-size: 12px;
			transition: color .4s

			position: absolute;
			inset: 0;
			z-index: 50;
			display: flex;
			align-items: center;
			justify-content: center;
			opacity: 0;
			pointer-events: none;
			transition: opacity .3s
		}

		.settings-overlay.open {
			opacity: 1;
			pointer-events: all
		}

		.settings-backdrop {
			position: absolute;
			inset: 0;
			background: rgba(0, 0, 0, .5);
			backdrop-filter: blur(8px)
		}

		.settings-panel {
			position: relative;
			width: 92%;
			max-width: 420px;
			max-height: 85%;
			background: var(--panel-solid);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			overflow: hidden;
			transform: translateY(20px) scale(.96);
			transition: transform .4s cubic-bezier(.16, 1, .3, 1), background .4s, border-color .4s;
			display: flex;
			flex-direction: column
		}

		.settings-overlay.open .settings-panel {
			transform: translateY(0) scale(1)
		}

		.settings-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 14px 18px;
			border-bottom: 1px solid var(--border);
			flex-shrink: 0
		}

		.settings-header h2 {
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: var(--fg)
		}

		.settings-header h2 i {
			color: var(--accent);
			margin-right: 8px
		}

		.settings-close {
			width: 30px;
			height: 30px;
			border: none;
			background: transparent;
			color: var(--fg-muted);
			font-size: 15px;
			border-radius: var(--radius-sm);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all .2s
		}

		.settings-close:hover {
			color: var(--fg);
			background: rgba(128, 128, 128, .1)
		}

		.settings-body {
			flex: 1;
			overflow-y: auto;
			padding: 16px 18px;
			scrollbar-width: thin;
			scrollbar-color: var(--accent-dim) transparent
		}

		.settings-body::-webkit-scrollbar {
			width: 4px
		}

		.settings-body::-webkit-scrollbar-thumb {
			background: var(--accent-dim);
			border-radius: 2px
		}

		.settings-section {
			margin-bottom: 20px
		}

		.settings-section-title {
			font-size: 10px;
			font-weight: 700;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: var(--fg-muted);
			margin-bottom: 10px
		}

		.theme-swatches {
			display: grid;
			grid-template-columns:repeat(4, 1fr);
			gap: 6px
		}

		.theme-swatch {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 4px;
			padding: 10px 4px 8px;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: var(--radius-sm);
			cursor: pointer;
			transition: all .25s
		}

		.theme-swatch:hover {
			border-color: var(--border-hover);
			background: var(--card-hover)
		}

		.theme-swatch.active {
			border-color: var(--accent);
			box-shadow: 0 0 10px var(--accent-glow)
		}

		.swatch-color {
			width: 22px;
			height: 22px;
			border-radius: 50%;
			box-shadow: 0 2px 6px rgba(0, 0, 0, .3)
		}

		.theme-swatch.active .swatch-color {
			box-shadow: 0 0 10px var(--accent-glow)
		}

		.theme-swatch span {
			font-size: 9px;
			font-weight: 600;
			letter-spacing: .3px;
			text-transform: uppercase;
			color: var(--fg-muted)
		}

		.theme-swatch.active span {
			color: var(--accent)
		}

		.setting-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			margin-bottom: 12px
		}

		.setting-label {
			font-size: 12px;
			font-weight: 500;
			color: var(--fg)
		}

		.setting-label small {
			display: block;
			font-size: 10px;
			color: var(--fg-muted);
			font-weight: 400;
			margin-top: 1px

		.setting-control {
			flex-shrink: 0
		}

		select.sel-s {
			background: var(--card);

			background-position: right 8px center;
			transition: all .25s;
			min-width: 140px
		}

		select.sel-s option {
			background: var(--panel-solid);
			color: var(--fg)
		}

		/* TOAST */
		.toast-container {
			position: fixed;
			top: 24px;
			right: 24px;
			z-index: 100;
			display: flex;
			flex-direction: column;
			gap: 8px
		}

		.toast {
			background: var(--panel-solid);
			border: 1px solid var(--border-hover);
			border-radius: var(--radius);
			padding: 10px 18px;
			font-size: 13px;
			font-weight: 500;
			color: var(--fg);
			display: flex;
			align-items: center;
			gap: 10px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, .5), 0 0 16px var(--accent-dim);
			animation: toastIn .4s cubic-bezier(.16, 1, .3, 1), toastOut .3s 2.2s ease forwards;
			backdrop-filter: blur(16px)
		}

		.toast i {
			font-size: 14px
		}

		.toast i.fa-check {
			color: var(--accent)
		}

		.toast i.fa-user-slash {
			color: var(--warn)
		}

		.toast i.fa-hammer {
			color: var(--danger)
		}

		.toast i.fa-unlock {
			color: var(--accent)
		}

		@keyframes toastIn {
			from {
				transform: translateX(100px);
				opacity: 0
			}
			to {
				transform: translateX(0);
				opacity: 1
			}
		}

		@keyframes toastOut {
			to {
				transform: translateX(100px);
				opacity: 0
			}
		}

		/* MUTED THEME OVERRIDES */
		[data-active-theme="muted"] .sidebar-logo {

		}

			box-shadow: 0 0 10px rgba(232, 162, 58, .3)
		}

		[data-active-theme="muted"] .spawn-btn, [data-active-theme="muted"] .fb-new-btn:hover, [data-active-theme="muted"] .modal-btn.primary:hover {

			}
		}

		@media (prefers-reduced-motion: reduce) {

				animation-iteration-count: 1 !important;

			}

	/* BACKGROUND */
	const bgCanvas = document.getElementById('bgCanvas');
	const ctx = bgCanvas.getContext('2d');
	let bgW, bgH;
	const orbs = [];

	function resizeBg() {
		bgW = bgCanvas.width = window.innerWidth;
		bgH = bgCanvas.height = window.innerHeight
	}

	resizeBg();
	window.addEventListener('resize', resizeBg);
	for (let i = 0; i < 6; i++) orbs.push({
		x: Math.random() * bgW,
		y: Math.random() * bgH,
		vx: (Math.random() - .5) * .25,
		vy: (Math.random() - .5) * .25,
		r: 100 + Math.random() * 200,
		hue: 160,
		sat: 80,
		alpha: .012 + Math.random() * .02
	});

	function drawBg() {
		ctx.clearRect(0, 0, bgW, bgH);
		for (const o of orbs) {
			o.x += o.vx;
			o.y += o.vy;
			if (o.x < -o.r) o.x = bgW + o.r;
			if (o.x > bgW + o.r) o.x = -o.r;
			if (o.y < -o.r) o.y = bgH + o.r;
			if (o.y > bgH + o.r) o.y = -o.r;
			const r = Math.max(1, o.r);
			const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
			g.addColorStop(0, `hsla(${o.hue},${o.sat}%,50%,${o.alpha})`);
			g.addColorStop(1, `hsla(${o.hue},${o.sat}%,50%,0)`);
			ctx.fillStyle = g;
			ctx.fillRect(o.x - r, o.y - r, r * 2, r * 2);
		}
		requestAnimationFrame(drawBg)
	}

	/* THEME */
	function applyTheme(id) {
		const th = THEMES[id];
		if (!th) return;
		currentTheme = id;
		const r = document.documentElement;
		for (const [p, v] of Object.entries(th.vars)) r.style.setProperty(p, v);
		document.body.setAttribute('data-active-theme', id);
		for (const o of orbs) {
			o.hue = th.orbHue + (Math.random() - .5) * 20;
			o.sat = th.orbSat
		}
		createParticles();
		document.querySelectorAll('.theme-swatch').forEach(s => s.classList.toggle('active', s.dataset.theme === id));

		// Show/hide opacity slider based on theme
		if (id === 'glass') {
			opacityRow.style.display = 'flex';
			// Extract current opacity from --panel value
			const panelColor = getComputedStyle(document.documentElement).getPropertyValue('--panel');
			const match = panelColor.match(/rgba\(\d+,\s*\d+,\s*\d+,\s*([\d.]+)\)/);
			if (match) {
				const currentOpacity = Math.round(parseFloat(match[1]) * 100);
				opacitySlider.value = currentOpacity;
				opacityValEl.textContent = currentOpacity + '%';
			}
		} else {
			opacityRow.style.display = 'none';
		}
	}

	function buildThemeSwatches() {
		const el = document.getElementById('themeSwatches');
		el.innerHTML = '';
		for (const [id, th] of Object.entries(THEMES)) {
			const d = document.createElement('div');
			d.className = 'theme-swatch' + (id === currentTheme ? ' active' : '');
			d.dataset.theme = id;
			d.innerHTML = `<div class="swatch-color" style="background:${th.preview}"></div><span>${th.name}</span>`;
			d.addEventListener('click', () => {
				applyTheme(id);
				showToast(`Theme: ${th.name}`, 'fa-palette')
			});
			el.appendChild(d)
		}
	}

	/* COLUMN PICKER */
	function toggleColPicker() {
		colPickerOpen = !colPickerOpen;
		colPicker.classList.toggle('open', colPickerOpen);
		colBtn.classList.toggle('open', colPickerOpen);
		if (colPickerOpen) {
			const btnRect = colBtn.getBoundingClientRect();
			const topbarRect = colBtn.closest('.topbar').getBoundingClientRect();
			colPicker.style.top = (btnRect.bottom - topbarRect.top + 2) + 'px';
			colPicker.style.left = (btnRect.left - topbarRect.left) + 'px';
			renderColPicker()
		}
	}

	function closeColPicker() {
		colPickerOpen = false;
		colPicker.classList.remove('open');
		colBtn.classList.remove('open')
	}

	colBtn.addEventListener('click', e => {
		e.stopPropagation();
		toggleColPicker()
	});
	document.addEventListener('click', e => {
		if (colPickerOpen && !colPicker.contains(e.target) && !colBtn.contains(e.target)) closeColPicker()
	});

	function renderColPicker() {
		const cols = activeTab === 'players' ? pCols : bCols;
		colPickerBody.innerHTML = '';
		cols.forEach((c, i) => {
			const item = document.createElement('div');
			item.className = 'col-pick-item';
			item.draggable = true;
			item.dataset.idx = i;
			item.innerHTML = `<div class="col-pick-toggle${c.vis ? ' on' : ''}" data-idx="${i}"></div><span class="col-pick-name">${c.label}</span><div class="col-pick-order"><button data-dir="up" data-idx="${i}" ${i === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-up"></i></button><button data-dir="down" data-idx="${i}" ${i === cols.length - 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-down"></i></button></div>`;
			colPickerBody.appendChild(item);
		});

		let draggedItem = null;
		let draggedIdx = null;

		colPickerBody.querySelectorAll('.col-pick-item').forEach(item => {
			item.addEventListener('dragstart', e => {
				e.stopPropagation();
				draggedItem = item;
				draggedIdx = parseInt(item.dataset.idx);
				item.style.opacity = '0.5';
				e.dataTransfer.effectAllowed = 'move';
			});

			item.addEventListener('dragend', e => {
				item.style.opacity = '1';
				draggedItem = null;
				draggedIdx = null;
				colPickerBody.querySelectorAll('.col-pick-item').forEach(i => i.classList.remove('drag-over'));
			});

			item.addEventListener('dragover', e => {
				e.preventDefault();
				e.dataTransfer.dropEffect = 'move';
				if (item !== draggedItem) {
					item.classList.add('drag-over');
				}
			});

			item.addEventListener('dragleave', e => {
				item.classList.remove('drag-over');
			});

			item.addEventListener('drop', e => {
				e.preventDefault();
				e.stopPropagation();
				if (draggedItem === item || draggedIdx === null) return;
				const dropIdx = parseInt(item.dataset.idx);
				const cols2 = activeTab === 'players' ? pCols : bCols;
				const [removed] = cols2.splice(draggedIdx, 1);
				cols2.splice(dropIdx, 0, removed);
				renderColPicker();
				renderActiveTab();
			});
		});

		colPickerBody.querySelectorAll('.col-pick-toggle').forEach(t => {
			t.addEventListener('click', e => {
				e.stopPropagation();
				const idx = parseInt(t.dataset.idx);
				const cols2 = activeTab === 'players' ? pCols : bCols;
				cols2[idx].vis = !cols2[idx].vis;
				t.classList.toggle('on', cols2[idx].vis);
				renderActiveTab();
			});
		});
		colPickerBody.querySelectorAll('.col-pick-order button').forEach(b => {
			b.addEventListener('click', e => {
				e.stopPropagation();
				const idx = parseInt(b.dataset.idx);
				const dir = b.dataset.dir;
				const cols2 = activeTab === 'players' ? pCols : bCols;
				const swap = dir === 'up' ? idx - 1 : idx + 1;
				if (swap < 0 || swap >= cols2.length) return;
				[cols2[idx], cols2[swap]] = [cols2[swap], cols2[idx]];
				renderColPicker();
				renderActiveTab();
			});
		});
	}

	/* TAB SWITCHING */
	document.querySelectorAll('.sidebar-btn[data-tab]').forEach(btn => {
		btn.addEventListener('click', () => {
			document.querySelectorAll('.sidebar-btn[data-tab]').forEach(b => b.classList.remove('active'));
			btn.classList.add('active');
			activeTab = btn.dataset.tab;
			const titles = {players: 'Players', bans: 'Bans', feedback: 'Feedback'};
			tabTitle.textContent = titles[activeTab];
			searchInput.value = '';
			closeColPicker();
			colBtn.style.display = activeTab === 'feedback' ? 'none' : 'flex';
			document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
			document.getElementById(activeTab + 'Tab').classList.add('active');
			renderActiveTab();
		});
	});

	function renderActiveTab() {
		if (activeTab === 'players') renderPlayers();
		else if (activeTab === 'bans') renderBans();
		else renderFeedback();
	}

	/* HELPERS */
	function pingColor(p) {
		if (p < 50) return 'var(--success)';
		if (p < 100) return 'var(--warn)';
		return 'var(--danger)'
	}

	function pingBars(p) {
		const n = p < 50 ? 4 : p < 100 ? 3 : p < 200 ? 2 : 1;
		const c = p < 50 ? 'on' : p < 100 ? 'warn' : 'bad';
		return [0, 1, 2, 3].map(i => `<div class="bar${i < n ? ' ' + c : ''}"></div>`).join('')
	}

	function healthColor(h) {
		if (h > 60) return 'var(--success)';
		if (h > 30) return 'var(--warn)';
		return 'var(--danger)'
	}

	function voiceIcon(p) {
		if (p.muted || p.vol === 0) return 'fa-volume-xmark';
		if (p.vol < .5) return 'fa-volume-low';
		return 'fa-volume-high'
	}

	function rankStyle(r) {
		const m = {
			Owner: 'background:var(--accent-dim);color:var(--accent)',
			'Super Admin': 'background:rgba(232,162,58,.12);color:#E8A23A',
			Admin: 'background:rgba(100,140,255,.12);color:#8aa8ff',
			Moderator: 'background:rgba(160,120,255,.12);color:#b090ff',
			VIP: 'background:rgba(255,200,50,.12);color:#ffc832',
			Member: 'background:rgba(128,128,128,.08);color:var(--fg-muted)'
		};
		return m[r] || m.Member
	}

	function getAvatar(name) {
		return `https://picsum.photos/seed/${name}/64/64.jpg`
	}

	function getProofImg(name) {
		return `https://picsum.photos/seed/${name}/320/200.jpg`
	}

	/* RENDER PLAYERS */
	function renderPlayers() {
		const q = searchInput.value.trim().toLowerCase();
		let filtered = PLAYERS.filter(p => !q || p.name.toLowerCase().includes(q) || p.steam.toLowerCase().includes(q));

		// Apply sorting
		if (playerSort.col) {
			filtered.sort((a, b) => {
				const colMap = {flag: 'country'};
				const dataCol = colMap[playerSort.col] || playerSort.col;
				let valA = a[dataCol];
				let valB = b[dataCol];
				if (typeof valA === 'string') valA = valA.toLowerCase();
				if (typeof valB === 'string') valB = valB.toLowerCase();
				if (valA < valB) return playerSort.dir === 'asc' ? -1 : 1;
				if (valA > valB) return playerSort.dir === 'asc' ? 1 : -1;
				return 0;
			});
		}

		countNum.innerHTML = `<b>${filtered.length}</b>`;
		const vis = pCols.filter(c => c.vis);
		const gridTemplate = '36px ' + vis.map(c => c.w === '1fr' ? 'minmax(0, 1fr)' : c.w).join(' ');
		let html = `<div class="table-header" style="grid-template-columns: ${gridTemplate}">`;
		html += '<div class="hcell"></div>';
		vis.forEach(c => {
			const isSorted = playerSort.col === c.id;
			const sortClass = isSorted ? (playerSort.dir === 'asc' ? 'sort-asc' : 'sort-desc') : '';
			html += `<div class="hcell sortable ${sortClass}" data-col="${c.id}">${c.label}</div>`
		});
		html += '</div>';
		filtered.forEach(p => {
			const exp = expandedPlayers.has(p.steam);
			html += `<div class="prow${exp ? ' expanded' : ''}" data-steam="${p.steam}" style="grid-template-columns: ${gridTemplate}">`;
			html += `<div class="pcell pcell-expand" data-steam="${p.steam}"><i class="fa-solid fa-chevron-down"></i></div>`;
			vis.forEach(c => {
				let inner = '';
				let cellClass = 'pcell';
				switch (c.id) {
					case'flag':
						cellClass += ' pcell-flag';
						inner = `<span style="font-size:20px">${flag(p.country)}</span>`;
						break;
					case'avatar':
						cellClass += ' pcell-avatar';
						inner = `<img src="${getAvatar(p.avatar)}" alt="${p.name}" loading="lazy">`;
						break;
					case'steam':
						inner = `<span class="pcell-steam">${p.steam}</span>`;
						break;
					case'name':
						inner = `<span class="pcell-name">${p.name}<span class="rank-badge" style="${rankStyle(p.rank)}">${p.rank}</span></span>`;
						break;
					case'health':
						cellClass += ' pcell-health';
						inner = `<div class="health-bar-wrap"><div class="health-bar-fill" style="width:${p.health}%;background:${healthColor(p.health)}"></div></div><span class="health-text">${p.health}</span>`;
						break;
					case'ping':
						cellClass += ' pcell-ping';
						inner = `<div class="signal-bars">${pingBars(p.ping)}</div><span class="ping-text">${p.ping}ms</span>`;
						break;
					case'voice':
						cellClass += ' pcell-voice';
						if (p.muted) cellClass += ' muted';
						inner = `<i class="fa-solid ${voiceIcon(p)}"></i><div class="voice-popover">${p.muted ? 'Muted' : 'Vol ' + Math.round(p.vol * 100) + '%'}</div>`;
						break;
					case'cls':
						inner = p.cls;
						break;
					case'rank':
						inner = `<span style="font-size:11px;color:var(--accent)">${p.rank}</span>`;
						break;
					case'session':
						inner = `<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--fg-muted)">${p.session}</span>`;
						break;
					case'total':
						inner = `<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--fg-muted)">${p.total}</span>`;
						break;
				}
				html += `<div class="${cellClass}"${c.id === 'voice' ? ` data-steam="${p.steam}"` : ''}>${inner}</div>`;
			});
			html += `<div class="pdetail" data-steam="${p.steam}"><div class="pdetail-inner"><div class="pdetail-info"><div class="pdetail-stat">IP:<b>${p.ip}</b></div><div class="pdetail-stat">Props:<b>${p.props}</b></div><div class="pdetail-stat">Ragdolls:<b>${p.ragdolls}</b></div><div class="pdetail-stat">Vehicles:<b>${p.vehicles}</b></div><div class="pdetail-stat">Total Time:<b>${p.total}</b></div></div><div class="pdetail-actions"><button class="act-btn kick" data-steam="${p.steam}"><i class="fa-solid fa-right-from-bracket"></i> Kick</button><button class="act-btn ban" data-steam="${p.steam}"><i class="fa-solid fa-hammer"></i> Ban</button></div></div></div>`;
			html += '</div>';
		});
		playersTable.innerHTML = html;
		bindPlayerEvents();

		// Add sort click handlers
		playersTable.querySelectorAll('.hcell.sortable').forEach(hcell => {
			hcell.addEventListener('click', () => {
				const col = hcell.dataset.col;
				if (playerSort.col === col) {
					playerSort.dir = playerSort.dir === 'asc' ? 'desc' : 'asc';
				} else {
					playerSort.col = col;
					playerSort.dir = 'asc';
				}
				renderPlayers();
			});
		});
	}

	function bindPlayerEvents() {
		playersTable.querySelectorAll('.pcell-expand').forEach(btn => {
			btn.addEventListener('click', e => {
				e.stopPropagation();
				const sid = btn.dataset.steam;
				const row = btn.closest('.prow');
				const detail = row.querySelector('.pdetail');
				if (expandedPlayers.has(sid)) {
					expandedPlayers.delete(sid);
					row.classList.remove('expanded');
					detail.style.maxHeight = '0';
				} else {
					expandedPlayers.add(sid);
					row.classList.add('expanded');
					detail.style.maxHeight = detail.scrollHeight + 'px';
				}
			});
		});

		// Add row click handler for expand/collapse
		playersTable.querySelectorAll('.prow').forEach(row => {
			row.addEventListener('click', () => {
				const sid = row.dataset.steam;
				const detail = row.querySelector('.pdetail');
				if (expandedPlayers.has(sid)) {
					expandedPlayers.delete(sid);
					row.classList.remove('expanded');
					detail.style.maxHeight = '0';
				} else {
					expandedPlayers.add(sid);
					row.classList.add('expanded');
					detail.style.maxHeight = detail.scrollHeight + 'px';
				}
			});
		});
		playersTable.querySelectorAll('.pcell-voice').forEach(cell => {
			cell.addEventListener('click', e => {
				e.stopPropagation();
				const p = PLAYERS.find(x => x.steam === cell.dataset.steam);
				if (!p) return;
				if (p.muted || p.vol === 0) {
					p.muted = false;
					p.vol = .5
				} else {
					p.muted = true;
					p.vol = 0
				}
				cell.querySelector('i').className = 'fa-solid ' + voiceIcon(p);
				cell.classList.toggle('muted', p.muted);
				cell.querySelector('.voice-popover').textContent = p.muted ? 'Muted' : 'Vol ' + Math.round(p.vol * 100) + '%';
				const pop = cell.querySelector('.voice-popover');
				pop.classList.add('show');
				setTimeout(() => pop.classList.remove('show'), 800);
			});
			cell.addEventListener('wheel', e => {
				e.preventDefault();
				const p = PLAYERS.find(x => x.steam === cell.dataset.steam);
				if (!p) return;
				p.vol = Math.max(0, Math.min(1, p.vol + (e.deltaY < 0 ? .1 : -.1)));
				p.muted = p.vol === 0;
				cell.querySelector('i').className = 'fa-solid ' + voiceIcon(p);
				cell.classList.toggle('muted', p.muted);
				const pop = cell.querySelector('.voice-popover');
				pop.textContent = p.muted ? 'Muted' : 'Vol ' + Math.round(p.vol * 100) + '%';
				pop.classList.add('show');
				clearTimeout(cell._vt);
				cell._vt = setTimeout(() => pop.classList.remove('show'), 900);
			});
		});
		playersTable.querySelectorAll('.act-btn.kick').forEach(btn => {
			btn.addEventListener('click', e => {
				e.stopPropagation();
				openKickModal(btn.dataset.steam)
			})
		});
		playersTable.querySelectorAll('.act-btn.ban').forEach(btn => {
			btn.addEventListener('click', e => {
				e.stopPropagation();
				openBanModal(btn.dataset.steam)
			})
		});
	}

	/* KICK MODAL */
	function openKickModal(sid) {
		const p = PLAYERS.find(x => x.steam === sid);
		if (!p) return;
		openModal(`<div class="modal-head"><h3><i class="fa-solid fa-right-from-bracket" style="color:var(--warn)"></i> Kick Player</h3><button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:14px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border)"><img src="${getAvatar(p.avatar)}" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--border)"><div><div style="font-weight:700;font-size:15px">${p.name}</div><div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--fg-muted)">${p.steam}</div></div></div><div class="modal-field"><label class="modal-label">Reason</label><input class="modal-input" id="kickReason" placeholder="Specify kick reason..." autofocus></div></div><div class="modal-foot"><button class="modal-btn" onclick="closeModal()">Cancel</button><button class="modal-btn" style="background:var(--warn-dim);border-color:rgba(255,170,34,.3);color:var(--warn)" onclick="doKick('${sid}')">Kick Player</button></div>`);
	}

	function doKick(sid) {
		const r = document.getElementById('kickReason')?.value || 'No reason specified';
		const p = PLAYERS.find(x => x.steam === sid);
		closeModal();
		if (p) showToast(`Kicked ${p.name}: ${r}`, 'fa-user-slash', 'var(--warn)');
	}

	/* BAN MODAL */
	function openBanModal(sid) {
		const p = PLAYERS.find(x => x.steam === sid);
		if (!p) return;
		openModal(`<div class="modal-head"><h3><i class="fa-solid fa-hammer" style="color:var(--danger)"></i> Ban Player</h3><button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:14px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border)"><img src="${getAvatar(p.avatar)}" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--border)"><div><div style="font-weight:700;font-size:15px">${p.name}</div><div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--fg-muted)">${p.steam}</div></div></div><div class="modal-field"><label class="modal-label">Reason</label><input class="modal-input" id="banReason" placeholder="Specify ban reason..." autofocus></div><div class="modal-field"><label class="modal-label">Duration</label><select class="modal-select" id="banDuration"><option value="1h">1 Hour</option><option value="6h">6 Hours</option><option value="1d">1 Day</option><option value="1w" selected>1 Week</option><option value="1m">1 Month</option><option value="perm">Permanent</option><option value="custom">Custom...</option></select></div><div class="modal-field" id="customDateField" style="display:none"><label class="modal-label">Custom Expiration</label><input class="modal-input" type="datetime-local" id="banCustomDate"></div></div><div class="modal-foot"><button class="modal-btn" onclick="closeModal()">Cancel</button><button class="modal-btn danger" onclick="doBan('${sid}')">Ban Player</button></div>`);
		setTimeout(() => {
			const sel = document.getElementById('banDuration');
			const cf = document.getElementById('customDateField');
			if (sel) sel.addEventListener('change', () => {
				cf.style.display = sel.value === 'custom' ? 'block' : 'none'
			});
		}, 50);
	}

	function doBan(sid) {
		const r = document.getElementById('banReason')?.value || 'No reason specified';
		const d = document.getElementById('banDuration')?.value || '1w';
		const p = PLAYERS.find(x => x.steam === sid);
		closeModal();
		if (p) showToast(`Banned ${p.name}: ${r} (${d})`, 'fa-hammer', 'var(--danger)');
	}

	/* RENDER BANS */
	function renderBans() {
		const q = searchInput.value.trim().toLowerCase();
		let filtered = BANS.filter(b => !q || b.name.toLowerCase().includes(q) || b.steam.toLowerCase().includes(q) || b.reason.toLowerCase().includes(q));
		if (bansFilter === 'active') filtered = filtered.filter(b => b.status === 'active');
		else if (bansFilter === 'permanent') filtered = filtered.filter(b => b.status === 'permanent');
		else if (bansFilter === 'expired') filtered = filtered.filter(b => b.status === 'expired');

		// Apply sorting
		if (bansSort.col) {
			filtered.sort((a, b) => {
				let valA = a[bansSort.col];
				let valB = b[bansSort.col];
				if (typeof valA === 'string') valA = valA.toLowerCase();
				if (typeof valB === 'string') valB = valB.toLowerCase();
				if (valA < valB) return bansSort.dir === 'asc' ? -1 : 1;
				if (valA > valB) return bansSort.dir === 'asc' ? 1 : -1;
				return 0;
			});
		}

		countNum.innerHTML = `<b>${filtered.length}</b>`;
		bansFilters.innerHTML = ['all', 'active', 'permanent', 'expired'].map(f => `<button class="subtab-btn${f === bansFilter ? ' active' : ''}" data-filter="${f}">${f}</button>`).join('');
		bansFilters.querySelectorAll('.subtab-btn').forEach(b => {
			b.addEventListener('click', () => {
				bansFilter = b.dataset.filter;
				renderBans()
			})
		});
		const vis = bCols.filter(c => c.vis);
		const gridTemplate = vis.map(c => c.w === '1fr' ? 'minmax(0, 1fr)' : c.w).join(' ');
		let html = `<div class="table-header" style="grid-template-columns: ${gridTemplate}">`;
		vis.forEach(c => {
			const isSorted = bansSort.col === c.id;
			const sortClass = isSorted ? (bansSort.dir === 'asc' ? 'sort-asc' : 'sort-desc') : '';
			html += `<div class="hcell sortable ${sortClass}" data-col="${c.id}">${c.label}</div>`
		});
		html += '</div>';
		filtered.forEach(b => {
			const expBadge = b.status === 'permanent' ? '<span class="badge badge-permanent">Permanent</span>' : b.status === 'expired' ? '<span class="badge badge-expired">Expired</span>' : `<span class="badge badge-active">Active</span>`;
			html += `<div class="brow" data-ban="${b.steam}" style="grid-template-columns: ${gridTemplate}">`;
			vis.forEach(c => {
				let inner = '';
				switch (c.id) {
					case'name':
						inner = `<img src="${getAvatar(b.name.toLowerCase().replace(/[^a-z]/g, ''))}" style="width:28px;height:28px;border-radius:5px;border:1px solid var(--border);flex-shrink:0" loading="lazy"><span style="font-weight:600">${b.name}</span>`;
						break;
					case'steam':
						inner = `<span class="bcell-steam">${b.steam}</span>`;
						break;
					case'ip':
						inner = `<span class="bcell-steam">${b.ip}</span>`;
						break;
					case'by':
						inner = b.bannedBy;
						break;
					case'reason':
						inner = `<span class="bcell-reason" title="${b.reason}">${b.reason}</span>`;
						break;
					case'date':
						inner = `<span class="bcell-date">${b.date.split(' ')[0]}</span>`;
						break;
					case'expires':
						inner = `<div class="bcell-expired">${b.status !== 'expired' ? `<span class="bcell-date">${b.expires.split(' ')[0]}</span> ` : ''}${expBadge}</div>`;
						break;
				}
				html += `<div class="bcell">${inner}</div>`;
			});
			html += '</div>';
		});
		bansTable.innerHTML = html;
		bansTable.querySelectorAll('.brow').forEach(row => {
			row.addEventListener('click', () => {
				const ban = BANS.find(b => b.steam === row.dataset.ban);
				if (ban) openBanDetail(ban)
			});
		});

		// Add sort click handlers
		bansTable.querySelectorAll('.hcell.sortable').forEach(hcell => {
			hcell.addEventListener('click', () => {
				const col = hcell.dataset.col;
				if (bansSort.col === col) {
					bansSort.dir = bansSort.dir === 'asc' ? 'desc' : 'asc';
				} else {
					bansSort.col = col;
					bansSort.dir = 'asc';
				}
				renderBans();
			});
		});
	}

	/* BAN DETAIL MODAL */
	function openBanDetail(b) {
		const proofHtml = b.proof.map((p, i) => `<div class="proof-thumb" style="position:relative"><img src="${getProofImg(p)}" alt="Proof ${i + 1}" loading="lazy"><span class="proof-type">${i < 2 ? 'IMG' : 'VID'}</span></div>`).join('');
		openModal(`<div class="modal-head"><h3><i class="fa-solid fa-gavel" style="color:var(--danger)"></i> Ban Details</h3><button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div><div class="ban-detail-layout"><div class="ban-detail-main"><div class="ban-stat-row"><span class="bsl">Player</span><span class="bsv" style="font-weight:600">${b.name}</span></div><div class="ban-stat-row"><span class="bsl">Steam ID</span><span class="bsv">${b.steam}</span></div><div class="ban-stat-row"><span class="bsl">IP Address</span><span class="bsv">${b.ip}</span></div><div class="ban-stat-row"><span class="bsl">Banned By</span><span class="bsv">${b.bannedBy}</span></div><div class="ban-stat-row"><span class="bsl">Reason</span><span class="bsv">${b.reason}</span></div><div class="ban-stat-row"><span class="bsl">Ban Date</span><span class="bsv">${b.date}</span></div><div class="ban-stat-row"><span class="bsl">Expires</span><span class="bsv">${b.expires}${b.status === 'permanent' ? ' (Permanent)' : ''}</span></div><div class="ban-stat-row"><span class="bsl">Status</span><span class="bsv">${b.status === 'permanent' ? '<span class="badge badge-permanent" style="font-size:10px">Permanent</span>' : b.status === 'expired' ? '<span class="badge badge-expired" style="font-size:10px">Expired</span>' : '<span class="badge badge-active" style="font-size:10px">Active</span>'}</span></div>${b.status !== 'expired' ? `<div style="margin-top:20px"><button class="act-btn unban" style="width:100%;justify-content:center" onclick="doUnban('${b.steam}')"><i class="fa-solid fa-unlock"></i> Unban Player</button></div>` : ''}</div><div class="ban-detail-proof"><h4>Proof</h4>${proofHtml}</div></div>`, `640px`);
	}

	function doUnban(sid) {
		const b = BANS.find(x => x.steam === sid);
		if (b) b.status = 'expired';
		closeModal();
		renderBans();
		showToast(`Unbanned ${b?.name || sid}`, 'fa-unlock', 'var(--accent)');
	}

	/* RENDER FEEDBACK */
	function renderFeedback() {
		let posts = [...FEEDBACK];
		if (fbFilter === 'idea') posts = posts.filter(p => p.type === 'idea');
		else if (fbFilter === 'bug') posts = posts.filter(p => p.type === 'bug');
		if (fbSort === 'votes') posts.sort((a, b) => b.votes - a.votes);
		else if (fbSort === 'comments') posts.sort((a, b) => b.comments.length - a.comments.length);
		countNum.innerHTML = `<b>${posts.length}</b>`;
		fbFilters.innerHTML = ['all', 'idea', 'bug'].map(f => `<button class="fb-sort-btn${f === fbFilter ? ' active' : ''}" data-f="${f}">${f === 'idea' ? 'Ideas' : f === 'bug' ? 'Bugs' : 'All'}</button>`).join('');
		fbFilters.innerHTML += `<span style="width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0"></span>`;
		['newest', 'votes', 'comments'].map(s => `<button class="fb-sort-btn${s === fbSort ? ' active' : ''}" data-s="${s}">${s === 'newest' ? 'Newest' : s === 'votes' ? 'Most Votes' : 'Most Comments'}</button>`).forEach(h => fbFilters.innerHTML += h);
		fbFilters.querySelectorAll('[data-f]').forEach(b => {
			b.addEventListener('click', () => {
				fbFilter = b.dataset.f;
				renderFeedback()
			})
		});
		fbFilters.querySelectorAll('[data-s]').forEach(b => {
			b.addEventListener('click', () => {
				fbSort = b.dataset.s;
				renderFeedback()
			})
		});

		let html = '';
		posts.forEach((p, i) => {
			const exp = fbExpanded.has(p.id);
			html += `<div class="fb-card" style="animation-delay:${i * .04}s"><div class="fb-card-main"><div class="fb-votes"><button class="fb-vote-btn${p.userVote === 1 ? ' voted' : ''}" data-id="${p.id}" data-dir="up"><i class="fa-solid fa-caret-up"></i></button><span class="fb-vote-count">${p.votes}</span><button class="fb-vote-btn${p.userVote === -1 ? ' voted' : ''}" data-id="${p.id}" data-dir="down"><i class="fa-solid fa-caret-down"></i></button></div><div class="fb-body"><div class="fb-title-row"><span class="fb-badge ${p.type}">${p.type}</span><span class="fb-title">${p.title}</span></div><div class="fb-meta">by <b>${p.author}</b> &middot; ${p.date}${p.comments.length ? ` &middot; ${p.comments.length} comment${p.comments.length > 1 ? 's' : ''}` : ''}</div><div class="fb-desc">${p.desc}</div></div></div>${p.comments.length ? `<button class="fb-expand-btn" data-id="${p.id}">${exp ? 'Hide' : 'Show'} Comments (${p.comments.length})</button><div class="fb-comments" data-id="${p.id}"><div class="fb-comments-inner">${p.comments.map(c => `<div class="fb-comment"><img class="fb-comment-avatar" src="${getAvatar(c.avatar)}" loading="lazy"><div class="fb-comment-body"><div class="fb-comment-head"><b>${c.author}</b><span>${c.time}</span></div><div class="fb-comment-text">${c.text}</div></div></div>`).join('')}<div class="fb-comment-input"><input type="text" placeholder="Write a comment..." data-id="${p.id}"><button data-id="${p.id}">Post</button></div></div></div>` : ''}</div>`;
		});
		fbList.innerHTML = html;
		bindFeedbackEvents();
		// Re-expand comments that were previously expanded
		fbExpanded.forEach(id => {
			const cd = fbList.querySelector(`.fb-comments[data-id="${id}"]`);
			if (cd) cd.style.maxHeight = cd.scrollHeight + 'px';
		});
	}

	function bindFeedbackEvents() {
		fbList.querySelectorAll('.fb-vote-btn').forEach(btn => {
			btn.addEventListener('click', () => {
				const id = parseInt(btn.dataset.id), dir = btn.dataset.dir;
				const p = FEEDBACK.find(x => x.id === id);
				if (!p) return;
				if (dir === 'up') {
					if (p.userVote === 1) {
						p.userVote = 0;
						p.votes--
					} else {
						p.votes += p.userVote === -1 ? 2 : 1;
						p.userVote = 1
					}
				} else {
					if (p.userVote === -1) {
						p.userVote = 0;
						p.votes++
					} else {
						p.votes -= p.userVote === 1 ? 2 : 1;
						p.userVote = -1
					}
				}
				// Update DOM directly without full re-render to preserve scroll position
				const card = btn.closest('.fb-card');
				if (card) {
					const voteCount = card.querySelector('.fb-vote-count');
					const upBtn = card.querySelector('.fb-vote-btn[data-dir="up"]');
					const downBtn = card.querySelector('.fb-vote-btn[data-dir="down"]');
					if (voteCount) voteCount.textContent = p.votes;
					if (upBtn) upBtn.classList.toggle('voted', p.userVote === 1);
					if (downBtn) downBtn.classList.toggle('voted', p.userVote === -1);
				}
			});
		});
		fbList.querySelectorAll('.fb-expand-btn').forEach(btn => {
			btn.addEventListener('click', () => {
				const id = parseInt(btn.dataset.id);
				const comDiv = fbList.querySelector(`.fb-comments[data-id="${id}"]`);
				const post = FEEDBACK.find(x => x.id === id);
				if (!comDiv || !post) return;
				if (fbExpanded.has(id)) {
					fbExpanded.delete(id);
					comDiv.style.maxHeight = '0';
					btn.textContent = `Show Comments (${post.comments.length || 0})`
				} else {
					fbExpanded.add(id);
					comDiv.style.maxHeight = comDiv.scrollHeight + 'px';
					btn.textContent = 'Hide Comments'
				}
				saveFbExpanded();
			});
		});
		fbList.querySelectorAll('.fb-comment-input button').forEach(btn => {
			btn.addEventListener('click', () => {
				const id = parseInt(btn.dataset.id);
				const input = fbList.querySelector(`.fb-comment-input input[data-id="${id}"]`);
				const text = input.value.trim();
				if (!text) return;
				const p = FEEDBACK.find(x => x.id === id);
				if (!p) return;
				// Save scroll position before re-rendering
				const scrollTop = fbList.scrollTop;
				p.comments.push({author: 'You', avatar: 'nighthawk', time: 'Just now', text});
				input.value = '';
				renderFeedback();
				// Restore scroll position after re-rendering (clamped to valid range)
				fbList.scrollTop = Math.min(scrollTop, fbList.scrollHeight - fbList.clientHeight);
				// Re-expand comments if they were expanded before
				if (fbExpanded.has(id)) {
					const cd = fbList.querySelector(`.fb-comments[data-id="${id}"]`);
					if (cd) cd.style.maxHeight = cd.scrollHeight + 'px';
				}
			});
		});
		fbList.querySelectorAll('.fb-comment-input input').forEach(input => {
			input.addEventListener('keydown', e => {
				if (e.key === 'Enter') {
					e.preventDefault();
					input.parentElement.querySelector('button').click()
				}
			});
		});
	}

	fbNewBtn.addEventListener('click', () => {
		openModal(`<div class="modal-head"><h3><i class="fa-solid fa-plus" style="color:var(--accent)"></i> New Post</h3><button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div class="modal-field"><label class="modal-label">Type</label><select class="modal-select" id="newPostType"><option value="idea">Idea</option><option value="bug">Bug Report</option></select></div><div class="modal-field"><label class="modal-label">Title</label><input class="modal-input" id="newPostTitle" placeholder="Brief title..." autofocus></div><div class="modal-field"><label class="modal-label">Description</label><textarea class="modal-input" id="newPostDesc" rows="4" placeholder="Describe your idea or bug in detail..."></textarea></div></div><div class="modal-foot"><button class="modal-btn" onclick="closeModal()">Cancel</button><button class="modal-btn primary" onclick="submitPost()">Submit</button></div>`);
	});

	function submitPost() {
		const type = document.getElementById('newPostType')?.value || 'idea';
		const title = document.getElementById('newPostTitle')?.value?.trim();
		const desc = document.getElementById('newPostDesc')?.value?.trim();
		if (!title || !desc) return;
		FEEDBACK.unshift({
			id: Date.now(),
			type,
			title,
			author: 'You',
			authorAvatar: 'nighthawk',
			date: 'Just now',
			desc,
			votes: 0,
			userVote: 0,
			comments: []
		});
		closeModal();
		renderFeedback();
		showToast('Post submitted', 'fa-check');
	}

	/* SEARCH */
	searchInput.addEventListener('input', renderActiveTab);

	/* TOGGLE MENU */
	function openMenuFn() {
		adminMenu.classList.remove('closing');
		adminMenu.classList.add('open');
		menuOpen = true
	}

	function closeMenuFn() {
		adminMenu.classList.remove('open');
		adminMenu.classList.add('closing');
		menuOpen = false;
		closeColPicker();
		closeModal();
		if (settingsOpen) closeSettings()
	}

	/* DRAG FUNCTIONALITY */
	let isDragging = false;
	let dragOffsetX = 0;
	let dragOffsetY = 0;

	const topbar = document.querySelector('.topbar');
	topbar.style.cursor = 'move';

	topbar.addEventListener('mousedown', e => {
		if (e.target.closest('input') || e.target.closest('button') || e.target.closest('.col-picker')) return;
		isDragging = true;
		dragOffsetX = e.clientX - adminMenu.offsetLeft;
		dragOffsetY = e.clientY - adminMenu.offsetTop;
		topbar.style.userSelect = 'none';
	});

	document.addEventListener('mousemove', e => {
		if (!isDragging) return;
		e.preventDefault();
		const newX = e.clientX - dragOffsetX;
		const newY = e.clientY - dragOffsetY;
		adminMenu.style.left = Math.max(0, Math.min(newX, window.innerWidth - adminMenu.offsetWidth)) + 'px';
		adminMenu.style.top = Math.max(0, Math.min(newY, window.innerHeight - adminMenu.offsetHeight)) + 'px';
	});

	document.addEventListener('mouseup', () => {
		if (isDragging) {
			isDragging = false;
			topbar.style.userSelect = '';
		}
	});

	/* RESIZE FUNCTIONALITY */
	let isResizing = false;
	let resizeStartX = 0;
	let resizeStartY = 0;
	let resizeStartWidth = 0;
	let resizeStartHeight = 0;

	const resizeHandle = document.getElementById('resizeHandle');

	resizeHandle.addEventListener('mousedown', e => {
		isResizing = true;
		resizeStartX = e.clientX;
		resizeStartY = e.clientY;
		resizeStartWidth = adminMenu.offsetWidth;
		resizeStartHeight = adminMenu.offsetHeight;
		e.preventDefault();
	});

	document.addEventListener('mousemove', e => {
		if (!isResizing) return;
		e.preventDefault();
		const deltaX = e.clientX - resizeStartX;
		const deltaY = e.clientY - resizeStartY;
		const newWidth = Math.max(600, resizeStartWidth + deltaX);
		const newHeight = Math.max(400, resizeStartHeight + deltaY);
		adminMenu.style.width = newWidth + 'px';
		adminMenu.style.height = newHeight + 'px';
	});

	document.addEventListener('mouseup', () => {
		if (isResizing) {
			isResizing = false;
		}
	});

	document.getElementById('closeBtn').addEventListener('click', closeMenuFn);
	document.addEventListener('keydown', e => {
		const tag = document.activeElement?.tagName;
		if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') {
			if (e.key === 'Escape') document.activeElement.blur();
			return
		}
		if (e.key === 'F6') {
			e.preventDefault();
			if (settingsOpen) closeSettings(); else if (menuOpen) closeMenuFn(); else openMenuFn()
		}
		if (e.key === 'Escape') {
			if (settingsOpen) closeSettings(); else if (modalOverlay.classList.contains('open')) closeModal(); else if (colPickerOpen) closeColPicker(); else if (menuOpen) closeMenuFn()
		}
	});

	/* INIT */
	renderActiveTab();
	setTimeout(openMenuFn, 600);
</script>
</body>
</html>
