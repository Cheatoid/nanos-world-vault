<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WebBrowser</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--primary-color: #ff1f5a;
			--bg-dark: #16162a;
			--bg-darker: #1a1a2e;
			--bg-active: #1e1e3a;
			--border-color: #2a2a4a;
			--border-active: #4a4a7a;
			--text-color: #e0e0e0;
			--text-muted: #666;
		}

		body {
			width: 100vw;
			height: 93px;
			overflow: hidden;
			background: transparent !important;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text-color);
			pointer-events: none;
		}

		/* Browser Container - only as tall as needed for chrome elements */
		.browser-container {
			display: flex;
			flex-direction: column;
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 93px;
			pointer-events: none;
		}

		/* Ensure chrome UI elements are clickable when chrome is transparent */
		.tab-bar, .toolbar {
			pointer-events: auto;
		}

		/* Tab Bar */
		.tab-bar {
			display: flex;
			align-items: center;
			background: var(--bg-dark);
			border-bottom: 1px solid var(--border-color);
			padding: 4px 8px 0;
			gap: 4px;
			min-height: 40px;
		}

		.tab-list {
			display: flex;
			align-items: center;
			gap: 4px;
			flex: 1;
			overflow-x: auto;
			overflow-y: hidden;
			scrollbar-width: none; /* Firefox */
			-ms-overflow-style: none; /* IE/Edge */
		}

		.tab-list::-webkit-scrollbar {
			display: none; /* Chrome/Safari */
		}

		.tab {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			background: var(--bg-darker);
			border: 1px solid var(--border-color);
			border-bottom: none;
			border-radius: 8px 8px 0 0;
			cursor: pointer;
			min-width: 120px;
			max-width: 200px;
			transition: all 0.2s ease;
			position: relative;
			user-select: none;
		}

		.tab:hover {
			background: var(--bg-active);
		}

		.tab.active {
			background: var(--bg-active);
			border-color: var(--primary-color) !important;
		}

		.tab.dragging {
			opacity: 0.5;
			transform: scale(1.05);
		}

		.tab.drag-over {
			border-left: 2px solid var(--primary-color);
		}

		.tab-favicon {
			width: 16px;
			height: 16px;
			border-radius: 2px;
			background: #333;
			flex-shrink: 0;
		}

		.tab-title {
			flex: 1;
			font-size: 12px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.tab-close {
			width: 18px;
			height: 18px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 10px;
			opacity: 0.6;
			transition: all 0.2s;
			flex-shrink: 0;
		}

		.tab-close:hover {
			opacity: 1;
			background: #ff4757;
		}

		.new-tab-btn {
			width: 32px;
			height: 32px;
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--border-color);
			border: none;
			color: var(--text-color);
			cursor: pointer;
			transition: all 0.2s;
			font-size: 14px;
		}

		.new-tab-btn:hover {
			background: var(--border-active);
		}

		/* Toolbar */
		.toolbar {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			background: var(--bg-active);
			border-bottom: 1px solid var(--border-color);
		}

		.nav-btn {
			width: 36px;
			height: 36px;
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--border-color);
			border: none;
			color: var(--text-color);
			cursor: pointer;
			transition: all 0.2s;
			font-size: 14px;
		}

		.nav-btn:hover:not(:disabled) {
			background: var(--primary-color) !important;
		}

		.nav-btn:disabled {
			opacity: 0.3;
			cursor: not-allowed;
		}

		.address-bar {
			flex: 1;
			display: flex;
			align-items: center;
			background: #0f0f1a;
			border: 1px solid var(--border-color);
			border-radius: 8px;
			padding: 0 12px;
			height: 36px;
			transition: border-color 0.2s;
		}

		.address-bar:focus-within {
			border-color: var(--primary-color) !important;
		}

		.address-bar input {
			flex: 1;
			background: transparent;
			border: none;
			outline: none;
			color: var(--text-color);
			font-size: 13px;
		}

		.address-bar input::placeholder {
			color: var(--text-muted);
		}

		.address-bar .lock-icon {
			color: var(--primary-color) !important;
			font-size: 12px;
			margin-right: 8px;
		}

		.go-btn {
			width: 36px;
			height: 36px;
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--border-active);
			border: none;
			color: var(--text-color);
			cursor: pointer;
			transition: all 0.2s;
			font-size: 14px;
		}

		.go-btn:hover {
			background: var(--primary-color) !important;
		}

		.close-btn {
			width: 36px;
			height: 36px;
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #ff4757;
			border: none;
			color: white;
			cursor: pointer;
			transition: all 0.2s;
			font-size: 14px;
		}

		.close-btn:hover {
			background: #ff6b7a;
		}
	</style>
</head>
<body>
<div class="browser-container">
	<!-- Tab Bar -->
	<div class="tab-bar" id="tabBar">
		<div class="tab-list" id="tabList"></div>
		<button class="new-tab-btn" id="newTabBtn" title="New Tab">
			<i class="fas fa-plus"></i>
		</button>
	</div>

	<!-- Toolbar -->
	<div class="toolbar">
		<button class="nav-btn" id="backBtn" title="Back" disabled>
			<i class="fas fa-arrow-left"></i>
		</button>
		<button class="nav-btn" id="forwardBtn" title="Forward" disabled>
			<i class="fas fa-arrow-right"></i>
		</button>
		<button class="nav-btn" id="reloadBtn" title="Reload">
			<i class="fas fa-redo"></i>
		</button>
		<button class="nav-btn" id="homeBtn" title="Home">
			<i class="fas fa-home"></i>
		</button>
		<div class="address-bar">
			<i class="fas fa-lock lock-icon" id="lockIcon"></i>
			<input type="text" id="addressInput" placeholder="Search or enter URL">
		</div>
		<button class="go-btn" id="goBtn" title="Go">
			<i class="fas fa-arrow-right"></i>
		</button>
		<button class="close-btn" id="closeBtn" title="Close Browser">
			<i class="fas fa-times"></i>
		</button>
	</div>
</div>

<script>
	// New tab page URL (single source of truth)
	const NEW_TAB_PAGE_URL = 'file://UI/NewTabPage.html';

	// Tab management
	let tabs = {};
	let activeTabId = null;

	// Load theme from localStorage
	function loadTheme() {
		const savedTheme = localStorage.getItem('webbrowser_theme');
		if (savedTheme) {
			document.documentElement.style.setProperty('--primary-color', savedTheme);
			console.log('Theme loaded:', savedTheme);
		} else {
			console.log('No saved theme, using default');
		}
	}

	loadTheme();

	// Listen for theme changes from other tabs
	window.addEventListener('storage', (e) => {
		if (e.key === 'webbrowser_theme' && e.newValue) {
			document.documentElement.style.setProperty('--primary-color', e.newValue);
		}
	});

	// Drag and drop for tabs
	let draggedTab = null;

	function initDragAndDrop() {
		tabList.addEventListener('dragstart', (e) => {
			if (e.target.classList.contains('tab')) {
				draggedTab = e.target;
				e.target.classList.add('dragging');
				e.dataTransfer.effectAllowed = 'move';
			}
		});

		tabList.addEventListener('dragend', (e) => {
			if (e.target.classList.contains('tab')) {
				e.target.classList.remove('dragging');
				document.querySelectorAll('.tab').forEach(tab => {
					tab.classList.remove('drag-over');
				});
				draggedTab = null;
			}
		});

		tabList.addEventListener('dragover', (e) => {
			e.preventDefault();
			const tab = e.target.closest('.tab');
			if (tab && tab !== draggedTab) {
				tab.classList.add('drag-over');
			}
		});

		tabList.addEventListener('dragleave', (e) => {
			const tab = e.target.closest('.tab');
			if (tab) {
				tab.classList.remove('drag-over');
			}
		});

		tabList.addEventListener('drop', (e) => {
			e.preventDefault();
			const tab = e.target.closest('.tab');
			if (tab && tab !== draggedTab) {
				const allTabs = [...tabList.querySelectorAll('.tab')];
				const draggedIndex = allTabs.indexOf(draggedTab);
				const targetIndex = allTabs.indexOf(tab);

				if (draggedIndex < targetIndex) {
					tab.parentNode.insertBefore(draggedTab, tab.nextSibling);
				} else {
					tab.parentNode.insertBefore(draggedTab, tab);
				}

				// Notify Lua of tab reorder
				if (typeof Events !== 'undefined') {
					const tabIds = allTabs.map(t => parseInt(t.dataset.tabId));
					Events.Call('TabsReordered', tabIds);
				}
			}
			tab.classList.remove('drag-over');
		});
	}

	const tabBar = document.getElementById('tabBar');
	const tabList = document.getElementById('tabList');
	const addressInput = document.getElementById('addressInput');

	// Mouse wheel scrolling for tabs
	tabList.addEventListener('wheel', (e) => {
		if (e.deltaY !== 0) {
			e.preventDefault();
			tabList.scrollLeft += e.deltaY;
		}
	});
	const backBtn = document.getElementById('backBtn');
	const forwardBtn = document.getElementById('forwardBtn');
	const reloadBtn = document.getElementById('reloadBtn');
	const homeBtn = document.getElementById('homeBtn');
	const goBtn = document.getElementById('goBtn');
	const closeBtn = document.getElementById('closeBtn');
	const lockIcon = document.getElementById('lockIcon');

	// Process URL (add protocol if needed)
	function processURL(url) {
		if (!url) return null;
		if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('about:') || url.startsWith('file://') || url.includes('://')) {
			return url;
		}
		if ((url.includes('.') || url.includes('/')) && !url.includes(' ')) {
			return 'https://' + url;
		}
		// Don't default to Google search, just add https://
		return 'https://' + url;
	}

	// Create tab element in UI
	function createTabElement(tabId, url, title) {
		const tabEl = document.createElement('div');
		tabEl.className = 'tab';
		tabEl.dataset.tabId = tabId;
		tabEl.draggable = true;
		tabEl.innerHTML = `
				<div class="tab-favicon"></div>
				<span class="tab-title">${title || 'New Tab'}</span>
				<div class="tab-close"><i class="fas fa-times"></i></div>
			`;

		tabEl.addEventListener('click', (e) => {
			if (!e.target.closest('.tab-close')) {
				switchTab(tabId);
				// Request focus for tab content
				if (typeof Events !== 'undefined') {
					Events.Call('FocusTab', tabId);
				}
			}
		});

		tabEl.querySelector('.tab-close').addEventListener('click', (e) => {
			e.stopPropagation();
			closeTab(tabId);
		});

		return tabEl;
	}

	// Add tab to UI
	function addTabElement(tabId, url, title) {
		const tabEl = createTabElement(tabId, url, title);
		tabList.appendChild(tabEl);

		// Scroll to the new tab to make it visible
		tabEl.scrollIntoView({behavior: 'smooth', block: 'nearest', inline: 'end'});

		tabs[tabId] = {
			id: tabId,
			url: url,
			title: title || 'New Tab',
			loading: false
		};
	}

	// Remove tab element from UI
	function removeTabElement(tabId) {
		const tabEl = tabList.querySelector(`[data-tab-id="${tabId}"]`);
		if (tabEl) tabEl.remove();
		delete tabs[tabId];
	}

	// Update tab element
	function updateTabElement(tabId, updates) {
		const tab = tabs[tabId];
		if (!tab) return;

		if (updates.url !== undefined) tab.url = updates.url;
		if (updates.title !== undefined) tab.title = updates.title;
		if (updates.loading !== undefined) tab.loading = updates.loading;

		const tabEl = tabList.querySelector(`[data-tab-id="${tabId}"]`);
		if (tabEl) {
			if (updates.title !== undefined) {
				tabEl.querySelector('.tab-title').textContent = updates.title;
			}
		}
	}

	// Switch active tab
	function switchTab(tabId) {
		if (typeof Events !== 'undefined') {
			Events.Call('SwitchTab', tabId);
		}
	}

	// Close tab
	function closeTab(tabId) {
		if (typeof Events !== 'undefined') {
			Events.Call('CloseTab', tabId);
		}
	}

	// Navigate active tab
	function navigate(url) {
		const processedURL = processURL(url);
		if (!processedURL || !activeTabId) return;

		// Update UI
		addressInput.value = processedURL;
		if (processedURL.startsWith('https://')) {
			lockIcon.className = 'fas fa-lock lock-icon';
			lockIcon.style.color = 'var(--primary-color)';
		} else {
			lockIcon.className = 'fas fa-lock-open lock-icon';
			lockIcon.style.color = '#666';
		}

		// Call Lua to navigate
		if (typeof Events !== 'undefined') {
			Events.Call('Navigate', activeTabId, processedURL);
		}
	}

	// Event Listeners
	document.getElementById('newTabBtn').addEventListener('click', () => {
		if (typeof Events !== 'undefined') {
			Events.Call('CreateTab'); // No default URL, shows new tab page
		}
	});

	addressInput.addEventListener('keypress', (e) => {
		if (e.key === 'Enter') {
			navigate(addressInput.value);
		}
	});

	addressInput.addEventListener('blur', () => {
		// Keep focus on chrome so toolbar continues to work
	});

	goBtn.addEventListener('click', () => navigate(addressInput.value));

	backBtn.addEventListener('click', () => {
		if (activeTabId && typeof Events !== 'undefined') {
			Events.Call('GoBack', activeTabId);
		}
	});

	forwardBtn.addEventListener('click', () => {
		if (activeTabId && typeof Events !== 'undefined') {
			Events.Call('GoForward', activeTabId);
		}
	});

	reloadBtn.addEventListener('click', () => {
		if (activeTabId && typeof Events !== 'undefined') {
			Events.Call('Reload', activeTabId);
		}
	});

	homeBtn.addEventListener('click', () => {
		navigate(NEW_TAB_PAGE_URL);
	});

	closeBtn.addEventListener('click', () => {
		if (typeof Events !== 'undefined') {
			Events.Call('Close');
		}
	});

	// Focus tab when clicking outside chrome UI elements
	document.addEventListener('click', (e) => {
		// Check if click is on chrome UI elements
		const isOnChromeUI = e.target.closest('.toolbar') || e.target.closest('.tab-bar');

		// If not on chrome UI and we have an active tab, focus the tab
		if (!isOnChromeUI && activeTabId && typeof Events !== 'undefined') {
			Events.Call('FocusTab', activeTabId);
		}
	});

	// Listen for Lua events
	if (typeof Events !== 'undefined') {
		// Tab created
		Events.Subscribe('TabCreated', function (tabId, url, title) {
			addTabElement(tabId, url, title);
		});

		// Tab closed
		Events.Subscribe('TabClosed', function (tabId) {
			removeTabElement(tabId);
		});

		// Tab switched
		Events.Subscribe('TabSwitched', function (tabId) {
			activeTabId = tabId;

			// Update tab styles
			document.querySelectorAll('.tab').forEach(el => {
				el.classList.toggle('active', parseInt(el.dataset.tabId) === tabId);
			});

			// Update address bar
			const tab = tabs[tabId];
			if (tab) {
				addressInput.value = tab.url;
				if (tab.url && tab.url.startsWith('https://')) {
					lockIcon.className = 'fas fa-lock lock-icon';
					lockIcon.style.color = 'var(--primary-color)';
				} else {
					lockIcon.className = 'fas fa-lock-open lock-icon';
					lockIcon.style.color = '#666';
				}
			}
		});

		// Tab URL changed
		Events.Subscribe('TabURLChanged', function (tabId, url) {
			updateTabElement(tabId, {url: url});
			if (activeTabId === tabId) {
				// Normalize new tab page URL to short form
				if (url && url.includes('NewTabPage.html')) {
					url = NEW_TAB_PAGE_URL;
				}
				addressInput.value = url;
				if (url && url.startsWith('https://')) {
					lockIcon.className = 'fas fa-lock lock-icon';
					lockIcon.style.color = 'var(--primary-color)';
				} else {
					lockIcon.className = 'fas fa-lock-open lock-icon';
					lockIcon.style.color = '#666';
				}
			}
		});

		// Tab title changed
		Events.Subscribe('TabTitleChanged', function (tabId, title) {
			updateTabElement(tabId, {title: title});
		});

		// Tab loading changed
		Events.Subscribe('TabLoadingChanged', function (tabId, loading) {
			updateTabElement(tabId, {loading: loading});
		});

		// History state changed
		Events.Subscribe('HistoryStateChanged', function (tabId, canGoBack, canGoForward) {
			if (activeTabId === tabId) {
				backBtn.disabled = !canGoBack;
				forwardBtn.disabled = !canGoForward;
			}
		});

		// Rebuild tabs (called when restoring from localStorage)
		Events.Subscribe('RebuildTabs', function (tabsData) {
			tabList.innerHTML = '';
			tabs = {}; // Clear local tabs object
			for (const tabId in tabsData) {
				const tab = tabsData[tabId];
				addTabElement(tab.id, tab.url, tab.title);
			}
			// Set active tab
			if (activeTabId) {
				const activeTab = document.querySelector(`.tab[data-tab-id="${activeTabId}"]`);
				if (activeTab) {
					activeTab.classList.add('active');
				}
			}
		});
	}

	// Initialize
	initDragAndDrop();

	// Notify Lua that WebUI is ready
	if (typeof Events !== 'undefined') {
		Events.Call('WebBrowserReady');
	}
</script>
</body>
</html>
