<html>

<head>
	<script>
		// NOTE: Must use 'var' because nanos world engine defines window.Events before this script runs.
		// Using 'const' or 'let' would cause a redeclaration error.
		/** @type {{Call: function(string, ...any): void, Subscribe: function(string, function(...any)): void}} */
		var Events = window.Events;

		// ============================================================
		// Setup
		// ============================================================

		let is_ready = false;
		const on_page_load = () => {
			if (is_ready) return;
			is_ready = true;
			console.log("RegexAPI ready");
			Events.Call("RegexReady");
		};

		document.addEventListener("DOMContentLoaded", on_page_load);
		window.onload = on_page_load;

		// ============================================================
		// Helpers
		// ============================================================

		const safe_call = (
			/** @type {function(...any): any} */ fn,
			/** @type {any[]} */ ...args
			/** @returns {[boolean, any]} */
		) => {
			try {
				return [true, fn(...args)];
			} catch (e) {
				return [false, e.toString()];
			}
		};

		const send = (
			/** @type {number} */ id,
			/** @type {boolean} */ success,
			/** @type {any} */ payload
		) => Events.Call("RegexResult", id, success, payload);

		const reply = (
			/** @type {number} */ id,
			/** @type {function(...any): any} */ fn,
			/** @type {any[]} */ ...args
		) => {
			const [ok, out] = safe_call(fn, ...args);
			return send(id, ok, out);
		};

		// ============================================================
		// Event Handlers
		// ============================================================

		const onDoMatch = (
			/** @type {number} */ id,
			/** @type {string} */ pattern,
			/** @type {string} */ text,
			/** @type {string} */ flags
		) =>
			reply(id, (
				/** @type {string} */ pattern,
				/** @type {string} */ text,
				/** @type {string} */ flags
			) => {
				const m = text.match(new RegExp(pattern, flags || ""));
				return m ? m[0] : null;
			}, pattern, text, flags);

		const onDoMatchAll = (
			/** @type {number} */ id,
			/** @type {string} */ pattern,
			/** @type {string} */ text,
			/** @type {string} */ flags
		) =>
			reply(id, (
				/** @type {string} */ pattern,
				/** @type {string} */ text,
				/** @type {string} */ flags
			) => {
				const re = new RegExp(pattern, (flags || "") + "g");
				return [...text.matchAll(re)].map(m => m[0]);
			}, pattern, text, flags);

		const onDoTest = (
			/** @type {number} */ id,
			/** @type {string} */ pattern,
			/** @type {string} */ text,
			/** @type {string} */ flags
		) =>
			reply(id, (
				/** @type {string} */ pattern,
				/** @type {string} */ text,
				/** @type {string} */ flags
			) => new RegExp(pattern, flags || "").test(text), pattern, text, flags);

		const onDoReplace = (
			/** @type {number} */ id,
			/** @type {string} */ pattern,
			/** @type {string} */ text,
			/** @type {string} */ replacement,
			/** @type {string} */ flags
		) =>
			reply(id, (
				/** @type {string} */ pattern,
				/** @type {string} */ text,
				/** @type {string} */ replacement,
				/** @type {string} */ flags
			) =>
				text.replace(
					new RegExp(pattern, (flags || "") + "g"), replacement
				), pattern, text, replacement, flags);

		const onDoSplit = (
			/** @type {number} */ id,
			/** @type {string} */ pattern,
			/** @type {string} */ text,
			/** @type {string} */ flags
		) =>
			reply(id, (
				/** @type {string} */ pattern,
				/** @type {string} */ text,
				/** @type {string} */ flags
			) => text.split(new RegExp(pattern, flags || "")), pattern, text, flags);

		const onDoExec = (
			/** @type {number} */ id,
			/** @type {string} */ pattern,
			/** @type {string} */ text,
			/** @type {string} */ flags
		) =>
			reply(id, (
				/** @type {string} */ pattern,
				/** @type {string} */ text,
				/** @type {string} */ flags
			) => {
				const re = new RegExp(pattern, flags || "");
				const m = re.exec(text);
				if (!m) return null;
				return {
					match: m[0],
					index: m.index,
					input: m.input,
					groups: m.groups || {}
				};
			}, pattern, text, flags);

		// ============================================================
		// Subscriptions - Subscribe to events
		// ============================================================

		const handlers = {
			DoMatch: onDoMatch,
			DoMatchAll: onDoMatchAll,
			DoTest: onDoTest,
			DoReplace: onDoReplace,
			DoSplit: onDoSplit,
			DoExec: onDoExec
		};

		for (const [event, handler] of Object.entries(handlers)) {
			Events.Subscribe(event, handler);
		}
	</script>
</head>

<body></body>

</html>
